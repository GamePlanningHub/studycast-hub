const TRANSCRIPT = [{"start": 0.0, "end": 5.84, "text": "어젯밤에 피곤한 몸을 이끌고 게임에 접속해서 잡은 고블린 50마리"}, {"start": 5.84, "end": 8.4, "text": "아 다들 한번쯤 경험이 있으시죠?"}, {"start": 8.4, "end": 16.0, "text": "네 그 고블린을 잡고 얻은 1000골드랑 또 레벨업을 딱 하면서 느낀 그 짜릿한 성취감 있잖아요?"}, {"start": 16.0, "end": 19.2, "text": "그게 과연 당신이 원해서 한 행동이었을까요?"}, {"start": 19.2, "end": 22.88, "text": "음 다들 자기 자유의지라고 굳게 믿고 계실 겁니다"}, {"start": 22.88, "end": 28.48, "text": "그렇죠. 그런데 좀 충격적일 수도 있지만 그건 당신의 의지가 아닙니다"}, {"start": 28.48, "end": 33.76, "text": "어떤 게임 기획자가 당신의 퇴근 후 한 시간을 완벽하게 통제하려고"}, {"start": 33.76, "end": 38.480000000000004, "text": "엑셀표로 소수점까지 쪼개서 만들어 놓은 수학적 함정이었던 거죠"}, {"start": 38.480000000000004, "end": 41.120000000000005, "text": "네 아주 정교하게 짜인 함정이죠"}, {"start": 41.120000000000005, "end": 45.36, "text": "그래서 오늘 딥다이브에서는요. 게임 기획을 처음 배우는 학생들을 위한"}, {"start": 45.36, "end": 48.16, "text": "아주 귀중한 강의 자료를 가져왔습니다"}, {"start": 48.16, "end": 54.08, "text": "이 자료의 첫 페이지부터 마지막 21페이지까지의 모든 개념을 하나도 빠짐없이 파헤쳐 볼 건데요"}, {"start": 54.08, "end": 56.88, "text": "게임의 뼈대를 만드는 아주 핵심적인 자료죠"}, {"start": 56.88, "end": 60.64, "text": "맞습니다. 당신이 밤을 세우게 만든 그 숨겨진 마법"}, {"start": 60.64, "end": 64.72, "text": "철저히 계산된 게임 설계의 세계로 깊숙이 들어가 보겠습니다"}, {"start": 64.72, "end": 70.56, "text": "자 이걸 한번 파헤쳐 보죠. 우리가 막 게임 안에서 자유롭게 모험을 한다고 생각하지만"}, {"start": 70.56, "end": 74.64, "text": "그 뒤에서는 대체 얼마나 치밀한 시스템이 돌아가고 있는 건가요?"}, {"start": 74.64, "end": 77.6, "text": "우리가 흔히 재미있는 게임이라고 부르는 것들 있잖아요"}, {"start": 77.6, "end": 84.56, "text": "그 실체를 들여다보면 예술이나 마법보다는 거대한 정수기나 경제 시스템에 훨씬 더 가깝습니다"}, {"start": 84.56, "end": 88.32000000000001, "text": "여기서 제일 중요한 첫 번째 개념이 바로 '컨텐츠 순환 구조' 거든요"}, {"start": 88.32000000000001, "end": 91.76, "text": "컨텐츠 순환 구조요? 뭔가 빙글빙글 돈다는 뜻인가요?"}, {"start": 91.76, "end": 98.08, "text": "네 맞아요. 유저가 몬스터를 잡는 핵심 컨텐츠를 즐기면 골드나 아이템 같은 자원이 생기잖아요?"}, {"start": 98.08, "end": 102.56, "text": "그럼 이 자원을 물약을 만들거나 무기를 강화하는 '파생 컨텐츠' 에 쏟아붓는 거죠"}, {"start": 102.56, "end": 104.88, "text": "아 벌어서 쓰는 거네요"}, {"start": 104.88, "end": 110.4, "text": "그렇죠 그리고 강해진 캐릭터로 다시 더 센 몬스터를 잡으러 가고요"}, {"start": 110.48, "end": 116.56, "text": "이 톱니바퀴가 단 1초도 멈추지 않고 돌아가게 만드는 것. 그게 설계의 가장 밑바탕입니다"}, {"start": 116.56, "end": 121.44000000000001, "text": "듣고 보니까 그 현실의 자본주의 경제 시스템이랑 완전히 똑같네요"}, {"start": 121.44000000000001, "end": 124.48, "text": "돈을 벌고 쓰고 다시 투자하고"}, {"start": 124.48, "end": 128.24, "text": "그런데 이 순환의 속도나 밸런스는 대체 어떻게 맞추는 건가요?"}, {"start": 128.24, "end": 132.88, "text": "기획자가 그냥 감으로 '이쯤 하면 좋아하겠지' 하고 찍는 건 아닐 테고요"}, {"start": 132.88, "end": 139.12, "text": "당연히 감에 의존하면 절대 안 되죠. 모든 건 냉혹한 통계랑 엑셀 수치로 결정이 납니다"}, {"start": 139.12, "end": 144.16, "text": "게임 내 경제가 안 무너지려면 유저의 컨텐츠 소모력을 정확히 예측해야 하거든요"}, {"start": 144.16, "end": 147.44, "text": "유저가 얼마나 빨리 써버릴지 미리 계산한다는 거군요"}, {"start": 147.44, "end": 155.52, "text": "네, 예를 들어서 유저가 10레벨에 도달하려면, 평균적으로 몬스터 100마리를 잡아야 한다고 미리 설계를 해둡니다"}, {"start": 155.52, "end": 159.6, "text": "몬스터 한 마리를 잡을 때 떨어지는 골드 기댓값이 20골드라면"}, {"start": 159.6, "end": 162.0, "text": "곱하면 되니까 딱 2000골드가 나오네요?"}, {"start": 162.0, "end": 167.68, "text": "정확합니다. 10레벨 유저 주머니에는 정확히 2000골드가 있어야 정상인 거죠"}, {"start": 167.68, "end": 175.04000000000002, "text": "이 계산을 엑셀로 쫙 밀고 나가서 '20레벨에는 5000골드를 가지게 된다' 이걸 미리 다 수치화 해놓습니다"}, {"start": 175.04000000000002, "end": 180.64000000000001, "text": "와 진짜 치밀하네요. 근데 만약에 그 기댓값 계산이 어긋나면 어떻게 되나요?"}, {"start": 180.64000000000001, "end": 184.0, "text": "유저가 막 20레벨에 5만골드를 왕창 벌어버리면요?"}, {"start": 184.0, "end": 186.72, "text": "현실 세계랑 똑같이 초 인플레이션이 옵니다"}, {"start": 186.72, "end": 191.44, "text": "돈이 너무 흔해지니까 상점에서 파는 물약이나 무기 가치가 뚝 떨어지죠"}, {"start": 191.44, "end": 196.08, "text": "아 밸런스가 붕괴되는 거군요. 반대로 너무 적게 벌면요?"}, {"start": 196.08, "end": 202.32000000000002, "text": "너무 적으면 유저들은 물약 하나 못 싸서 계속 파산하니까 스트레스 받아서 게임을 바로 삭제해버릴 겁니다"}, {"start": 202.32000000000002, "end": 210.4, "text": "그래서 기획자는 레벨이나 직업 경험치 효율 같은 필수 항목들을 보면서 자원 획득과 소비 속도를 끊임없이 조율해야죠"}, {"start": 210.4, "end": 217.04000000000002, "text": "결국 유저를 약간 배고프게 만들면서도 계속 달리게 하는 당근을 매달아두는 거네요"}, {"start": 217.04000000000002, "end": 225.20000000000002, "text": "그런데 유저들도 바보가 아니잖아요. 게임 하다보면 빈틈을 찾아서 제일 효율적인 길만 고집하게 되던데요?"}, {"start": 225.2, "end": 228.0, "text": "막 광렙 루트 이런거요"}, {"start": 228.0, "end": 235.11999999999998, "text": "그 지점이 바로 시스템 설계자랑 유저 사이에서 팽팽한 두뇌 싸움이 벌어지는 곳입니다"}, {"start": 235.11999999999998, "end": 240.23999999999998, "text": "기획자는 유저가 가장 중요하게 생각하는 '핵심 가치' 를 읽어내야 하거든요"}, {"start": 240.23999999999998, "end": 244.79999999999998, "text": "핵심 가치요? 저 같은 경우는 무조건 빠른 레벨업이거든요"}, {"start": 244.79999999999998, "end": 250.72, "text": "그러니까요. 레벨업이 핵심인 유저는 철저하게 시간대비 경험치 효율만 따집니다"}, {"start": 250.72, "end": 257.84, "text": "기획자가 아무리 예쁜 맵을 3개나 만들어 놔도 유저들은 경험치 많이 주는 맵 하나로만 우르르 몰려가는 거죠"}, {"start": 257.84, "end": 266.0, "text": "맞아요. 저도 경험치 많이 주는 사냥터만 가거든요. 예를 들어서 여우굴이 경험치를 엄청나게 준다고 쳐보죠"}, {"start": 266.0, "end": 270.16, "text": "네, 대신 몬스터가 세서 물약이 미친 듯이 소모되는 곳이죠"}, {"start": 270.16, "end": 279.76, "text": "네네, 반면에 산적 산체라는 곳은 산적들이 먼저 공격하는 선공몹이라 방어력 약한 전사들은 근처에도 안 가잖아요"}, {"start": 279.76, "end": 284.48, "text": "그리고 뒷동산은 몹이 띄엄띄엄 있어서 사냥 효율이 꽝이구요"}, {"start": 284.48, "end": 294.56, "text": "그렇게 되면 여우골만 미어터지고 나머지는 유령도시가 될텐데, 기획자 입장에서는 수개월 고생해서 만든 컨텐츠가 버려지는 거니까 엄청난 낭비입니다"}, {"start": 294.56, "end": 300.56, "text": "어, 그럼 무능한 기획자는 여기서 단순히 산적 산채 몬스터 수를 늘리거나 하겠네요?"}, {"start": 300.64, "end": 310.72, "text": "맞아요. 일차원적인 패치를 하죠 하지만 훌륭한 시스템 설계자는 유저 심리랑 직업 특성을 역이용해서 버려지는 컨텐츠의 용도 자체를 확 바꿔버립니다"}, {"start": 310.72, "end": 315.36, "text": "오 경험치 패치가 아니라, 용도를 바꾼다고요? 어떻게 하는데요?"}, {"start": 315.36, "end": 322.24, "text": "여우굴은 경험치를 많이 주는 대신, 물약을 폭포수처럼 쓰게 만드는 자원 소모성 컨텐츠로 그냥 둡니다"}, {"start": 322.24, "end": 328.56, "text": "대신 유령도시였던 산적 산채는 몬스터가 먼저 공격해 온다는 단점을 거꾸로 이용하는 거죠"}, {"start": 328.56, "end": 334.64, "text": "아 먼저 몰려드니까 광역 마법사들한테는 가만히 서서 사냥할 수 있는 성지가 되겠네요?"}, {"start": 334.64, "end": 341.68, "text": "바로 그겁니다. 방호력은 약해도 한방에 여러 마리를 잡는 마법사 전용 사냥터로 포지셔닝을 하는 거죠"}, {"start": 341.68, "end": 350.32, "text": "와 직업 클래스 특성을 이용해서 타깃을 나눠버렸네요? 그럼 몬스터가 너무 없어서 사냥터로 영 꽝인 뒷동산은 어떻게 살려내나요?"}, {"start": 350.32, "end": 353.68, "text": "거긴 아예 사냥터라는 프레임을 버리면 답이 나옵니다"}, {"start": 353.68, "end": 360.48, "text": "몬스터를 싹 치워버리고 물약 만드는데 필요한 희귀 약초가 자라는 채집 전용 공간으로 재활용하는 거예요"}, {"start": 360.48, "end": 366.88, "text": "대박 그러면 레벨업 할 때 물약이 필요하니까 다들 뒷동산에 한번씩은 들르게 되겠네요?"}, {"start": 366.88, "end": 377.76, "text": "네 이렇게 하면 레벨, 클래스, 경험치, 자원 획득과 소비 같은 설계 필수 요소들이 하나의 거대한 생태계 안에서 맞물려 돌아가게 되는 겁니다"}, {"start": 377.76, "end": 383.44, "text": "소름돋네요. 버려진 공간 하나 없이 완벽하게 순환을 시키는 거군요"}, {"start": 383.44, "end": 391.44, "text": "자 이렇게 맵 구조를 짰다면 이제 유저가 게임에 머무는 시간의 흐름에 따라 이 생태계가 어떻게 변하는지 봐야 할 텐데요"}, {"start": 391.44, "end": 399.76, "text": "네 시간의 흐름 즉 레벨 구간에 따라서 유저의 심리랑 목적은 완전히 달라집니다 이걸 크게 3단계로 나누는데요"}, {"start": 399.76, "end": 404.64, "text": "첫 번째가 초반 온보딩 단계입니다 / 아 게임 처음 깔고 시작할 때 말씀하시는 거죠?"}, {"start": 404.64, "end": 412.8, "text": "네 이때는 아주 작은 행동에도 즉각적이고 화려한 보상을 줘서 성장의 순환이 제일 활발하게 일어나게 해야 합니다"}, {"start": 412.8, "end": 419.03999999999996, "text": "그리고 두 번째 중반 단계는 세계관에 몰입하면서 최고 레벨을 향해 쭉 성장하는 시기구요"}, {"start": 419.03999999999996, "end": 420.88, "text": "그럼 마지막 후반 단계는?"}, {"start": 420.88, "end": 422.32, "text": "만렙 찍었을 때 인가요?"}, {"start": 422.32, "end": 430.0, "text": "맞습니다 마스터 단계라고 하는데, 더 이상 레벨업을 할 수 없으니까 타인과의 관계성이나 사회적 의미 부여"}, {"start": 430.0, "end": 435.6, "text": "혹은 거대한 업적 달성 같은 새로운 동기를 제시해야 하는 아주 까다로운 시기죠"}, {"start": 435.6, "end": 442.4, "text": "말목장 경영 게임에 미쳐있던 때가 생각나는데요. 그 게임 초반 온보딩이 진짜 악마 같았거든요"}, {"start": 442.4, "end": 444.15999999999997, "text": "아 어떤 시기였길래요?"}, {"start": 444.15999999999997, "end": 448.64, "text": "게임을 깔자마자 첫 경주를 시키는데 무조건 1등을 하게 해줘요"}, {"start": 448.64, "end": 453.2, "text": "승리의 긍정적 감정을 빡 주고 예쁜 말을 보상으로 주거든요"}, {"start": 453.2, "end": 455.59999999999997, "text": "전형적인 초반 동기부여 방식이네요"}, {"start": 455.59999999999997, "end": 459.03999999999996, "text": "그러니까요. 말이 생기니까 목장을 늘리고 싶고"}, {"start": 459.03999999999996, "end": 464.56, "text": "그러려면 코인이 필요하고 코인 벌려고 다시 경주를 뛰게 되는 이 무한 루프"}, {"start": 464.56, "end": 467.28, "text": "이거 진짜 완벽한 순환 구조 설계 아닌가요?"}, {"start": 467.28, "end": 470.4, "text": "오 겉보기엔 굉장히 매끄럽고 훌륭해 보이죠"}, {"start": 470.4, "end": 475.84, "text": "하지만 시스템을 설계하는 사람이라면 방금 말씀하신 그 완벽해 보이는 흐름을"}, {"start": 475.84, "end": 479.44, "text": "비판적으로 뜯어보는 검증 단계를 반드시 거쳐야 합니다"}, {"start": 479.44, "end": 482.08, "text": "자아도취에 빠지만 치명적인 오류를 놓치거든요"}, {"start": 482.08, "end": 483.28, "text": "검증이요?"}, {"start": 483.28, "end": 488.15999999999997, "text": "유저 입장에서는 그냥 '와 말 예쁘다, 재밌다' 이러고 넘어가는데"}, {"start": 488.15999999999997, "end": 490.32, "text": "여기서 대체 뭘 더 검증해야 하는 거죠?"}, {"start": 490.32, "end": 494.79999999999995, "text": "기획 의도랑 유저의 실제 감정이 충돌하는 지점을 찾아야 해요"}, {"start": 494.79999999999995, "end": 499.76, "text": "예를 들어서 그 말게임에서 경주를 하려면 하트가 필요한데"}, {"start": 499.84, "end": 502.0, "text": "하트가 5분마다 하나씩 찬다고 해보죠"}, {"start": 502.0, "end": 504.64, "text": "아 네, 모바일 게임에 그런 거 진짜 많잖아요?"}, {"start": 504.64, "end": 507.84, "text": "기획자는 유저가 밤새 게임만 하는 걸 막거나"}, {"start": 507.84, "end": 511.28, "text": "내일 또 접속하게 하려고 하트를 제안했을 거예요"}, {"start": 511.28, "end": 513.84, "text": "근데 유저는 이 5분을 어떻게 느낄까요?"}, {"start": 513.84, "end": 517.12, "text": "이게 의미 있는 기다림일까요? 아니면 그냥 짜증나는 꼼수일까요?"}, {"start": 517.12, "end": 519.2, "text": "듣고 보니 엄청 찔리네요"}, {"start": 519.2, "end": 524.16, "text": "저 5분 기다리기 싫어서 현질 하거나 짜증나서 앱 꺼버린 적 많거든요"}, {"start": 524.16, "end": 527.04, "text": "그렇죠 그리고 더 무서운 질문도 있습니다"}, {"start": 527.12, "end": 529.8399999999999, "text": "유저는 그냥 목장을 예쁘게 꾸미고 싶은 건데"}, {"start": 529.8399999999999, "end": 532.56, "text": "코인은 얻으려면 억지로 경주를 뛰어야만 하잖아요"}, {"start": 532.56, "end": 536.9599999999999, "text": "오 그러게요. 목장게임인 줄 알았는데 사실상 경주게임이었네요?"}, {"start": 536.9599999999999, "end": 542.64, "text": "네 목장이 단순한 인벤토리 공간으로 전락한 건 아닌지 의심해 봐야 합니다"}, {"start": 542.64, "end": 545.76, "text": "또 경주 이겼다고 말을 너무 퍼주면"}, {"start": 545.76, "end": 548.24, "text": "나중에 유저 간 거래가 무너질 수도 있고요"}, {"start": 548.24, "end": 551.76, "text": "잠깐만요 제가 그 게임 접은 이유가 하나 생각났어요"}, {"start": 551.76, "end": 555.52, "text": "4마리가 경주를 하는데 제 말이 아무리 좋아도"}, {"start": 555.52, "end": 559.4399999999999, "text": "승률이 4분의 1. 즉, 25% 밖에 안됐거든요"}, {"start": 559.4399999999999, "end": 562.56, "text": "아 4명이니까 확률상 25%가 맞죠"}, {"start": 562.56, "end": 568.3199999999999, "text": "네 근데 4번 중에 3번을 지니까 빡쳐서 결국 앱을 지웠단 말이에요"}, {"start": 568.3199999999999, "end": 571.52, "text": "기획자 입장에서는 공평하다고 생각했겠지만"}, {"start": 571.52, "end": 574.16, "text": "유저는 좌절감이 더 크거든요"}, {"start": 574.16, "end": 577.76, "text": "이거 기획자 실수인가요? 일부러 열받게 만든 건가요?"}, {"start": 577.76, "end": 583.36, "text": "그거는 수학적 효율성에만 매몰돼서 인간의 심리를 놓친 전형적인 실수입니다"}, {"start": 583.44, "end": 586.64, "text": "사람한테는 '손실회피 성향' 이라는 게 있거든요"}, {"start": 586.64, "end": 588.4, "text": "손실회피 성향이요?"}, {"start": 588.4, "end": 591.92, "text": "이길 때보다 질 때 기분이 더 나쁘다는 그건가요?"}, {"start": 591.92, "end": 599.36, "text": "정확합니다. 25% 승리의 기쁨보다 75% 패배의 불쾌감을 훨씬 크게 느껴요"}, {"start": 599.36, "end": 604.72, "text": "머리로는 공평한 걸 알아도 막상 계속 지면, 조작이라고 분노하게 되죠"}, {"start": 604.72, "end": 610.72, "text": "그래서 기획자는 'MDA 프레임워크' 나 '메슬로우의 욕구이론' 같은 심리학 도구를 동원해서"}, {"start": 610.72, "end": 612.32, "text": "비판적 사고를 해야 합니다"}, {"start": 612.32, "end": 616.0, "text": "메슬로우의 욕구이론이 게임에도 적용된다는 게 신기하네요"}, {"start": 616.0, "end": 620.0, "text": "그럼요. 유저가 왜 그렇게 목장을 넓히려고 했을까요?"}, {"start": 620.0, "end": 622.48, "text": "단순히 가상공간을 넓히려는 게 아니라"}, {"start": 622.48, "end": 625.2800000000001, "text": "남들한테 자랑하고 싶은 '인정의 욕구'"}, {"start": 625.2800000000001, "end": 629.2800000000001, "text": "그리고 최고를 만들었다는 '자아 실현 욕구'를 채우려는 거거든요"}, {"start": 629.2800000000001, "end": 633.44, "text": "와 기획자는 진짜 멘탈이 남아나질 않겠어요"}, {"start": 633.44, "end": 638.8800000000001, "text": "자기가 밤새 만든 기획서를 아침에 망치로 부숴가며 약점을 찾아야 하는 거잖아요"}, {"start": 638.88, "end": 644.16, "text": "네 그 고통스러운 과정을 거쳐야 진짜 견고한 설계도가 나옵니다"}, {"start": 644.16, "end": 647.84, "text": "자 이제 아이디어가 완벽한 검증을 통과했다고 치죠"}, {"start": 647.84, "end": 652.88, "text": "그 다음은 이 추상적인 심리학을 엑셀 위에서 현실의 숫자로 번역하는"}, {"start": 652.88, "end": 654.88, "text": "스프레드시트의 마법이 시작됩니다"}, {"start": 654.88, "end": 659.68, "text": "여기서부터 진짜 기획자가 수학자이자 건축가가 되는 거군요"}, {"start": 659.68, "end": 661.6, "text": "머리가 좀 아파지는데요"}, {"start": 661.6, "end": 665.12, "text": "아까 레벨마다 자원 사용처가 다르다고 하셨잖아요"}, {"start": 665.12, "end": 670.24, "text": "초반엔 렙업에 다 쏟아붓고 후반엔 공성전에 돈을 불태우게 한다구요"}, {"start": 670.24, "end": 672.96, "text": "이걸 엑셀로 대체 어떻게 통제하나요?"}, {"start": 672.96, "end": 677.84, "text": "자원과 소모성 컨텐츠를 설계하는 4대 요소라는 게 있습니다"}, {"start": 677.84, "end": 681.92, "text": "첫째 한 번에 얼마나 얻고 쓰게 할지 정하는 '수량'"}, {"start": 681.92, "end": 685.76, "text": "둘째 이게 일반템인지 전설템인지 정하는 '수준'"}, {"start": 685.76, "end": 687.52, "text": "수량, 수준 그리고요?"}, {"start": 687.52, "end": 691.44, "text": "셋째는 이걸 얼마나 자주 이용할 수 있는지 정하는 '빈도'"}, {"start": 691.5200000000001, "end": 693.0400000000001, "text": "그리고 마지막 넷째가"}, {"start": 693.0400000000001, "end": 696.6400000000001, "text": "유저가 이걸 왜 해야 하는지 알려주는 '동기부여' 입니다"}, {"start": 696.6400000000001, "end": 699.2800000000001, "text": "수량, 수준, 빈도, 동기부여"}, {"start": 699.2800000000001, "end": 702.8800000000001, "text": "만약에 이 4가지가 어긋나면 밸런스가 박살나는 거네요"}, {"start": 702.8800000000001, "end": 703.9200000000001, "text": "맞아요"}, {"start": 703.9200000000001, "end": 707.2, "text": "예를 들어서 엄청나게 강한 전설의 검"}, {"start": 707.2, "end": 709.44, "text": "즉, 높은 수준의 아이템을"}, {"start": 709.44, "end": 712.24, "text": "고블린 10마리만 잡아도 툭툭 떨어지게"}, {"start": 712.24, "end": 714.08, "text": "높은 빈도로 세팅했다고 쳐보죠"}, {"start": 714.08, "end": 717.6, "text": "그럼 하루만에 서버 전체 유저가 전설의 검을 들고 다니겠네요"}, {"start": 717.6, "end": 718.4000000000001, "text": "그렇죠"}, {"start": 718.4000000000001, "end": 720.24, "text": "아이템 가치는 폭락하고"}, {"start": 720.24, "end": 723.28, "text": "유저들은 더 이상 게임을 할 동기를 잃어버리게 됩니다"}, {"start": 723.28, "end": 725.84, "text": "결국 이 4가지를 믹싱 콘솔 다루듯이"}, {"start": 725.84, "end": 729.12, "text": "미세하게 조절해서 컨텐츠를 배치해야 한다는 거군요?"}, {"start": 729.12, "end": 731.6, "text": "여기서 제가 아까 오프닝에서 말했던"}, {"start": 731.6, "end": 735.52, "text": "퇴근 후 1시간을 통제한다는 진짜 무서운 이야기가 나오는 거죠"}, {"start": 735.52, "end": 740.0, "text": "네, 컨텐츠 배치의 핵심은 바로 플레이 타임의 배분에 있습니다"}, {"start": 740.0, "end": 743.6, "text": "기획자는 먼저 게임의 전체 생애 주기를 설정해요"}, {"start": 743.6, "end": 747.44, "text": "엔딩까지 총 100시간이 필요하다고 기획 의도를 세우는 거죠"}, {"start": 747.44, "end": 751.0400000000001, "text": "아, 큰 그림을 먼저 그리고 나서 시간을 쪼개는 거군요"}, {"start": 751.0400000000001, "end": 752.0, "text": "맞아요"}, {"start": 752.0, "end": 758.8800000000001, "text": "그 100시간을 초반 20시간, 중반 50시간, 후반 30시간으로 나눕니다"}, {"start": 758.8800000000001, "end": 763.7600000000001, "text": "그리고 각 레벨 구간에서 유저가 겪을 컨텐츠 비율을 강제로 정해버려요"}, {"start": 763.7600000000001, "end": 769.84, "text": "아, 20레벨 구간에서는 사냥 50%, 퀘스트 30%, 보스레이드 20%"}, {"start": 769.84, "end": 772.8000000000001, "text": "이런 식으로 목표 지표를 딱 세우는 거네요"}, {"start": 772.8000000000001, "end": 776.32, "text": "네, 이제 여기서 소름 돋는 수학 공식이 돌아갑니다"}, {"start": 776.4000000000001, "end": 780.24, "text": "우리 게임의 퀘스트 하나는 평균 10분 걸리게 만들자고 기준을 잡아요"}, {"start": 780.24, "end": 782.8000000000001, "text": "자, 이 방송 들으시는 당신도 한번 계산해보세요"}, {"start": 782.8000000000001, "end": 784.24, "text": "오, 퀴즈인가요?"}, {"start": 784.24, "end": 788.24, "text": "총 할당된 플레이 타임이 10시간인데 퀘스트 비율이 30%예요"}, {"start": 788.24, "end": 793.36, "text": "퀘스트 하나에 10분이 걸리면 이 구간을 통과하기 위해 유저는 몇 개의 퀘스트를 깨야 할까요?"}, {"start": 793.36, "end": 798.88, "text": "어, 10시간에 30%면 3시간이고 10분짜리 퀘스트니까 18개네요"}, {"start": 798.88, "end": 800.6400000000001, "text": "와, 딱 떨어지네요"}, {"start": 800.6400000000001, "end": 801.5200000000001, "text": "맞습니다"}, {"start": 801.5200000000001, "end": 805.44, "text": "마을에서 가방 정리하는 시간 같은 잠재적 위험 요소는 미리 빼두고요"}, {"start": 805.44, "end": 808.4000000000001, "text": "이게 그냥 막연하게 '퀘스트 18개를 만들자' 가 아니라"}, {"start": 808.4000000000001, "end": 811.9200000000001, "text": "유저의 플레이 시간을 엑셀로 역산해서 나온 결과값인 겁니다"}, {"start": 811.9200000000001, "end": 813.44, "text": "미쳤네요, 진짜"}, {"start": 813.44, "end": 817.44, "text": "플레이 시간을 통제하려고 역으로 콘텐츠 수량을 뽑아낸 거잖아요"}, {"start": 817.44, "end": 818.72, "text": "그게 끝이 아닙니다"}, {"start": 818.72, "end": 823.12, "text": "이 공식을 확장하면 개발팀이 만들어야 할 전체 몬스터 숫자까지 완벽하게 계산돼요"}, {"start": 823.12, "end": 825.36, "text": "몬스터 숫자도 엑셀로 나온다고요?"}, {"start": 825.36, "end": 831.44, "text": "네, 사냥에 필요한 몬스터 수 + 퀘스트용 몬스터 수 + 보스 레이드용 추가 몬스터 수"}, {"start": 831.44, "end": 834.8800000000001, "text": "이렇게 총합을 낸 다음에 여기서 아주 중요한 숫자 하나를 뺍니다"}, {"start": 834.88, "end": 835.92, "text": "뭘 빼나요?"}, {"start": 835.92, "end": 841.12, "text": "색깔만 바꿔서 재활용할 수 있는, 즉 중복으로 이용 가능한 몬스터 숫자를 빼는 거예요"}, {"start": 841.12, "end": 846.0, "text": "그러면 비로소 그래픽 디자이너들이 새로 그려야 할 진짜 신규 몬스터 총량이 나옵니다"}, {"start": 846.0, "end": 850.4, "text": "와, 잠깐만요, 그럼 제가 어젯밤에 퀘스트 깨려고 잡은 고블린 50마리"}, {"start": 850.4, "end": 853.36, "text": "그게 우연히 마을 앞마당에 뛰어놀고 있던 게 아니었군요?"}, {"start": 853.36, "end": 854.72, "text": "전혀 우연히 아니죠"}, {"start": 854.72, "end": 859.6, "text": "기획자가 퇴근하고 1시간 접속하는 직장인 유저를 위해서"}, {"start": 859.6, "end": 863.44, "text": "정확히 10번 칼질할 수 있도록 계산해서 심어놓은 거네요"}, {"start": 863.5200000000001, "end": 867.36, "text": "내 자유도, 내 모험심 다 기획자 손바닥 안 이었어요"}, {"start": 867.36, "end": 871.6800000000001, "text": "철저한 계산이 만든 아름다운 환상 속을 여행하신 겁니다"}, {"start": 871.6800000000001, "end": 874.32, "text": "레벨 49에서 50으로 넘어갈 때"}, {"start": 874.32, "end": 877.7600000000001, "text": "유독 경험치가 안 오르고 지루했던 구간 기억하시나요?"}, {"start": 877.7600000000001, "end": 879.6800000000001, "text": "아, 마의 구간 있잖아요"}, {"start": 879.6800000000001, "end": 880.96, "text": "엄청 짜증이 났는데"}, {"start": 880.96, "end": 883.6800000000001, "text": "그게 유저 근성이 부족해서가 아니라"}, {"start": 883.6800000000001, "end": 886.5600000000001, "text": "기획자가 다음 콘텐츠를 다 못 만들어서"}, {"start": 886.5600000000001, "end": 890.6400000000001, "text": "콘텐츠 부족을 숨기려고 고의로 플레이타임을 늘려놓은 걸 수도 있습니다"}, {"start": 890.6400000000001, "end": 893.0400000000001, "text": "진짜 무서운 사람들이네요"}, {"start": 893.04, "end": 895.8399999999999, "text": "자, 이렇게 치밀한 엑셀 작업이 끝났다면"}, {"start": 895.8399999999999, "end": 900.16, "text": "이제 이걸 실제 게임 화면 안에 집어넣는 실무 작업이 남았습니다"}, {"start": 900.16, "end": 902.56, "text": "기획서에서 화면으로 넘어가는 건데"}, {"start": 902.56, "end": 905.68, "text": "여기서 원본 자료에 엄청 재밌는 비유가 나오잖아요?"}, {"start": 905.68, "end": 908.3199999999999, "text": "아, 참치김밥이랑 치즈김밥 비유 말씀이시죠?"}, {"start": 908.3199999999999, "end": 912.48, "text": "네, 콘텐츠랑 리소스 개념을 이 김밥에 비유한 거 보고"}, {"start": 912.48, "end": 914.16, "text": "저 진짜 무릎을 쳤습니다"}, {"start": 914.16, "end": 918.0799999999999, "text": "기획 처음 배울 때 콘텐츠랑 리소스를 되게 헷갈려하거든요"}, {"start": 918.0799999999999, "end": 921.04, "text": "메뉴판에 예쁘게 적혀있는 완성된 요리"}, {"start": 921.12, "end": 925.04, "text": "유저가 돈 내고 사먹는 참치김밥 자체가 바로 콘텐츠입니다"}, {"start": 925.04, "end": 928.56, "text": "그럼 리소스는 그 김밥을 만드는 재료들이겠네요?"}, {"start": 928.56, "end": 931.52, "text": "주방 뒤에 있는 밥, 김, 참치 같은 거요?"}, {"start": 931.52, "end": 932.7199999999999, "text": "정확합니다"}, {"start": 932.7199999999999, "end": 938.16, "text": "게임 개발에서 리소스란 '콘텐츠를 구성하는 파일 단위의 조각들' 을 뜻해요"}, {"start": 938.16, "end": 942.24, "text": "컴퓨터 폴더 안에 눈에 보이는 파일로 존재하면 무조건 리소스입니다"}, {"start": 942.24, "end": 946.0, "text": "아하, 그러면 몬스터 얼굴이 그려진 이미지 파일이나"}, {"start": 946.0, "end": 950.24, "text": "3D 메쉬 파일, 그리고 칼로 때릴 때 나는 촥 하는 효과음파일?"}, {"start": 950.24, "end": 951.52, "text": "네, 그런 오디오 파일들"}, {"start": 951.52, "end": 955.92, "text": "심지어 몬스터가 유저를 인식하게 만드는 AI 스크립트 파일까지"}, {"start": 955.92, "end": 960.96, "text": "이 모든 파일들이 참치김밥 만드는 김, 밥, 단무지인 거군요"}, {"start": 960.96, "end": 962.0, "text": "그렇죠"}, {"start": 962.0, "end": 964.4, "text": "반면에 기획자가 엑셀 표에"}, {"start": 964.4, "end": 966.64, "text": "이 검의 가격은 10만 골드다"}, {"start": 966.64, "end": 968.5600000000001, "text": "이 무기는 전설 등급이다"}, {"start": 968.5600000000001, "end": 971.28, "text": "이렇게 적어 놓은 건 파일이 아니잖아요"}, {"start": 971.28, "end": 974.64, "text": "아, 가격표나 매운맛 정도 같은 거니까"}, {"start": 974.64, "end": 976.48, "text": "그건 콘텐츠의 속성이네요"}, {"start": 976.48, "end": 977.84, "text": "리소스가 아니고요"}, {"start": 977.84, "end": 980.96, "text": "맞습니다, 아주 정리가 잘 되셨네요"}, {"start": 980.96, "end": 984.32, "text": "그럼 실무 기획자는 이 김밥 레시피랑"}, {"start": 984.32, "end": 987.36, "text": "재료 창고를 어떻게 연동해서 관리할까요?"}, {"start": 987.36, "end": 990.4, "text": "어떻게 하죠? 파일이 한두 개가 아닐 텐데요"}, {"start": 990.4, "end": 996.1600000000001, "text": "엑셀에서 콘텐츠 리스트업 시트랑 리소스 시트를 유기적으로 연동해 놓습니다"}, {"start": 996.1600000000001, "end": 997.9200000000001, "text": "만약 특정 레벨 구간에"}, {"start": 997.9200000000001, "end": 1001.52, "text": "신규 보스 몬스터라는 참치김밥을 새로 올린다고 쳐보죠"}, {"start": 1001.52, "end": 1003.2, "text": "네, 신메뉴 출시네요"}, {"start": 1003.2, "end": 1006.4000000000001, "text": "기획자가 콘텐츠 시트에 몬스터 번호랑"}, {"start": 1006.48, "end": 1008.48, "text": "공격력을 입력하는 순간"}, {"start": 1008.48, "end": 1013.6, "text": "리소스 시트에서는 이걸 구현하기 위해 그려야 할 UI, 3D 모델링,"}, {"start": 1013.6, "end": 1018.24, "text": "이펙트, 사운드 파일 수량이 자동으로 쫙 계산돼서 나옵니다"}, {"start": 1018.24, "end": 1023.68, "text": "와, 레시피 바꾸면 참치랑 밥 재고량이 실시간으로 반영되는 거랑 똑같네요"}, {"start": 1023.68, "end": 1027.6, "text": "그렇죠, 그러면 그래픽 디자이너나 프로그래머는"}, {"start": 1027.6, "end": 1030.08, "text": "그 리소스 매니저 문서만 딱 보고"}, {"start": 1030.08, "end": 1033.84, "text": "아, 이번 주엔 칼 휘두르는 이펙트 3개만 그리면 되네"}, {"start": 1033.84, "end": 1036.72, "text": "하고 자기 작업량을 직관적으로 아는 겁니다"}, {"start": 1036.72, "end": 1037.84, "text": "대박입니다"}, {"start": 1037.84, "end": 1040.9599999999998, "text": "결국 게임 기획자란 유저 입맛을 자극하는"}, {"start": 1040.9599999999998, "end": 1045.28, "text": "궁극의 참치김밥 레시피를 짜는 요리사이자 예술가이면서"}, {"start": 1045.28, "end": 1048.72, "text": "동시에 창고에 김이 몇 장 남았는지"}, {"start": 1048.72, "end": 1052.08, "text": "엑셀로 칼같이 통제하는 재고 관리 매니저인 거네요"}, {"start": 1052.08, "end": 1053.76, "text": "완벽한 요약입니다"}, {"start": 1053.76, "end": 1058.48, "text": "거시적인 재미를 설계하면서 미시적인 작업량까지 조율해야 하는"}, {"start": 1058.48, "end": 1060.6399999999999, "text": "아주 고독하고 복잡한 직업이죠"}, {"start": 1060.72, "end": 1064.72, "text": "듣다 보니까 정말 숨이 턱 막힐 정도로 정교한데요"}, {"start": 1064.72, "end": 1069.8400000000001, "text": "자, 그럼 오늘 우리가 21페이지에 달하는 자료를 샅샅이 파헤치면서"}, {"start": 1069.8400000000001, "end": 1071.76, "text": "엑셀의 마법을 엿봤는데"}, {"start": 1071.76, "end": 1074.64, "text": "이게 결국 우리한테 남기는 진짜 의미는 뭘까요?"}, {"start": 1074.64, "end": 1080.4, "text": "우리가 게임하면서 느끼는 재미, 성취감, 분노 같은 감정들 있잖아요?"}, {"start": 1080.4, "end": 1082.3200000000002, "text": "이 극도로 주관적인 가치를"}, {"start": 1082.3200000000002, "end": 1087.2, "text": "가장 차갑고 객관적인 숫자로 분해하는 과정이 게임 기획입니다"}, {"start": 1087.2, "end": 1090.24, "text": "감정을 숫자로 바꾼다. 멋진 말이네요"}, {"start": 1090.32, "end": 1093.92, "text": "그 숫자로 쪼개진 유저의 심리를 비판적으로 검증하고"}, {"start": 1093.92, "end": 1099.04, "text": "다시 리소스라는 파편들을 모아 거대한 컨텐츠 순환 생태계로 조립해내는 거죠"}, {"start": 1099.04, "end": 1102.32, "text": "유저는 그냥 아름다운 시계 바늘에 감탄하지만"}, {"start": 1102.32, "end": 1107.6, "text": "설계자는 무대 뒤에서 수천 개의 톱니 바퀴를 깎고 기름을 치는 시계공과 같습니다"}, {"start": 1107.6, "end": 1112.88, "text": "와 오늘 이야기 듣고 나니까 제 스마트폰 속 게임들이 완전히 다르게 보일 것 같아요"}, {"start": 1112.88, "end": 1118.64, "text": "이 방송을 듣는 당신도 오늘 밤 게임 접속해서 퀘스트 누를 때 한번 상상해보세요"}, {"start": 1118.64, "end": 1120.08, "text": "뭐라고 상상하면 좋을까요?"}, {"start": 1120.08, "end": 1123.36, "text": "내 눈앞에서 뛰어다니는 이 귀여운 슬라임 10마리"}, {"start": 1123.36, "end": 1126.8799999999999, "text": "이게 내 퇴근 후 피 같은 15분을 집어 삼키려고"}, {"start": 1126.8799999999999, "end": 1132.32, "text": "누군가 치밀하게 계산해서 내 입에 쑤셔 넣은 참치김밥이구나 하고 말이죠"}, {"start": 1132.32, "end": 1134.3999999999999, "text": "아마 그런 시각을 갖게 되신다면"}, {"start": 1134.3999999999999, "end": 1137.4399999999998, "text": "게임뿐만 아니라, 우리가 쓰는 수많은 앱이나"}, {"start": 1137.4399999999998, "end": 1141.76, "text": "현실의 사회 시스템까지도 완전히 새로운 관점으로 분석하실 수 있을 겁니다"}, {"start": 1141.76, "end": 1143.1999999999998, "text": "바로 그겁니다"}, {"start": 1143.1999999999998, "end": 1145.6, "text": "게임은 이렇게 유저가 끝까지 만렙을 찍도록"}, {"start": 1145.6, "end": 1149.76, "text": "보상 타이밍이랑 시련을 수학적으로 다 설계해 놓잖아요"}, {"start": 1149.76, "end": 1155.68, "text": "그렇다면 만약에 맨날 작심삼일로 끝나는 영어 공부나 지루한 다이어트 같은"}, {"start": 1155.68, "end": 1160.24, "text": "현실의 퀘스트들의 이 컨텐츠 순환 구조랑 레벨별 보상 엑셀 표를"}, {"start": 1160.24, "end": 1162.32, "text": "똑같이 적용해 본다면 어떨까요?"}, {"start": 1162.32, "end": 1164.8799999999999, "text": "현실이라는 게임의 기획을 도입하는 거네요?"}, {"start": 1164.8799999999999, "end": 1168.8799999999999, "text": "네, 당신이 플레이하는 현실이라는 하드코어 게임에서"}, {"start": 1168.8799999999999, "end": 1172.0, "text": "대체 어떤 리소스를 어느 타이밍에 배치해야"}, {"start": 1172.0, "end": 1175.12, "text": "레벨업이 가장 효율적이고 짜릿해질까요?"}, {"start": 1175.12, "end": 1178.16, "text": "오늘 우리가 훔쳐본 이 기획자들의 엑셀 마법을"}, {"start": 1178.24, "end": 1181.3600000000001, "text": "당신 삶의 시스템에도 직접 설계해 보시기 바랍니다"}, {"start": 1181.3600000000001, "end": 1185.1200000000001, "text": "지금까지 당신의 현실 레벨업을 응원하는 딥다이브였습니다"}];

(function() { // IIFE 래핑 — 전역 오염 방지
// ========== 인터랙티브 편집/메모 API 연동 ==========
const SC_API = '';
const SC_REPO = document.querySelector('meta[name="sc-repo"]')?.content || '';
let _scData = { edits: {}, memos: {}, isAdmin: false };
let _scLoaded = false;
let _editMode = new URLSearchParams(location.search).has('edit');
let _subtitleMode = new URLSearchParams(location.search).has('subtitle');

async function loadOverlayData() {
    if (!SC_REPO) return;
    try {
        const res = await fetch(`${SC_API}/api/data/${encodeURIComponent(SC_REPO)}`, {
            credentials: 'include'
        });
        if (!res.ok) { showSlide(currentSlide); return; }
        _scData = await res.json();

        // 수정본 적용: SLIDES content + title 교체 + 목차 DOM 갱신
        for (const [pid, edit] of Object.entries(_scData.edits)) {
            const idx = SLIDES.findIndex(s => s.id === pid);
            if (idx !== -1) {
                SLIDES[idx]._originalContent = SLIDES[idx]._originalContent || SLIDES[idx].content;
                SLIDES[idx].content = edit.content;
                if (edit.title) {
                    SLIDES[idx]._originalTitle = SLIDES[idx]._originalTitle || SLIDES[idx].title;
                    SLIDES[idx].title = edit.title;
                    // 목차 DOM도 갱신
                    if (_indexItems[idx]) _indexItems[idx].querySelector('.idx-title').textContent = edit.title;
                    if (_overlayItems[idx]) _overlayItems[idx].querySelector('.idx-title').textContent = edit.title;
                }
            }
        }

        // 자막 수정본 적용
        if (_scData.transcriptEdits) {
            for (var segId in _scData.transcriptEdits) {
                var idx = parseInt(segId);
                if (idx < TRANSCRIPT.length) {
                    TRANSCRIPT[idx].text = _scData.transcriptEdits[segId];
                }
            }
            if (_subtitleMode && typeof _steApplyOverlay === 'function') {
                _steApplyOverlay(_scData.transcriptEdits);
            }
        }

        _scLoaded = true;

        // 관리자가 아니면 편집 모드 비활성화
        if (!_scData.isAdmin) {
            _editMode = false;
            var bar = document.querySelector('.edit-bar');
            if (bar) bar.remove();
            document.body.style.paddingTop = '';
            var ce = document.getElementById('slide-content');
            if (ce) ce.contentEditable = 'false';
            var te = document.getElementById('slide-title');
            if (te) te.contentEditable = 'false';
            _subtitleMode = false;
            var steArea = document.getElementById('subtitle-edit-area');
            if (steArea) steArea.style.display = 'none';
            var slideArea = document.getElementById('slide-area');
            if (slideArea) slideArea.style.display = '';
        }

        // KV 적용 완료 후 첫 렌더 (원본 flash 없음)
        showSlide(currentSlide);
    } catch (e) {
        console.warn('SC API 연결 실패:', e);
        showSlide(currentSlide);
    }
}

// ========== 편집 모드 UI ==========
function initEditMode() {
    if (!_editMode) return;

    // 편집 바 삽입 (?edit=1이면 무조건 표시)
    const bar = document.createElement('div');
    bar.className = 'edit-bar visible';
    bar.innerHTML = '<span class="edit-bar-label">편집 모드</span>' +
        '<div class="edit-bar-actions">' +
        '<span class="edit-save-status" id="edit-save-status">저장됨</span>' +
        '<span class="edit-save-error" id="edit-save-error">저장 실패</span>' +
        '<button class="btn-cancel">취소</button>' +
        '<button class="btn-save">저장</button>' +
        '</div>';
    bar.querySelector('.btn-cancel').addEventListener('click', cancelEdit);
    bar.querySelector('.btn-save').addEventListener('click', saveEdit);
    document.body.prepend(bar);

    // content + title 편집 가능하게
    document.getElementById('slide-content').contentEditable = 'true';
    document.getElementById('slide-title').contentEditable = 'true';

    // body에 패딩 추가 (편집 바 높이만큼)
    document.body.style.paddingTop = '48px';
}

let _editDirty = false;

// content/title 변경 감지
document.addEventListener('input', (e) => {
    if (e.target.id === 'slide-content' || e.target.closest('#slide-content') || e.target.id === 'slide-title') {
        _editDirty = true;
    }
});

async function saveEdit() {
    const contentEl = document.getElementById('slide-content');
    const titleEl = document.getElementById('slide-title');
    const slide = SLIDES[currentSlide];
    // 메모 패널이 content 안에 들어가지 않도록 임시 제거 후 innerHTML 취득
    var memoPanel = document.querySelector('.memo-panel');
    if (memoPanel) memoPanel.remove();
    const content = contentEl.innerHTML;
    const title = titleEl.textContent;

    try {
        const res = await fetch(
            SC_API + '/api/edit/' + encodeURIComponent(SC_REPO) + '/' + slide.id,
            {
                method: 'PUT',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: content, title: title }),
            }
        );
        if (!res.ok) throw new Error('저장 실패');

        // 로컬 데이터 갱신
        slide._originalContent = slide._originalContent || slide.content;
        slide._originalTitle = slide._originalTitle || slide.title;
        slide.content = content;
        slide.title = title;
        _scData.edits[slide.id] = { content: content, title: title, updatedAt: new Date().toISOString() };
        _editDirty = false;
        // 목차 제목도 갱신
        var idxItem = document.querySelectorAll('#index-list .index-item')[currentSlide];
        if (idxItem) idxItem.querySelector('.idx-title').textContent = title;
        var ovItem = document.querySelectorAll('#index-overlay-list .index-item')[currentSlide];
        if (ovItem) ovItem.querySelector('.idx-title').textContent = title;
        // 메모 패널 복원
        buildMemoPanel();
        // 저장됨 상태 표시
        var stat = document.getElementById('edit-save-status');
        if (stat) { stat.style.opacity = '1'; setTimeout(function() { stat.style.opacity = '0'; }, 2500); }
    } catch (e) {
        buildMemoPanel();
        // 저장 실패 상태 표시
        var err = document.getElementById('edit-save-error');
        if (err) { err.style.opacity = '1'; setTimeout(function() { err.style.opacity = '0'; }, 3000); }
    }
}

function cancelEdit() {
    const slide = SLIDES[currentSlide];
    var contentEl = document.getElementById('slide-content');
    // 수정 전 상태로 복원
    contentEl.innerHTML = slide.content;
    _editDirty = false;
}

// ========== 메모 UI ==========
let _memoTimers = {};

function buildMemoPanel() {
    // 기존 메모 패널 제거
    var old = document.querySelector('.memo-panel');
    if (old) old.remove();

    var slide = SLIDES[currentSlide];
    var memoData = _scData.memos[slide.id];
    var canEdit = _editMode && _scData.isAdmin;

    var panel = document.createElement('div');
    panel.className = 'memo-panel' + (memoData ? ' has-memo open' : '');

    var memoIcon = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>';

    panel.innerHTML = '<div class="memo-header">' +
        memoIcon + ' 메모' + (memoData ? '' : ' (없음)') +
        '</div>' +
        '<div class="memo-body">' +
        '<textarea class="memo-text" placeholder="메모를 입력하세요..."' +
        (canEdit ? '' : ' readonly') + '>' + (memoData ? memoData.text : '') + '</textarea>' +
        '<div class="memo-saved" id="memo-saved">저장됨</div>' +
        '</div>';

    // 헤더 클릭 시 패널 열기/닫기
    panel.querySelector('.memo-header').addEventListener('click', function() {
        panel.classList.toggle('open');
    });

    // slide-content 다음 형제로 삽입
    var contentEl = document.getElementById('slide-content');
    contentEl.parentNode.insertBefore(panel, contentEl.nextSibling);

    // 편집 가능할 때만 자동 저장
    if (canEdit) {
        var textarea = panel.querySelector('.memo-text');
        textarea.addEventListener('input', function() {
            var sid = slide.id;
            clearTimeout(_memoTimers[sid]);
            _memoTimers[sid] = setTimeout(function() { saveMemo(sid, textarea.value); }, 1000);
        });
    }
}

async function saveMemo(sectionId, text) {
    try {
        if (text.trim() === '') {
            await fetch(SC_API + '/api/memo/' + encodeURIComponent(SC_REPO) + '/' + sectionId, {
                method: 'DELETE', credentials: 'include',
            });
            delete _scData.memos[sectionId];
        } else {
            var res = await fetch(SC_API + '/api/memo/' + encodeURIComponent(SC_REPO) + '/' + sectionId, {
                method: 'PUT', credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text }),
            });
            if (!res.ok) throw new Error('저장 실패');
            _scData.memos[sectionId] = { text: text, updatedAt: new Date().toISOString() };
        }
        var saved = document.getElementById('memo-saved');
        if (saved) { saved.classList.add('visible'); setTimeout(function() { saved.classList.remove('visible'); }, 2000); }
    } catch (e) {
        console.warn('메모 저장 실패:', e);
    }
}

let currentSlide = 0;
let isAutoSync = true;
let lastSubIdx = -1;
// 이전 active 엘리먼트 캐싱 (querySelectorAll 제거)
let _prevNavDot = null;
let _prevIndexItem = null;
let _prevMapSeg = null;
const audio = document.getElementById('audio');
const playBtn = document.getElementById('play-btn');
const ICON_PLAY  = '<svg width="12" height="14" viewBox="0 0 12 14" fill="none"><path d="M1 1.5L11 7L1 12.5V1.5Z" fill="currentColor"/></svg>';
const ICON_PAUSE = '<svg width="12" height="14" viewBox="0 0 12 14" fill="none"><rect x="1" y="1" width="3.5" height="12" rx="1" fill="currentColor"/><rect x="7.5" y="1" width="3.5" height="12" rx="1" fill="currentColor"/></svg>';
const timeDisplay = document.getElementById('time-display');
const seekBar = document.getElementById('seek-bar');
// DOM 참조 캐싱
const _navDots = [];
const _indexItems = [];
const _overlayItems = [];
const _mapSegments = [];
// RAF 스로틀링
let _rafPending = false;

// 오디오 포함 슬라이드를 시작시간 순으로 정렬한 인덱스 (동기화용)
const audioSlides = SLIDES
    .map((s, i) => ({idx: i, start: s.start, end: s.end, hasAudio: s.hasAudio}))
    .filter(s => s.hasAudio && s.start !== null)
    .sort((a, b) => a.start - b.start);

function init() {
    buildNav();
    buildIndex();
    buildAudioMap();
    // SC_REPO가 있으면 loadOverlayData가 KV 적용 후 첫 렌더 담당 (원본 flash 방지)
    if (!SC_REPO) showSlide(0);
    audio.addEventListener('timeupdate', () => {
        if (_rafPending) return;
        _rafPending = true;
        requestAnimationFrame(() => { _rafPending = false; onTimeUpdate(); });
    });
    // 오디오 메타데이터 로드 시 시크바 max 갱신
    audio.addEventListener('loadedmetadata', updateSeekBarMax);
    audio.addEventListener('durationchange', updateSeekBarMax);
    // canplay 이벤트도 대비 (일부 브라우저/포맷에서 loadedmetadata가 늦게 발생)
    audio.addEventListener('canplay', updateSeekBarMax);
    // 슬라이더 드래그 시: 오디오 위치 이동 + 즉시 슬라이드 동기화
    seekBar.addEventListener('input', () => {
        audio.currentTime = seekBar.value;
        isAutoSync = true;
        syncSlideToTime(audio.currentTime);
        updateSubtitle(audio.currentTime);
    });
    // 일시정지 상태에서 seek 완료 시에도 슬라이드 동기화
    audio.addEventListener('seeked', () => {
        syncSlideToTime(audio.currentTime);
        updateTimeDisplay();
        updateSubtitle(audio.currentTime);
    });
    // 모바일: 메타데이터 미로드 시 로딩 상태 표시
    if (!audio.duration || !isFinite(audio.duration)) {
        playBtn.classList.add('loading');
        timeDisplay.classList.add('loading');
        timeDisplay.textContent = '로딩 중...';
    }
}

function updateSeekBarMax() {
    if (audio.duration && isFinite(audio.duration)) {
        seekBar.max = audio.duration;
        updateTimeDisplay();
        playBtn.classList.remove('loading');
        timeDisplay.classList.remove('loading');
    }
}

function buildNav() {
    const nav = document.getElementById('slide-nav');
    SLIDES.forEach((slide, i) => {
        const dot = document.createElement('button');
        dot.className = 'nav-dot ' + (slide.hasAudio ? 'has-audio' : 'no-audio');
        dot.textContent = slide.id.replace('P', '');
        dot.title = slide.id + ' — ' + slide.title;
        dot.onclick = () => { isAutoSync = false; showSlide(i); };
        nav.appendChild(dot);
        _navDots.push(dot);
    });
}

function _buildIndexItem(slide, container) {
    const item = document.createElement('div');
    item.className = 'index-item' + (slide.hasAudio ? ' has-audio' : '');
    const idSpan = document.createElement('span');
    idSpan.className = 'idx-id';
    idSpan.textContent = slide.id;
    const titleSpan = document.createElement('span');
    titleSpan.className = 'idx-title';
    titleSpan.textContent = slide.title;
    item.appendChild(idSpan);
    item.appendChild(titleSpan);
    container.appendChild(item);
    return item;
}

function buildIndex() {
    const list = document.getElementById('index-list');
    SLIDES.forEach((slide, i) => {
        const item = _buildIndexItem(slide, list);
        item.onclick = () => { isAutoSync = false; showSlide(i); };
        _indexItems.push(item);
    });
}

// URL ?q= 파라미터로 전달된 키워드가 포함된 목차 항목 하이라이트
function highlightKeywordMatches() {
    const params = new URLSearchParams(window.location.search);
    const q = params.get('q');
    if (!q) return;
    const kw = q.trim().replace(/\s/g, '').toLowerCase();
    if (!kw) return;
    SLIDES.forEach((slide, i) => {
        // HTML 태그 제거 후 띄어쓰기 제거 + 소문자 변환
        const text = (slide.title + ' ' + slide.content.replace(/<[^>]*>/g, ''))
            .replace(/\s/g, '').toLowerCase();
        if (text.indexOf(kw) !== -1) {
            if (_indexItems[i]) _indexItems[i].classList.add('keyword-match');
            if (_overlayItems[i]) _overlayItems[i].classList.add('keyword-match');
        }
    });
}

function buildAudioMap() {
    const map = document.getElementById('audio-map');
    if (!map) return;
    let prevEnd = 0;
    audioSlides.forEach((s, i) => {
        const slide = SLIDES[s.idx];
        const duration = s.end - s.start;
        // 시간 갭이 있으면 빈 공간 삽입
        if (s.start > prevEnd + 1) {
            const gap = document.createElement('div');
            gap.className = 'map-gap';
            gap.style.flexGrow = (s.start - prevEnd).toFixed(1);
            map.appendChild(gap);
        }
        const seg = document.createElement('div');
        seg.className = 'map-segment';
        seg.dataset.idx = s.idx;
        seg.style.flexGrow = duration.toFixed(1);
        seg.textContent = slide.id.replace('P', '');
        seg.title = slide.id + ' — ' + slide.title;
        seg.onclick = () => {
            audio.currentTime = s.start;
            isAutoSync = true;
            syncSlideToTime(s.start);
        };
        map.appendChild(seg);
        _mapSegments.push({el: seg, idx: s.idx});
        prevEnd = s.end;
    });
}

function updateAudioMap(currentIdx) {
    if (_prevMapSeg) _prevMapSeg.classList.remove('active');
    _prevMapSeg = null;
    for (let i = 0; i < _mapSegments.length; i++) {
        if (_mapSegments[i].idx === currentIdx) {
            _mapSegments[i].el.classList.add('active');
            _prevMapSeg = _mapSegments[i].el;
            break;
        }
    }
}

function showSlide(index) {
    if (index < 0 || index >= SLIDES.length) return;
    // 편집 모드: 저장 안 된 변경 경고
    if (_editMode && _editDirty) {
        if (!confirm('저장하지 않은 수정이 있습니다. 이동하시겠습니까?')) return;
        _editDirty = false;
    }
    currentSlide = index;
    const slide = SLIDES[index];
    document.getElementById('slide-id').textContent = slide.id;
    document.getElementById('slide-title').textContent = slide.title;
    const contentEl = document.getElementById('slide-content');
    contentEl.style.animation = 'none';
    contentEl.offsetHeight; // 리플로우 트리거
    contentEl.style.animation = '';
    contentEl.innerHTML = slide.content;
    const badge = document.getElementById('slide-badge');
    if (slide.hasAudio) {
        badge.textContent = '';
        badge.className = '';
        badge.style.display = 'none';
    } else {
        badge.textContent = '교안 전용';
        badge.className = 'badge-no-audio';
        badge.style.display = '';
    }
    // 네비게이션 도트 활성화 (캐싱)
    if (_prevNavDot) _prevNavDot.classList.remove('active');
    if (_navDots[index]) { _navDots[index].classList.add('active'); _prevNavDot = _navDots[index]; }
    // 인덱스 패널 활성화 (캐싱)
    if (_prevIndexItem) _prevIndexItem.classList.remove('active');
    if (_indexItems[index]) {
        _indexItems[index].classList.add('active');
        _indexItems[index].scrollIntoView({block: 'nearest', behavior: 'smooth'});
        _prevIndexItem = _indexItems[index];
    }
    // 오디오 맵 활성화
    updateAudioMap(index);

    // 편집 모드: contenteditable 유지
    if (_editMode) {
        document.getElementById('slide-content').contentEditable = 'true';
        document.getElementById('slide-title').contentEditable = 'true';
    }
    // 메모 패널: 이전 패널 항상 제거 후 조건부 재생성
    var oldMemo = document.querySelector('.memo-panel');
    if (oldMemo) oldMemo.remove();
    if (_scLoaded && (_editMode || (_scData.memos && _scData.memos[slide.id]))) {
        buildMemoPanel();
    }

    window.scrollTo({top: 0, behavior: 'smooth'});
}

// 시간 기반 슬라이드 동기화 (바이너리 서치)
function syncSlideToTime(t) {
    let lo = 0, hi = audioSlides.length - 1, result = -1;
    while (lo <= hi) {
        const mid = (lo + hi) >> 1;
        if (audioSlides[mid].start <= t) { result = mid; lo = mid + 1; }
        else { hi = mid - 1; }
    }
    const targetIdx = result >= 0 ? audioSlides[result].idx : -1;
    if (targetIdx >= 0 && targetIdx !== currentSlide) {
        showSlide(targetIdx);
    }
}

function onTimeUpdate() {
    const t = audio.currentTime;
    seekBar.value = t;
    updateTimeDisplay();
    updateSubtitle(t);
    if (_subtitleMode) _steSyncHighlight(t);
    if (!isAutoSync) return;
    syncSlideToTime(t);
}

function updateTimeDisplay() {
    const cur = formatTime(audio.currentTime);
    const dur = formatTime(audio.duration || 0);
    timeDisplay.textContent = cur + ' / ' + dur;
}

function formatTime(sec) {
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return m + ':' + (s < 10 ? '0' : '') + s;
}

function togglePlay() {
    if (audio.paused) {
        var p = audio.play(); if (p && p.catch) p.catch(function(){});
        playBtn.innerHTML = ICON_PAUSE;
        isAutoSync = true;
    } else {
        audio.pause();
        playBtn.innerHTML = ICON_PLAY;
    }
}

function changeSpeed(val) {
    audio.playbackRate = parseFloat(val);
}

function skipTime(sec) {
    audio.currentTime = Math.max(0, Math.min(audio.duration || 0, audio.currentTime + sec));
}

const SPEED_STEPS = [0.5, 0.75, 1.0, 1.25, 1.5, 1.75, 2.0];
document.addEventListener('keydown', (e) => {
    // 편집 모드에서는 키보드 단축키 비활성화
    if (_editMode || _subtitleMode) return;
    if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
    if (e.code === 'ArrowLeft') { showSlide(currentSlide - 1); isAutoSync = false; }
    if (e.code === 'ArrowRight') { showSlide(currentSlide + 1); isAutoSync = false; }
    if (e.key === '-' || e.key === '_') {
        const cur = SPEED_STEPS.indexOf(audio.playbackRate);
        const idx = cur > 0 ? cur - 1 : 0;
        audio.playbackRate = SPEED_STEPS[idx];
        document.getElementById('speed-select').value = SPEED_STEPS[idx];
    }
    if (e.key === '=' || e.key === '+') {
        const cur = SPEED_STEPS.indexOf(audio.playbackRate);
        const idx = cur < SPEED_STEPS.length - 1 ? (cur === -1 ? 2 : cur + 1) : SPEED_STEPS.length - 1;
        audio.playbackRate = SPEED_STEPS[idx];
        document.getElementById('speed-select').value = SPEED_STEPS[idx];
    }
});

function updateSubtitle(t) {
    if (typeof TRANSCRIPT === 'undefined' || TRANSCRIPT.length === 0) return;
    const idx = findTranscriptIdx(t);
    if (idx === lastSubIdx) return;
    lastSubIdx = idx;
    const el = document.getElementById('subtitle-text');
    if (el) el.textContent = idx >= 0 ? TRANSCRIPT[idx].text : '';
}

function findTranscriptIdx(t) {
    let lo = 0, hi = TRANSCRIPT.length - 1, result = -1;
    while (lo <= hi) {
        const mid = (lo + hi) >> 1;
        if (TRANSCRIPT[mid].start <= t) { result = mid; lo = mid + 1; }
        else { hi = mid - 1; }
    }
    if (result >= 0 && t <= TRANSCRIPT[result].end) return result;
    return -1;
}

// 모바일 목차 오버레이
function buildOverlayIndex() {
    const list = document.getElementById('index-overlay-list');
    if (!list) return;
    SLIDES.forEach((slide, i) => {
        const item = _buildIndexItem(slide, list);
        item.onclick = () => { isAutoSync = false; showSlide(i); closeOverlay(); };
        _overlayItems.push(item);
    });
}

function openOverlay() {
    const ov = document.getElementById('index-overlay');
    ov.classList.add('open');
    // 현재 슬라이드 하이라이트 (캐싱된 참조)
    _overlayItems.forEach((item, i) => {
        item.classList.toggle('active', i === currentSlide);
        if (i === currentSlide) item.scrollIntoView({block: 'center', behavior: 'smooth'});
    });
}

function closeOverlay() {
    document.getElementById('index-overlay').classList.remove('open');
}

// 가로 스크롤 영역: 마우스 휠 → 가로 스크롤 변환
document.querySelectorAll('#audio-map, #slide-nav').forEach(el => {
    el.addEventListener('wheel', (e) => {
        if (el.scrollWidth <= el.clientWidth) return; // 스크롤 불필요
        e.preventDefault();
        el.scrollLeft += e.deltaY;
    }, {passive: false});
});

init();
buildOverlayIndex();
highlightKeywordMatches();
// ========== 자막 편집 모드 ==========
var _steSegments = [];
var _steOriginals = [];
var _steCurrentIdx = -1;

const STE_LS_KEY = 'subtitle_backup_' + SC_REPO;

// loadOverlayData에서 자막 편집 상태를 갱신하기 위한 브릿지
window._steApplyOverlay = function(transcriptEdits) {
    for (var segId in transcriptEdits) {
        var idx = parseInt(segId);
        if (idx < _steSegments.length) {
            _steSegments[idx].text = transcriptEdits[segId];
            _steOriginals[idx] = transcriptEdits[segId];
        }
    }
    _steRender();
    _steLsRestore();
};

function initSubtitleEdit() {
    if (!_subtitleMode) return;
    _editMode = false;

    _steSegments = TRANSCRIPT.map((t, i) => ({ id: i, start: t.start, end: t.end, text: t.text }));
    _steOriginals = TRANSCRIPT.map(t => t.text);

    var subBox = document.getElementById('subtitle-box');
    if (subBox) subBox.style.display = 'none';
    var subCtrl = document.getElementById('sub-controls');
    if (subCtrl) subCtrl.style.display = 'none';

    document.getElementById('subtitle-edit-area').style.display = 'block';
    document.getElementById('slide-area').style.display = 'none';

    // 목차 패널 + 모바일 FAB 숨김
    var idxPanel = document.getElementById('index-panel');
    if (idxPanel) idxPanel.style.display = 'none';
    var idxFab = document.getElementById('index-fab');
    if (idxFab) idxFab.style.display = 'none';
    var mobileFab = document.getElementById('mobile-fab-group');
    if (mobileFab) mobileFab.style.display = 'none';

    // 버튼 이벤트 바인딩 (IIFE 내부 함수 접근을 위해 addEventListener 사용)
    document.getElementById('ste-save-btn').addEventListener('click', function() { _steSave(); });

    var steSearchTimer;
    document.getElementById('ste-search').addEventListener('input', function() {
        clearTimeout(steSearchTimer);
        steSearchTimer = setTimeout(function() { _steRender(); }, 150);
    });

    _steRender();
}

function _steGetVisibleSegments() {
    return _steSegments;
}

function _steRender() {
    var panel = document.getElementById('ste-panel');
    panel.innerHTML = '';
    var query = (document.getElementById('ste-search').value || '').trim().toLowerCase();
    var segs = _steGetVisibleSegments();
    var shown = 0;

    segs.forEach(function(seg) {
        if (query && !seg.text.toLowerCase().includes(query)) return;
        shown++;

        var row = document.createElement('div');
        row.className = 'ste-row';
        row.dataset.id = seg.id;
        if (seg.text !== _steOriginals[seg.id]) row.classList.add('modified');

        var ts = document.createElement('span');
        ts.className = 'ste-ts';
        ts.textContent = _steFmtTime(seg.start);
        ts.title = _steFmtTime(seg.start) + ' ~ ' + _steFmtTime(seg.end);
        ts.onclick = function() { audio.currentTime = seg.start; };

        var ta = document.createElement('textarea');
        ta.className = 'ste-text';
        ta.value = seg.text;
        ta.rows = 1;
        ta.addEventListener('input', function() {
            _steAutoResize(ta);
            seg.text = ta.value;
            TRANSCRIPT[seg.id].text = ta.value;
            var modified = ta.value !== _steOriginals[seg.id];
            row.classList.toggle('modified', modified);
            _steUpdateBadge();
            _steLsBackup();
        });
        ta.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                var next = panel.querySelector('.ste-row[data-id="' + (seg.id + 1) + '"] .ste-text');
                if (next) { next.focus(); next.select(); }
            }
        });

        row.appendChild(ts);
        row.appendChild(ta);
        panel.appendChild(row);
    });

    if (shown === 0) {
        var empty = document.createElement('div');
        empty.style.cssText = 'text-align:center;padding:40px 0;color:var(--text-muted);font-size:14px;';
        empty.textContent = query ? '검색 결과 없음' : '자막이 없습니다.';
        panel.appendChild(empty);
    }

    // DOM append 후 전체 textarea 높이 조정
    requestAnimationFrame(function() {
        panel.querySelectorAll('.ste-text').forEach(_steAutoResize);
    });
}

function _steAutoResize(ta) {
    ta.style.height = '0';
    ta.style.height = ta.scrollHeight + 'px';
}

function _steUpdateBadge() {
    var n = _steSegments.filter(function(s) { return s.text !== _steOriginals[s.id]; }).length;
    var badge = document.getElementById('ste-change-badge');
    badge.style.display = n > 0 ? 'inline-block' : 'none';
    badge.textContent = n + '개 수정됨';
    document.getElementById('ste-save-btn').disabled = (n === 0);
}

function _steFmtTime(s) {
    if (!s || !isFinite(s)) return '0:00';
    var m = Math.floor(s / 60);
    var sec = Math.floor(s % 60);
    return m + ':' + String(sec).padStart(2, '0');
}

function _steSyncHighlight(t) {
    if (!_subtitleMode) return;
    var idx = findTranscriptIdx(t);
    if (idx === _steCurrentIdx) return;
    _steCurrentIdx = idx;
    var panel = document.getElementById('ste-panel');
    var prev = panel.querySelector('.ste-row.active');
    if (prev) prev.classList.remove('active');
    if (idx >= 0) {
        var row = panel.querySelector('.ste-row[data-id="' + idx + '"]');
        if (row) {
            row.classList.add('active');
            if (document.activeElement && document.activeElement.className !== 'ste-text') {
                row.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }
    }
}

function _steLsBackup() {
    try {
        var changed = {};
        _steSegments.forEach(function(s) {
            if (s.text !== _steOriginals[s.id]) changed[s.id] = s.text;
        });
        if (Object.keys(changed).length > 0) {
            localStorage.setItem(STE_LS_KEY, JSON.stringify({ ts: Date.now(), changes: changed }));
        } else {
            localStorage.removeItem(STE_LS_KEY);
        }
    } catch(e) {}
}

function _steLsRestore() {
    try {
        var raw = localStorage.getItem(STE_LS_KEY);
        if (!raw) return;
        var data = JSON.parse(raw);
        var ago = Math.round((Date.now() - data.ts) / 60000);
        var count = Object.keys(data.changes).length;
        if (count === 0) return;
        if (!confirm(count + '개의 미저장 자막 수정분이 있습니다 (' + ago + '분 전).\n복원할까요?')) {
            localStorage.removeItem(STE_LS_KEY);
            return;
        }
        for (var idStr in data.changes) {
            var id = parseInt(idStr);
            if (id < _steSegments.length) {
                _steSegments[id].text = data.changes[idStr];
                TRANSCRIPT[id].text = data.changes[idStr];
            }
        }
        _steRender();
        _steUpdateBadge();
    } catch(e) {}
}

function _steLsClear() {
    try { localStorage.removeItem(STE_LS_KEY); } catch(e) {}
}

async function _steSave() {
    var btn = document.getElementById('ste-save-btn');
    btn.disabled = true;
    btn.textContent = '저장 중…';
    try {
        var changed = _steSegments.filter(function(s) { return s.text !== _steOriginals[s.id]; });
        var res = await fetch(
            SC_API + '/api/transcript/' + encodeURIComponent(SC_REPO),
            {
                method: 'PUT',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ segments: changed.map(function(s) { return { id: s.id, text: s.text }; }) })
            }
        );
        if (!res.ok) throw new Error('저장 실패');
        _steSegments.forEach(function(s) { _steOriginals[s.id] = s.text; });
        document.querySelectorAll('.ste-row.modified').forEach(function(r) { r.classList.remove('modified'); });
        _steUpdateBadge();
        btn.textContent = '저장';
        _steLsClear();
        var stat = document.getElementById('ste-save-status');
        stat.style.opacity = '1';
        setTimeout(function() { stat.style.opacity = '0'; }, 2500);
    } catch (e) {
        alert('자막 저장 실패: ' + e.message);
        btn.disabled = false;
        btn.textContent = '저장';
    }
}

initSubtitleEdit();
initEditMode();
loadOverlayData();
initSubtitleControls();

// ========== 플로팅 자막 드래그 + 컨트롤 ==========
function initSubtitleControls() {
    const box = document.getElementById('subtitle-box');
    if (!box) return;
    const mobileQuery = window.matchMedia('(max-width: 900px)');
    let isMobile = mobileQuery.matches;
    mobileQuery.addEventListener('change', (e) => { isMobile = e.matches; });

    // localStorage에서 설정 복원
    let saved = {};
    try { saved = JSON.parse(localStorage.getItem('sc-sub-settings') || '{}'); } catch(e) {}
    let fontSize = saved.fontSize || 16;
    let posMode = saved.posMode || 'bottom'; // bottom, top, overlay, hidden, free
    let freeX = saved.freeX;
    let freeY = saved.freeY;
    let freeW = saved.freeW;

    const subText = document.getElementById('subtitle-text');
    subText.style.fontSize = fontSize + 'px';

    // 위치 모드 적용
    function applyPos(mode) {
        posMode = mode;
        box.classList.remove('free', 'hidden');
        if (mode === 'hidden') {
            box.classList.add('hidden');
        } else if (mode === 'free') {
            box.classList.add('free');
            box.style.left = (freeX || 100) + 'px';
            box.style.top = (freeY || (window.innerHeight - 100)) + 'px';
            box.style.bottom = 'auto';
            box.style.transform = 'none';
            if (freeW) box.style.width = freeW + 'px';
        } else {
            // bottom (기본)
            box.style.left = '50%'; box.style.top = '';
            box.style.bottom = (window.innerWidth <= 900 ? '56px' : '20px'); box.style.transform = 'translateX(-50%)';
            box.style.width = '';
        }
        saveSettings();
        document.getElementById('sub-hide-btn').classList.toggle('active', mode !== 'hidden');
    }

    function saveSettings() {
        try {
            const r = box.getBoundingClientRect();
            localStorage.setItem('sc-sub-settings', JSON.stringify({
                fontSize, posMode, ccMode,
                freeX: posMode === 'free' ? r.left : freeX,
                freeY: posMode === 'free' ? r.top : freeY,
                freeW: posMode === 'free' ? r.width : freeW,
            }));
        } catch(e) {}
    }

    // 위치 전환 버튼: bottom↔free
    const posIcon = document.getElementById('sub-pos-icon');
    function updatePosIcon() {
        const svgMove = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M2 12h20M5 5l-3 3 3 3M19 5l3 3-3 3M5 19l-3-3 3-3M19 19l3-3-3-3"/></svg>';
        const svgVert = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M5 5l7-3 7 3M5 19l7 3 7-3"/></svg>';
        const svgDock = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="14" width="18" height="7" rx="2"/><path d="M3 3h18v7H3z" opacity="0.3"/></svg>';
        if (isMobile) { posIcon.innerHTML = posMode === 'free' ? svgVert : svgDock; }
        else { posIcon.innerHTML = posMode === 'free' ? svgDock : svgMove; }
    }
    document.getElementById('sub-pos-btn').onclick = () => {
        if (posMode === 'hidden') { applyPos('bottom'); }
        else { applyPos(posMode === 'bottom' ? 'free' : 'bottom'); }
        updatePosIcon();
    };
    mobileQuery.addEventListener('change', updatePosIcon);

    // 폰트 크기
    document.getElementById('sub-size-up').onclick = () => {
        fontSize = Math.min(28, fontSize + 2);
        subText.style.fontSize = fontSize + 'px';
        saveSettings();
    };
    document.getElementById('sub-size-dn').onclick = () => {
        fontSize = Math.max(10, fontSize - 2);
        subText.style.fontSize = fontSize + 'px';
        saveSettings();
    };

    // CC 모드: default → text-only → hidden
    let ccMode = saved.ccMode || 'default';
    const ccModes = ['default', 'text-only', 'hidden'];

    function applyCcMode(mode) {
        ccMode = mode;
        box.classList.remove('hidden', 'text-only');
        if (mode === 'hidden') {
            box.classList.add('hidden');
        } else if (mode === 'text-only') {
            box.classList.add('text-only');
        }
        const btn = document.getElementById('sub-hide-btn');
        btn.style.opacity = mode === 'hidden' ? '0.4' : mode === 'text-only' ? '0.7' : '1';
        btn.classList.toggle('active', mode === 'default');
        saveSettings();
    }

    document.getElementById('sub-hide-btn').onclick = () => {
        const idx = ccModes.indexOf(ccMode);
        applyCcMode(ccModes[(idx + 1) % ccModes.length]);
    };
    applyCcMode(ccMode);

    // PC 드래그 (free 모드)
    let dragStartX, dragStartY, boxStartX, boxStartY, isDragging = false;

    // 마우스 드래그 (PC: 자유 이동, 모바일 규격: 수직만)
    box.addEventListener('mousedown', (e) => {
        if (posMode !== 'free' || e.target.tagName === 'BUTTON') return;
        isDragging = true;
        box.classList.add('dragging');
        dragStartX = e.clientX; dragStartY = e.clientY;
        const r = box.getBoundingClientRect();
        boxStartX = r.left; boxStartY = r.top;
        e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const dy = e.clientY - dragStartY;
        box.style.top = (boxStartY + dy) + 'px';
        box.style.bottom = 'auto';
        if (!isMobile) {
            const dx = e.clientX - dragStartX;
            box.style.left = (boxStartX + dx) + 'px';
        }
    });

    document.addEventListener('mouseup', () => {
        if (!isDragging) return;
        isDragging = false;
        box.classList.remove('dragging');
        freeX = parseInt(box.style.left);
        freeY = parseInt(box.style.top);
        saveSettings();
    });

    // 모바일 터치 드래그 (free 모드 — 수직 이동만)
    box.addEventListener('touchstart', (e) => {
        if (posMode !== 'free') return;
        isDragging = true;
        box.classList.add('dragging');
        const touch = e.touches[0];
        dragStartY = touch.clientY;
        const r = box.getBoundingClientRect();
        boxStartY = r.top;
    }, {passive: true});

    document.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        const touch = e.touches[0];
        const newY = boxStartY + touch.clientY - dragStartY;
        box.style.top = newY + 'px';
        box.style.bottom = 'auto';
        box.style.left = '50%';
        box.style.transform = 'translateX(-50%)';
    }, {passive: true});

    document.addEventListener('touchend', () => {
        if (!isDragging) return;
        isDragging = false;
        box.classList.remove('dragging');
        freeY = parseInt(box.style.top);
        saveSettings();
    });

    // 초기 적용
    applyPos(posMode);
    updatePosIcon();
}
// showSlide/currentSlide를 모바일 FAB에서 접근 가능하도록 전역 노출
window.showSlide = showSlide;
window.openOverlay = openOverlay;
window.closeOverlay = closeOverlay;
window.togglePlay = togglePlay;
window.changeSpeed = changeSpeed;
window.skipTime = skipTime;
Object.defineProperty(window, 'currentSlide', { get: () => currentSlide });
Object.defineProperty(window, 'isAutoSync', { get: () => isAutoSync, set: v => { isAutoSync = v; } });
})(); // IIFE 끝

</script>
