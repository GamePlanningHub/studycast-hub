  {
    "id": "P58",
    "title": "물리 엔진의 주요 기능",
    "content": "<div class=\"slide-text\">**⛓️강체 (Rigid Body) 동역학 (Dynamics) 계산<br>강체** : 외부 자극에도 형상이 유지되는 물체<br><strong>동역학</strong> : 힘 → 운동 → 상태 변화에 대한 계산</div>\n<div class=\"slide-card\"><div class=\"card-heading\">💥충돌 검출 (Collision Detection)</div><div class=\"card-desc\">충돌 자체의 체크 +충돌 방향, 힘, 반작용 등의 계산</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">⌛입자 (Particle)</div><div class=\"card-desc\">파티클에 대한 처리. 눈, 비 , 불꽃 등</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">🌊유체 역학 (Fluid Physics)</div><div class=\"card-desc\">물결, 파도 등 액체의 움직임 구현</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">👕옷갑 (Cloth)</div><div class=\"card-desc\">옷의 펄럭임이나 머리카락의 휘날림 등을 표현</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">🙍래그돌 (Ragdoll)</div><div class=\"card-desc\">물리적인 인체의 반응을 구현</div></div>\n<div class=\"slide-text\">상황에 따른 자연스러운 움직임이나<br>추락, 사망 처리 등에 사용<br><strong>→</strong> <strong>애니메이션 쌀먹 가능!</strong></div>",
    "hasAudio": true,
    "start": 1107.3,
    "end": 1151.8
  }
];
const TRANSCRIPT = [{"start": 0.0, "end": 9.0, "text": "청취자 여러분, 혹시 1인칭 슈팅 게임 하다가 갑자기 막 속이 울렁거리고 멀미가 나서 침대 누워보신 적 있으신가요?"}, {"start": 9.0, "end": 13.72, "text": "아, 저도 옛날에 둠이나 퀘이크 같은 거 할 때 진짜 많이 누웠거든요."}, {"start": 13.72, "end": 20.64, "text": "맞아요. 보통은 그냥 내가 화면 휙휙 돌아가는 거에 약한가 보다 하고 넘기시잖아요."}, {"start": 20.64, "end": 24.400000000000002, "text": "근데 사실 이게 단순한 체질 문제가 아니더라고요."}, {"start": 24.4, "end": 35.879999999999995, "text": "내 눈의 실제 시야각이랑 게임 속 카메라의 그 수학적인 설정값이 충돌해서 뇌에 오류를 일으키는 아주 과학적인 현상이라는 사실, 알고 계셨나요?"}, {"start": 35.879999999999995, "end": 41.12, "text": "네, 그게 시야각, 즉 FOV 불일치에서 오는 인지부조화 현상이죠."}, {"start": 41.12, "end": 45.56, "text": "우리 뇌가 시각 정보랑 전정기관 정보가 막 다르게 들어오면"}, {"start": 45.56, "end": 49.879999999999995, "text": "어, 나 지금 독에 감염됐나? 이렇게 착각을 해서 구토감을 유발하는 거거든요."}, {"start": 49.92, "end": 54.800000000000004, "text": "와, 뇌가 독에 감염됐다고 착각을 한다고요? 진짜 신기하네요."}, {"start": 54.800000000000004, "end": 61.040000000000006, "text": "아무튼 오늘은 바로 그 숨겨진 수학과 눈속임의 세계로 딥다이브를 해보려고 합니다."}, {"start": 61.040000000000006, "end": 62.64, "text": "네, 아주 기대가 됩니다."}, {"start": 62.64, "end": 72.6, "text": "우리가 매일 즐기는 화려한 3D 게임들, 사실 그 이면을 들여다보면 약간 거대한 마술쇼나, 뭐랄까, 치열한 사기극에 가깝잖아요."}, {"start": 72.6, "end": 78.80000000000001, "text": "오늘 함께하시는 여러분은 아마 이 복잡한 3D 게임 기획 세계에 막 발을 들인 분들일 텐데요."}, {"start": 78.84, "end": 82.75999999999999, "text": "네네, 처음 배우시는 분들에게는 진짜 신세계일 겁니다."}, {"start": 82.75999999999999, "end": 85.47999999999999, "text": "그래서 오늘 우리의 미션은 명확합니다."}, {"start": 85.47999999999999, "end": 91.6, "text": "3D 게임이라는 마술쇼가 무대 뒤에서 도대체 어떤 기믹과 장치들로 굴러가는지,"}, {"start": 91.6, "end": 94.64, "text": "그 기초부터 끝까지 전부 해체해보는 겁니다."}, {"start": 94.64, "end": 99.28, "text": "마술쇼라는 비유가 진짜 딱 맞는 게 영화나 애니메이션이랑 다르게 게임은"}, {"start": 99.28, "end": 103.4, "text": "실시간 렌더링이라는 아주 절대적인 제약 속에서 돌아가야 하거든요."}, {"start": 103.4, "end": 105.12, "text": "아, 실시간 렌더링이요?"}, {"start": 105.12, "end": 110.68, "text": "네, 영화는 뭐 한 프레임 만들려고 슈퍼컴퓨터를 몇 시간씩 돌려도 상관없잖아요."}, {"start": 110.68, "end": 113.80000000000001, "text": "이미 다 구워진 영상만 그냥 틀면 되니까요."}, {"start": 113.80000000000001, "end": 117.68, "text": "근데 게임은 플레이어가 고개를 돌리고 막 총을 쏠 때마다"}, {"start": 117.68, "end": 123.84, "text": "1초에 최소 60번, 즉 60프레임으로 이 세계를 매번 새로 그려내야 합니다."}, {"start": 123.84, "end": 125.72, "text": "1초에 60번이요?"}, {"start": 125.72, "end": 133.8, "text": "아니, 플레이어 조작에 맞춰서 빛, 그림자, 캐릭터 위치를 매 초 60번씩 다시 계산한다는 건데"}, {"start": 133.84, "end": 136.64000000000001, "text": "컴퓨터가 안 터지고 견디는 게 신기할 정도네요."}, {"start": 136.64000000000001, "end": 141.44, "text": "그래서 3D 게임 기획은 항상 두 가지 싸움을 동반하거든요."}, {"start": 141.44, "end": 145.28, "text": "데이터의 절대적인 용량을 줄이는 리소스 최적화,"}, {"start": 145.28, "end": 150.32000000000002, "text": "그리고 매 프레임 발생하는 그 수학적 연산을 줄이는 계산량 최적화죠."}, {"start": 150.32000000000002, "end": 154.0, "text": "아, 리소스랑 계산량을 동시에 줄여야 하는구나."}, {"start": 154.0, "end": 159.4, "text": "맞아요. 이 한계를 극복하려고 진짜 수많은 천재적인 눈속임들이 탄생한 거죠."}, {"start": 159.44, "end": 165.20000000000002, "text": "와, 그 눈속임을 이해하려면 일단 무대에 올릴 소품부터 어떻게 만드는지 알아야겠네요."}, {"start": 165.20000000000002, "end": 170.56, "text": "아무것도 없는 백지 상태의 3D 공간에서 도대체 어떻게 캐릭터를 빚어내는 건가요?"}, {"start": 170.56, "end": 172.36, "text": "제작 파이프라인이 따로 있나요?"}, {"start": 172.36, "end": 177.36, "text": "네. 보통 오브젝트 제작부터 시작해서 텍스처와 조명 입히고"}, {"start": 177.36, "end": 183.08, "text": "애니메이션 넣고 카메라 설정하고 마지막에 게임 엔진으로 변환하는 순서를 거칩니다."}, {"start": 183.08, "end": 186.32, "text": "근데 그 전에 먼저 공간의 기준부터 잡아야 해요."}, {"start": 186.32, "end": 188.16, "text": "아, 좌표계 말씀이시죠?"}, {"start": 188.16, "end": 193.2, "text": "네네. 2차원은 가로, 세로, 즉 X축, Y축만 있잖아요."}, {"start": 193.2, "end": 197.0, "text": "근데 3차원은 깊이를 의미하는 Z축이 추가되거든요."}, {"start": 197.0, "end": 201.48, "text": "엔진마다 이 축을 위아래로 쓸지 앞뒤로 쓸지 약간씩 다르긴 한데"}, {"start": 201.48, "end": 202.68, "text": "헷갈리겠는데요?"}, {"start": 202.68, "end": 208.12, "text": "그렇죠. 근데 보통 게임 기획에서 Vector 3 그러니까 3차원 벡터를 다룰 때"}, {"start": 208.12, "end": 214.24, "text": "Z축은 오브젝트의 전면, 즉 캐릭터가 바라보는 앞방향을 의미하게 됩니다."}, {"start": 214.24, "end": 217.96, "text": "유저가 조이스틱을 앞으로 밀면 Z값이 변하는 식인 거죠."}, {"start": 217.96, "end": 221.88, "text": "아, 허공의 Z축으로 앞뒤 기준을 세웠군요."}, {"start": 221.88, "end": 227.24, "text": "그럼 이제 찰흙을 붙일 차례인데 제가 자료 보면서 조금 혼란스러웠던 게 있어요."}, {"start": 227.24, "end": 232.72, "text": "3D 그래픽이 찰흙 빗는 게 아니라 종이 접기에 가깝다는 느낌을 받았거든요."}, {"start": 232.72, "end": 235.0, "text": "오, 아주 예리하신대요."}, {"start": 235.0, "end": 240.20000000000002, "text": "3D 모델링은 곡선이 아니라 무수히 많은 직선과 평면의 조합이거든요."}, {"start": 240.20000000000002, "end": 244.52, "text": "가장 기본 단위는 공간에 딱 찍힌 점, 즉 버텍스입니다."}, {"start": 244.52, "end": 246.04000000000002, "text": "버텍스요? 점."}, {"start": 246.04, "end": 250.35999999999999, "text": "네, 이 점 두 개를 이어면 선, 즉 엣지가 되고요."}, {"start": 250.35999999999999, "end": 257.4, "text": "선 세 개를 이어서 닫힌 면을 만들면 가장 작은 3D 표면인 삼각형, 바로 폴리곤이 탄생하는 거죠."}, {"start": 257.4, "end": 263.28, "text": "아, 그래서 게임 그래픽 얘기할 때 맨날 폴리곤 덩어리다 이렇게 부르는 거군요?"}, {"start": 263.28, "end": 268.88, "text": "이 삼각형들이 막 수만 개 모여서 다듬어진 입체 형태를 메쉬라고 부르는 거고요."}, {"start": 268.88, "end": 272.2, "text": "근데 왜 하필 원이나 사각형도 아니고 삼각형인가요?"}, {"start": 272.2, "end": 277.47999999999996, "text": "그게 수학적으로 3점은 항상 하나의 완전한 평면을 보장하기 때문이거든요."}, {"start": 277.47999999999996, "end": 283.32, "text": "사각형은 4점 중에 하나만 살짝 어긋나도 평면이 찌그러지면서 계산이 엄청 복잡해져요."}, {"start": 283.32, "end": 285.2, "text": "아하, 컴퓨터가 힘들어하는군요."}, {"start": 285.2, "end": 291.64, "text": "맞아요. 이 삼각형 폴리곤의 개수가 곧 컴퓨터가 처리해야 할 성능 부하랑 직결됩니다."}, {"start": 291.64, "end": 296.12, "text": "90년대 초반에 그 툼레이더 라라크로프트 캐릭터 혹시 기억나시나요?"}, {"start": 296.12, "end": 297.64, "text": "어, 당연히 기억나죠."}, {"start": 297.64, "end": 303.03999999999996, "text": "얼굴도 막 뾰족하고 가슴도 뾰족하고 완전 각진 삼각형들 덩어리였잖아요."}, {"start": 303.03999999999996, "end": 307.64, "text": "네, 당시엔 하드웨어 한계 때문에 수백 개의 폴리곤만 썼거든요?"}, {"start": 307.64, "end": 311.68, "text": "표면도 그냥 단순히 단색으로 채우는 플랫 쉐이딩을 썼고요."}, {"start": 311.68, "end": 316.76, "text": "근데 2000년대를 지나면서 픽셀 단위로 색을 입히는 노멀 맵 기술이 나오고"}, {"start": 316.76, "end": 321.91999999999996, "text": "2010년대에는 재질의 물리적 특성까지 계산하는 PBR 렌더링이 등장했죠."}, {"start": 321.91999999999996, "end": 324.4, "text": "와, 그래픽 발전 속도가 진짜..."}, {"start": 324.4, "end": 327.67999999999995, "text": "네, 그러면서 폴리곤이 수백만 개 단위로 쪼개졌고요."}, {"start": 327.67999999999995, "end": 332.91999999999996, "text": "지금은 빛의 실제 궤적을 실시간으로 추적하는 레이트레이싱까지 쓰이면서"}, {"start": 332.91999999999996, "end": 335.12, "text": "거의 완전한 실사를 구현하고 있습니다."}, {"start": 335.12, "end": 337.96, "text": "진짜 기술의 발전이 엄청나네요."}, {"start": 337.96, "end": 342.56, "text": "자, 이렇게 수백만 개의 삼각형으로 멋진 캐릭터 형태를 만들었습니다."}, {"start": 342.56, "end": 348.23999999999995, "text": "그다음은 플레이어가 이 캐릭터를 어떻게 바라볼지, 즉, 카메라를 세팅할 차례잖아요?"}, {"start": 348.23999999999995, "end": 349.28, "text": "맞습니다."}, {"start": 349.28, "end": 352.88, "text": "카메라는 유저가 게임이랑 소통하는 유일한 창구거든요."}, {"start": 352.88, "end": 358.28, "text": "카메라를 캐릭터 눈동자 위치에 딱 두면 1인칭, 등 뒤에 두면 3인칭,"}, {"start": 358.28, "end": 361.52, "text": "아예 하늘 위에서 내려다보게 만들면 탑뷰가 되는 거죠."}, {"start": 361.52, "end": 368.32, "text": "아, 그럼 카메라 위치랑 회전 각도가 사실상 그 게임의 장르를 결정해버리는 거네요."}, {"start": 368.32, "end": 369.48, "text": "정확합니다."}, {"start": 369.48, "end": 373.68, "text": "그리고 여기서 아까 저희가 오프닝에서 얘기했던 그 멀미 이야기가 등장하는 거죠."}, {"start": 373.68, "end": 375.71999999999997, "text": "맞아요. FOV, 시야각."}, {"start": 375.71999999999997, "end": 380.28, "text": "인간이 자연스럽게 딱 집중해서 보는 시야각이 약 50도 정도거든요."}, {"start": 380.32, "end": 383.4, "text": "그런데 모니터는 우리 시야의 일부분만 차지하잖아요."}, {"start": 383.4, "end": 386.55999999999995, "text": "그렇죠. 모니터 밖은 그냥 제 방벽이니까요."}, {"start": 386.55999999999995, "end": 391.64, "text": "네. 만약에 FPS 게임을 하는데 카메라 시야각이 너무 좁게 설정되어 있으면"}, {"start": 391.64, "end": 397.08, "text": "뇌는 나는 가만히 있는데 세상이 너무 빨리 스쳐 지나간다고 느껴서 인지 부조화를 일으키게 됩니다."}, {"start": 397.08, "end": 400.2, "text": "아, 그래서 보통 FPS 게임 설정창 들어가면"}, {"start": 400.2, "end": 406.35999999999996, "text": "이 시야각을 60도에서 넓게는 110도까지 유저가 직접 조절할 수 있게 해두는 거군요."}, {"start": 406.36, "end": 410.32, "text": "화면이 막 너무 좁으면 호러게임처럼 억압되고 불안한 느낌이 들고"}, {"start": 410.32, "end": 413.12, "text": "확 넓히면 탁 트인 탐험게임 느낌이 나고요."}, {"start": 413.12, "end": 417.64, "text": "네. 기획자는 이 화각(FOV) 하나로 유저의 감정까지 컨트롤할 수 있는 거죠."}, {"start": 417.64, "end": 422.0, "text": "그리고 공간감을 다루는 또 하나의 거대한 장치가 바로 투영입니다."}, {"start": 422.0, "end": 422.92, "text": "투영이요?"}, {"start": 422.92, "end": 429.04, "text": "네. 3D 공간을 평면인 2D 모니터에 도대체 어떻게 찍어낼 것인가 이 문제죠."}, {"start": 429.04, "end": 432.2, "text": "아, 제가 이 부분 보면서 되게 헷갈렸거든요."}, {"start": 432.2, "end": 434.24, "text": "원근 투영은 알겠어요."}, {"start": 434.32, "end": 437.28000000000003, "text": "가까운 건 크게 보이고 먼 건 작게 보이고"}, {"start": 437.28000000000003, "end": 440.2, "text": "우리 눈이 원래 세상을 보는 방식이니까요."}, {"start": 440.2, "end": 443.48, "text": "거의 모든 3D 게임이 이걸 쓴다는 것도 이해가 가요."}, {"start": 443.48, "end": 446.0, "text": "마치 제가 창문 밖을 내다보는 것 같잖아요."}, {"start": 446.0, "end": 447.72, "text": "네네. 아주 자연스러운 방식이죠."}, {"start": 447.72, "end": 450.12, "text": "근데 직교 투영은 대체 뭔가요?"}, {"start": 450.12, "end": 452.16, "text": "원근감이 없는 카메라라니?"}, {"start": 452.16, "end": 454.72, "text": "아니, 굳이 힘들게 3D로 다 만들어놓고"}, {"start": 454.72, "end": 456.84000000000003, "text": "입체감을 없애버리는 이유가 뭐죠?"}, {"start": 456.84000000000003, "end": 461.08, "text": "그 건축도면을 위에서 내려다보는 걸 한번 상상해보세요."}, {"start": 461.12, "end": 464.52, "text": "거리에 상관없이 물체의 실제 크기가 똑같이 보여야"}, {"start": 464.52, "end": 466.59999999999997, "text": "전략을 짤 수 있는 장르들이 있거든요."}, {"start": 466.59999999999997, "end": 469.32, "text": "아, 스타크래프트 같은 전략 시뮬레이션 게임이요?"}, {"start": 469.32, "end": 474.32, "text": "맞아요. 그런 게임이나 아니면 화면에 항상 고정된 크기로 떠있어야 하는"}, {"start": 474.32, "end": 478.52, "text": "체력 게이지 같은 UI 요소들에는 이 직교 투영이 필수적입니다."}, {"start": 478.52, "end": 481.03999999999996, "text": "와, 듣고 보니 그러네요."}, {"start": 481.03999999999996, "end": 485.44, "text": "원근감 적용돼서 저 멀리 있는 내 유닛이 개미만하게 보이면"}, {"start": 485.44, "end": 488.15999999999997, "text": "클릭해서 명령을 내릴 수가 없겠네요."}, {"start": 488.15999999999997, "end": 490.44, "text": "완전 철저하게 기능적인 이유군요."}, {"start": 490.44, "end": 494.32, "text": "자, 이제 형태도 잡았고 시점도 정했습니다."}, {"start": 494.32, "end": 498.04, "text": "근데 이 상태로는 그냥 회색빛 폴리곤 덩어리일 뿐이잖아요."}, {"start": 498.04, "end": 500.04, "text": "그렇죠. 회색 찰흙이죠."}, {"start": 500.04, "end": 503.04, "text": "현실감을 주려면 색과 빛이 필요합니다."}, {"start": 503.04, "end": 503.96, "text": "조명 파트요."}, {"start": 503.96, "end": 508.64, "text": "게임 속 조명은 현실의 빛을 아주 영리하게 쪼개놓은 형태거든요."}, {"start": 508.64, "end": 512.84, "text": "방향이나 위치 상관없이 씬 전체에 기본적으로 쫙 깔리는"}, {"start": 512.84, "end": 515.72, "text": "엠비언트라이트, 즉 자연광이 있고요."}, {"start": 515.72, "end": 519.12, "text": "태양처럼 아주 먼 곳에서 한 방향으로 내리쬐어서"}, {"start": 519.16, "end": 522.44, "text": "그림자 방향을 결정하는 디렉셔널 라이트가 있습니다."}, {"start": 522.44, "end": 524.76, "text": "오, 엠비언트랑 디렉셔널."}, {"start": 524.76, "end": 527.84, "text": "태양광이 있다면 방 안을 밝히는 전등도 있어야겠죠."}, {"start": 527.84, "end": 532.0, "text": "네. 한 점에서 사방으로 빛을 쏘는 포인트라이트가"}, {"start": 532.0, "end": 533.68, "text": "실내용으로 쓰이고요."}, {"start": 533.68, "end": 536.08, "text": "손전등처럼 특정 방향으로만"}, {"start": 536.08, "end": 539.6, "text": "원뿔 모양으로 빛을 쏘는 스포트라이트가 있죠."}, {"start": 539.6, "end": 544.36, "text": "이 빛들이 아까 만든 폴리곤 표면에 탁 부딪혀서 반사가 되거든요."}, {"start": 544.36, "end": 547.52, "text": "아, 반사될 때 종류가 또 나뉘더라고요."}, {"start": 547.52, "end": 551.64, "text": "맞아요. 거울처럼 쨍하게 반사되는 스펙큘러랑"}, {"start": 551.64, "end": 554.96, "text": "사방으로 은은하게 퍼지는 디퓨즈로 나뉘면서"}, {"start": 554.96, "end": 556.4399999999999, "text": "우리 눈에 들어오게 됩니다."}, {"start": 556.4399999999999, "end": 559.84, "text": "근데 빛만 쏜다고 다가 아니던데요."}, {"start": 559.84, "end": 563.4, "text": "이 폴리곤 표면이 나무인지 쇠인지 헝겊인지"}, {"start": 563.4, "end": 565.76, "text": "컴퓨터한테 알려줘야 하잖아요."}, {"start": 565.76, "end": 570.4399999999999, "text": "그래서 텍스처라는 이미지 파일들을 랩핑하듯이 씌우는데"}, {"start": 570.4399999999999, "end": 573.68, "text": "저 이 텍스처 파트가 정말 흥미로웠습니다."}, {"start": 573.68, "end": 576.52, "text": "여기서 엄청난 속임수들이 막 쏟아지더라고요."}, {"start": 577.28, "end": 580.4399999999999, "text": "텍스처가 단순히 색칠 공부가 아니거든요."}, {"start": 580.4399999999999, "end": 582.92, "text": "표면에 고유색을 칠하는 디퓨즈맵,"}, {"start": 582.92, "end": 584.96, "text": "빛의 반사 강도를 조절해서"}, {"start": 584.96, "end": 588.68, "text": "가죽이랑 금속을 구분하는 스펙큘러맵 등등"}, {"start": 588.68, "end": 591.36, "text": "여러 장의 이미지를 겹겹이 쌓아 올려서"}, {"start": 591.36, "end": 593.36, "text": "하나의 재질을 완성하는 겁니다."}, {"start": 593.36, "end": 595.88, "text": "아, 이미지를 여러 장 겹치는군요."}, {"start": 595.88, "end": 601.0, "text": "네. 그리고 그 중에서도 3D 그래픽 역사상 최고의 마법이라고 불리는 게"}, {"start": 601.0, "end": 604.28, "text": "방금 말씀하신 속임수, 바로 노멀맵입니다."}, {"start": 604.28, "end": 606.4, "text": "이거 진짜 기발하더라고요."}, {"start": 606.4, "end": 610.6, "text": "아까 폴리건 개수 늘어나면 컴퓨터가 버거워 한다고 하셨잖아요."}, {"start": 610.6, "end": 614.3199999999999, "text": "예를 들어 캐릭터 가죽 점퍼의 그 자글자글한 주름을"}, {"start": 614.3199999999999, "end": 618.68, "text": "폴리건 삼각형으로 일일이 다 접어서 만들면 기기가 폭발하겠죠."}, {"start": 618.68, "end": 621.0799999999999, "text": "오, 당연히 터집니다. 감당 안 되죠."}, {"start": 621.0799999999999, "end": 624.8, "text": "그래서 형태는 그냥 밋밋한 통짜 평면으로 놔두는데"}, {"start": 624.8, "end": 626.28, "text": "그 다음이 대박이잖아요."}, {"start": 626.28, "end": 628.84, "text": "맞아요. 평평한 표면 위에다가"}, {"start": 628.84, "end": 631.56, "text": "빛이 어느 방향으로 반사되어야 하는지"}, {"start": 631.56, "end": 634.92, "text": "그 각도 정보를 담은 텍스처 이미지를 싹 입히는 겁니다."}, {"start": 634.9599999999999, "end": 637.4399999999999, "text": "와, 빛을 속이는 거네요."}, {"start": 637.4399999999999, "end": 638.56, "text": "정확합니다."}, {"start": 638.56, "end": 641.76, "text": "눈에 보이기에는 입체적인 굴곡이 있는 것처럼"}, {"start": 641.76, "end": 644.12, "text": "조명이 속아서 반사되는 거죠."}, {"start": 644.12, "end": 647.04, "text": "실제 삼각형 개수는 하나도 안 늘리면서"}, {"start": 647.04, "end": 649.52, "text": "시각적인 디테일은 수백 배로 끌어올리는"}, {"start": 649.52, "end": 651.64, "text": "진짜 아주 우아한 거짓말이에요."}, {"start": 651.64, "end": 654.76, "text": "평평한 나무벽에 기가 막히게 명암을 그려 넣어서"}, {"start": 654.76, "end": 658.5999999999999, "text": "조명 비추면 튀어나온 조각상처럼 보이게 만드는 거네요."}, {"start": 658.5999999999999, "end": 661.12, "text": "이거랑 비슷하게 카메라 각도에 따라서"}, {"start": 661.12, "end": 663.16, "text": "진짜 깊이감이 있는 것처럼"}, {"start": 663.1999999999999, "end": 666.64, "text": "텍스처를 겹쳐서 이동시키는 패럴랙스 맵도 신기했고요."}, {"start": 666.64, "end": 669.52, "text": "네, 그 밖에도 총알 자국이나 피 얼룩처럼"}, {"start": 669.52, "end": 673.76, "text": "벽 위에 투명한 스티커를 탁 덧붙이는 데칼맵도 있고요."}, {"start": 673.76, "end": 676.92, "text": "이미지 투명도를 조절해서 창문이나 철조망 구멍을"}, {"start": 676.92, "end": 679.4399999999999, "text": "뻥 뚫려 보이게 하는 알파 맵핑도 많이 씁니다."}, {"start": 679.4399999999999, "end": 681.12, "text": "알파가 투명도라는 뜻이죠."}, {"start": 681.12, "end": 683.52, "text": "네, 알파 채널이 투명도를 결정하거든요."}, {"start": 683.52, "end": 686.24, "text": "근데 듣다 보니까 또 걱정되는 게 있어요."}, {"start": 686.24, "end": 689.8399999999999, "text": "1초에 60번씩 이 복잡한 광원들에서 빛 쏘고"}, {"start": 689.8399999999999, "end": 691.48, "text": "노멀맵이 빛 속이고"}, {"start": 691.48, "end": 694.72, "text": "그림자 지는 거 실시간으로 다 계산한다구요."}, {"start": 694.72, "end": 698.44, "text": "슈퍼컴퓨터도 아니고 우리 집 게임기가 이걸 도대체 어떻게 버티나요?"}, {"start": 698.44, "end": 701.64, "text": "그래서 기획자들은 또 한 번 아주 똑똑한 타협을 하죠."}, {"start": 701.64, "end": 703.52, "text": "대표적인 게 라이트 맵핑입니다."}, {"start": 703.52, "end": 707.0, "text": "아, 제가 여기서 비유를 하나 딱 생각해봤는데요."}, {"start": 707.0, "end": 710.76, "text": "자료보니까 빛을 굽는다고 베이크한다고 표현하더라고요."}, {"start": 710.76, "end": 712.08, "text": "네네, 베이킹이라고 말이죠."}, {"start": 712.08, "end": 714.88, "text": "예를 들어 방 안에 고정된 가구들이 있으면"}, {"start": 714.88, "end": 717.44, "text": "조명도 그림자도 안 움직이잖아요."}, {"start": 717.44, "end": 720.28, "text": "그러니까 매 프레임 그림자를 계산하는 게 아니라"}, {"start": 720.28, "end": 724.28, "text": "처음부터 그림자가 까맣게 드리워진 텍스처 이미지를 만들어서"}, {"start": 724.28, "end": 726.4399999999999, "text": "가구에 딱 붙여버리는 거죠."}, {"start": 726.4399999999999, "end": 729.6, "text": "마치 요리할 때 매번 재료 썰고 볶는 게 아니라"}, {"start": 729.6, "end": 733.4, "text": "아예 다 조리된 밀키트를 그냥 전자레인지에 데우기만 하는 거 아닙니까?"}, {"start": 733.4, "end": 736.12, "text": "와, 밀키트 비유 진짜 완벽한데요."}, {"start": 736.12, "end": 739.0, "text": "네, 대신 그 밀키트의 단점은"}, {"start": 739.0, "end": 741.68, "text": "나중에 재료를 바꿀 수 없다는 거죠."}, {"start": 741.68, "end": 744.92, "text": "게임에서도 라이트 맵핑으로 딱 구워진 그림자는"}, {"start": 744.92, "end": 748.0, "text": "캐릭터가 횃불 들고 지나가도 변하지 않거든요."}, {"start": 748.0, "end": 750.24, "text": "정적인 물체에만 쓸 수 있지만"}, {"start": 750.24, "end": 752.72, "text": "그래도 계산량을 획기적으로 줄여주죠."}, {"start": 752.72, "end": 755.04, "text": "아, 움직이는 거에는 못 쓰는구나."}, {"start": 755.04, "end": 758.32, "text": "네, 비슷한 원리로 거울이나 물에 주변 환경 비치는 거"}, {"start": 758.32, "end": 760.28, "text": "일일이 계산하기 힘드니까"}, {"start": 760.28, "end": 764.32, "text": "미리 주변 풍경을 360도로 찍어둔 이미지를 표면에 덮어 씌우는"}, {"start": 764.32, "end": 766.12, "text": "반사 맵핑 기술도 있습니다."}, {"start": 766.12, "end": 768.76, "text": "진짜 극한의 효율을 추구하네요."}, {"start": 768.76, "end": 772.48, "text": "효율하니까 생각나는 게 또 빌보드라는 기술인데요."}, {"start": 772.48, "end": 774.84, "text": "숲 속에 나무가 수천 그루 있는데"}, {"start": 774.84, "end": 777.44, "text": "사실 그거 다 3D 덩어리가 아니라"}, {"start": 777.44, "end": 780.8800000000001, "text": "납작한 2D 이미지 판때기 하나 세워둔 거라면서요?"}, {"start": 780.8800000000001, "end": 781.7600000000001, "text": "맞아요."}, {"start": 781.7600000000001, "end": 783.9200000000001, "text": "카메라가 어디로 움직이든 그 판이"}, {"start": 783.9200000000001, "end": 788.12, "text": "항상 카메라 렌즈를 정면으로 바라보게 빙글빙글 회전시키는 겁니다."}, {"start": 788.12, "end": 790.72, "text": "풀, 나무, 아니면 연기 이펙트처럼"}, {"start": 790.72, "end": 792.8000000000001, "text": "굳이 3D 모델링이 필요 없는데"}, {"start": 792.8000000000001, "end": 795.0400000000001, "text": "입체적으로 보여야 할 때 아주 유용하죠."}, {"start": 795.0400000000001, "end": 797.8800000000001, "text": "유저는 내가 나무 주위를 돈다고 생각하지만"}, {"start": 797.8800000000001, "end": 800.6800000000001, "text": "사실은 나무 판자가 날 따라 돌고 있었다니"}, {"start": 800.6800000000001, "end": 802.4000000000001, "text": "약간 배신감도 드는데요."}, {"start": 802.4000000000001, "end": 804.72, "text": "아무튼 빛이랑 텍스처가 만나서"}, {"start": 804.72, "end": 808.44, "text": "픽셀 색상을 결정하는 이 최종 과정을 쉐이더"}, {"start": 808.44, "end": 810.84, "text": "구체적으로는 쉐이딩이라고 부르는군요."}, {"start": 810.84, "end": 811.52, "text": "네."}, {"start": 811.52, "end": 814.32, "text": "플랫 쉐이딩, 고라우드 쉐이딩, 폼 쉐이딩"}, {"start": 814.32, "end": 817.36, "text": "만화 같은 툰 쉐이딩까지 종류도 엄청 다양합니다."}, {"start": 817.36, "end": 819.28, "text": "버텍스 쉐이더가 점 위치 잡고"}, {"start": 819.28, "end": 821.84, "text": "픽셀 쉐이더가 색칠하는 지휘자 역할을 하죠."}, {"start": 821.84, "end": 825.76, "text": "휴, 여기까지가 캐릭터 외형 만드는 과정이었습니다."}, {"start": 825.76, "end": 828.5600000000001, "text": "조각상의 화장까지 완벽하게 끝났네요."}, {"start": 828.5600000000001, "end": 830.5600000000001, "text": "근데 아직 얼어붙어 있잖아요."}, {"start": 830.5600000000001, "end": 833.84, "text": "이제 이 얼음 조각상의 생명을 불어넣을 시간입니다."}, {"start": 833.84, "end": 835.52, "text": "어떻게 움직이게 만드나요?"}, {"start": 835.52, "end": 838.48, "text": "애니메이션의 핵심은 결국 보관입니다."}, {"start": 838.48, "end": 840.96, "text": "1번 포즈에서 2번 포즈로 넘어갈 때"}, {"start": 840.96, "end": 843.12, "text": "그 사이에 수많은 궤적을 컴퓨터가"}, {"start": 843.12, "end": 845.44, "text": "수학적으로 아주 부드럽게 채워주는 거죠."}, {"start": 845.44, "end": 846.36, "text": "아, 보관."}, {"start": 846.36, "end": 848.84, "text": "방식도 되게 여러 가지던데요."}, {"start": 848.84, "end": 852.36, "text": "얼굴 표정 바꿀 때 쓰는 버텍스 애니메이션도 있고"}, {"start": 852.36, "end": 855.12, "text": "부모 자식 구조처럼 내 어깨가 돌면"}, {"start": 855.12, "end": 858.24, "text": "팔꿈치도 따라 도는 계층 애니메이션도 있고요."}, {"start": 858.24, "end": 859.0400000000001, "text": "맞습니다."}, {"start": 859.0400000000001, "end": 862.96, "text": "그리고 현대 3D 캐릭터 애니메이션의 완전 꽃이라고 할 수 있는 건"}, {"start": 862.96, "end": 866.0, "text": "단연 스켈레톤 애니메이션, 즉, 본 시스템이죠."}, {"start": 866.0, "end": 868.4000000000001, "text": "이거 약간 무서운 얘기 같기도 한데"}, {"start": 868.4000000000001, "end": 871.0400000000001, "text": "폴리곤 피부 안에 보이지 않는 진짜 뼈다귀를"}, {"start": 871.0400000000001, "end": 872.2800000000001, "text": "쑤셔 넣는 거잖아요."}, {"start": 872.2800000000001, "end": 875.1600000000001, "text": "무섭다기보단 진짜 대단한 혁신이죠."}, {"start": 875.1600000000001, "end": 878.8000000000001, "text": "관절 구조가진 뼈대를 심는 걸 리깅이라고 하고요."}, {"start": 878.8000000000001, "end": 882.9200000000001, "text": "그 뼈가 움직일 때 주변 피부, 즉, 폴리곤이 얼마나 딸려갈지"}, {"start": 882.9200000000001, "end": 885.76, "text": "가중치를 설정하는 걸 스키닝이라고 합니다."}, {"start": 885.76, "end": 888.88, "text": "유니티 메카님이나 언리얼 페르소나 같은 솔루션이"}, {"start": 888.88, "end": 890.32, "text": "이걸 아주 잘 처리해 주죠."}, {"start": 890.36, "end": 894.08, "text": "아, 뼈대를 쓰면 엄청난 장점이 하나 있더라고요."}, {"start": 894.08, "end": 898.48, "text": "예를 들어 제가 인간 캐릭터 걷는 모션을 기가 막히게 만들었어요."}, {"start": 898.48, "end": 900.96, "text": "근데 새로 오크 캐릭터를 또 만들면"}, {"start": 900.96, "end": 903.24, "text": "오크 걷는 거 처음부터 또 다 만들어야 하나요?"}, {"start": 903.24, "end": 906.7600000000001, "text": "아니요. 바로 거기서 리타겟팅 기술이 빛을 발하는 겁니다."}, {"start": 906.7600000000001, "end": 909.72, "text": "오크랑 인간의 뼈대 계층 구조만 동일하다면"}, {"start": 909.72, "end": 913.36, "text": "인간 애니메이션 데이터를 오크한테 그대로 덮어 씌울 수 있거든요."}, {"start": 913.36, "end": 916.72, "text": "체형이 달라도 엔진이 알아서 보관을 싹 해줍니다."}, {"start": 916.76, "end": 921.12, "text": "와, 애니메이터들 퇴근 시간 획기적으로 앞당겨주는 기술이네요."}, {"start": 921.12, "end": 925.44, "text": "그리고 게임 하다 보면 걷다가 조이스틱 꾹 누르면 뛰기 시작하잖아요."}, {"start": 925.44, "end": 928.64, "text": "그 중간에 걷기에서 뛰기로 확 끊기지 않고"}, {"start": 928.64, "end": 931.96, "text": "부드럽게 스르륵 연결되는 걸 블랜드라고 부르고요."}, {"start": 931.96, "end": 935.48, "text": "네, 그리고 그런 상태 변화를 통제하는 두뇌 역할을 하는 게"}, {"start": 935.48, "end": 937.5600000000001, "text": "바로 FSM, 유한상태머신입니다."}, {"start": 937.5600000000001, "end": 938.6, "text": "FSM이요?"}, {"start": 938.6, "end": 943.24, "text": "네. 캐릭터가 현재 대기 상태인지 걷기 상태인지 쫙 정의해 두고"}, {"start": 943.24, "end": 945.96, "text": "조이스틱 입력 같은 전위 조건이 딱 만족되면"}, {"start": 945.96, "end": 949.24, "text": "다음 상태로 넘어가도록 자동화된 흐름을 로직으로 짜두는 거죠."}, {"start": 949.24, "end": 953.56, "text": "(3D 이펙트는 메시나 판때기(빌보드)) 쓰기도 하던데 진짜 화려한 건 파티클 시스템이더라고요"}, {"start": 953.5600000000001, "end": 958.48, "text": "맞아요. 수백 수천 개의 작은 입자를 수학적으로 제어하는 건데요."}, {"start": 958.48, "end": 961.64, "text": "입자를 막 뿜어내는 이미터가 속도를 정하고"}, {"start": 961.64, "end": 963.92, "text": "애니메이터가 색이나 크기를 바꾸고"}, {"start": 963.92, "end": 967.6800000000001, "text": "렌더러가 화면에 쫙 그려내는 아주 유기적인 구조입니다."}, {"start": 967.68, "end": 973.24, "text": "캐릭터 움직이고, 이펙트 펑펑 터지고"}, {"start": 973.24, "end": 974.76, "text": "지형을 세팅할 차례네요."}, {"start": 974.76, "end": 976.96, "text": "오픈월드 게임 한번 생각해보세요."}, {"start": 976.96, "end": 982.16, "text": "그 넓은 산이랑 들판을 일일이 폴리곤으로 만들면 용량 다 터지거든요."}, {"start": 982.16, "end": 984.8, "text": "그래서 흑백 이미지의 명도 차이로"}, {"start": 984.8, "end": 988.28, "text": "땅의 높낮이를 솟아오르게 만드는 하이트(hight) 맵을 쓰고"}, {"start": 988.28, "end": 990.48, "text": "그 위에 텍스처를 칠합니다."}, {"start": 990.48, "end": 995.16, "text": "그리고 여기서 3D 기획에 꽃인 최적화 3대장이 마침내 등장하죠."}, {"start": 995.16, "end": 998.48, "text": "와, 이거야말로 진짜 눈속임의 끝판왕이더라고요."}, {"start": 998.48, "end": 1000.24, "text": "첫 번째가 LOD잖아요."}, {"start": 1000.24, "end": 1004.24, "text": "내가 서있는 곳 주변 돌맹이는 폴리곤 수만개로 렌더링하고"}, {"start": 1004.24, "end": 1009.48, "text": "저 멀리 있는 산봉우리는 폴리곤 10개짜리 허접한 덩어리로 몰래 바꿔치기 해버리는 거죠."}, {"start": 1009.48, "end": 1013.16, "text": "네. 유저는 어차피 머니까 절대 눈치 못 채거든요."}, {"start": 1013.16, "end": 1014.64, "text": "두 번째는 MipMap입니다."}, {"start": 1014.64, "end": 1015.72, "text": "MipMap이요?"}, {"start": 1015.72, "end": 1018.8, "text": "텍스처 해상도를 거리에 따라 다르게 쓰는 건데요."}, {"start": 1018.8, "end": 1021.72, "text": "멀리 있는 바닥에 고해상도 이미지 깔면"}, {"start": 1021.72, "end": 1025.36, "text": "픽셀이 뭉개져서 막 자글거리는 모아레 현상이 생겨요."}, {"start": 1025.36, "end": 1027.16, "text": "연산량도 낭비되고요."}, {"start": 1027.2, "end": 1029.8400000000001, "text": "그래서 미리 절반씩 줄여놓은 텍스처 여러장을"}, {"start": 1029.8400000000001, "end": 1031.48, "text": "거리에 맞춰서 꺼내쓰는 겁니다."}, {"start": 1031.48, "end": 1032.92, "text": "대망의 세 번째!"}, {"start": 1032.92, "end": 1035.48, "text": "저 이거 보고 진짜 헛웃음 나왔잖아요."}, {"start": 1035.48, "end": 1036.48, "text": "컬링!"}, {"start": 1036.48, "end": 1038.72, "text": "카메라 렌즈 화각 바깥에 있는거나"}, {"start": 1038.72, "end": 1043.48, "text": "벽뒤에 가려져서 안 보이는 물체는 컴퓨터가 아예 렌더링 자체를 포기해버린다면서요?"}, {"start": 1043.48, "end": 1044.3600000000001, "text": "맞습니다."}, {"start": 1044.3600000000001, "end": 1047.16, "text": "프러스텀 컬링이랑 오클루전 컬링이죠."}, {"start": 1047.16, "end": 1050.8400000000001, "text": "아니, 화면에 안 보이는데 왜 굳이 수학적으로 계산을 하고 있겠어요?"}, {"start": 1050.8400000000001, "end": 1054.6000000000001, "text": "무대 커튼 뒤에 있는 소품은 그냥 싹 치워버리는 겁니다."}, {"start": 1054.6000000000001, "end": 1056.88, "text": "그럼 내가 캐릭터 고개를 휙 돌리면"}, {"start": 1056.88, "end": 1062.1200000000001, "text": "내 등 뒤에 있던 그 아름다운 세상은 사실 아무것도 없는 빈 공간이 되는 거잖아요."}, {"start": 1062.1200000000001, "end": 1064.2, "text": "진짜 트루먼쇼가 따로 없네요."}, {"start": 1064.2, "end": 1067.2800000000002, "text": "하늘 표현하는 스카이 박스도 진짜 재밌었어요."}, {"start": 1067.2800000000002, "end": 1071.96, "text": "내가 앞으로 걸어가면 이 거대한 하늘 상자도 나를 따라서 똑같이 이동하니까"}, {"start": 1071.96, "end": 1074.8000000000002, "text": "평생 가도 태양에 도달할 수 없는 거잖아요."}, {"start": 1074.8000000000002, "end": 1078.0800000000002, "text": "네, 무한한 공간감을 주는 완벽한 속임수죠."}, {"start": 1078.0800000000002, "end": 1080.68, "text": "이렇게 눈에 보이는 세상 법칙을 다 세웠으면"}, {"start": 1080.68, "end": 1084.24, "text": "진짜 마지막으로 보이지 않는 물리법칙을 세팅할 차례입니다."}, {"start": 1084.24, "end": 1085.64, "text": "물리 엔진?"}, {"start": 1085.68, "end": 1091.3600000000001, "text": "보니까 랜더메쉬랑 별개로 충돌 판정만 하는 아주 단순한 투명 박스들이 덪보니까 랜더메쉬랑 별개로 충돌 판정만 하는 아주 단순한 투명 박스들이 덧씌워져 있던데"}, {"start": 1091.3600000000001, "end": 1093.16, "text": "이걸 콜라이더라고 하죠?"}, {"start": 1093.16, "end": 1098.6000000000001, "text": "네, 아까 만든 그 수만 개 폴리곤 끼리 부딪혔는지 매 프레임 검사한다고 생각해 보세요."}, {"start": 1098.6000000000001, "end": 1100.4, "text": "연산이 아예 불가능합니다."}, {"start": 1100.4, "end": 1103.96, "text": "그래서 보이지 않는 캡슐이나 박스 형태의 충돌 메쉬,"}, {"start": 1103.96, "end": 1107.3200000000002, "text": "즉 콜라이더로 대략적인 물리 연산만 하는 거죠."}, {"start": 1107.3200000000002, "end": 1112.92, "text": "덕분에 딱딱한 강체나 유체 역학, 옷감 펄럭이는 것까지 시뮬레이션이 되고요."}, {"start": 1112.92, "end": 1117.44, "text": "아 그리고 저 자료에서 제일 빵 터졌던 게 래그돌 물리 엔진이었습니다."}, {"start": 1117.44, "end": 1119.28, "text": "봉제인형이라는 뜻이죠."}, {"start": 1119.28, "end": 1122.24, "text": "캐릭터 죽었을 때 관절 힘 탁 풀리게 두는 기술이요."}, {"start": 1122.24, "end": 1127.76, "text": "옛날에는 캐릭터 죽으면 그냥 으악 하고 똑같은 포즈로 눕는 애니메이션 틀어줬잖아요."}, {"start": 1127.76, "end": 1131.5600000000002, "text": "그래서 계단에서 죽었는데 평지처럼 막 공중에 떠있고"}, {"start": 1131.5600000000002, "end": 1136.4, "text": "근데 레그돌 쓰면 지형지물에 부딪히면서 알아서 현실적으로 굴러 떨어지니까"}, {"start": 1136.4, "end": 1139.8400000000001, "text": "기획자 입장에서는 사망 애니메이션 일일이 안 만들어도 돼서"}, {"start": 1139.8400000000001, "end": 1143.2, "text": "일명 애니메이션 쌀먹이 가능하다 이렇게 써있더라고요."}, {"start": 1143.2, "end": 1145.48, "text": "아 맞아요. 비용절감이죠."}, {"start": 1145.48, "end": 1149.0400000000002, "text": "물리 엔진이 몰입감도 주지만 결국 개발자 반복 작업 줄여주는"}, {"start": 1149.0400000000002, "end": 1151.76, "text": "아주 거대한 자동화 시스템이기도 하거든요."}, {"start": 1151.76, "end": 1155.92, "text": "끝까지 3D 게임 기획 파이프라인 전체를 다 해체해봤네요."}, {"start": 1155.92, "end": 1160.4, "text": "네. 무심코 지나쳤던 폴리곤 하나, 조명 하나에"}, {"start": 1160.4, "end": 1165.44, "text": "플레이어의 경험과 기계 한계라는 두 마리 토끼를 다 잡으려는"}, {"start": 1165.44, "end": 1168.8400000000001, "text": "그 치열한 설계 과정이 다 녹아있다는 걸 확인하셨을 겁니다."}, {"start": 1168.8400000000001, "end": 1174.28, "text": "청취자 여러분, 매일 즐기던 3D 게임이 이제 좀 다르게 보이지 않으시나요?"}, {"start": 1174.28, "end": 1178.3200000000002, "text": "오늘 우리는 기기가 터지는 걸 막기 위해 과거 천재들이 고안해낸"}, {"start": 1178.3200000000002, "end": 1182.0800000000002, "text": "수많은 눈속임과 최적화의 마법을 배웠습니다."}, {"start": 1182.0800000000002, "end": 1184.1200000000001, "text": "근데 문득 이런 상상이 들더라고요."}, {"start": 1184.1200000000001, "end": 1185.28, "text": "어떤 상상이죠?"}, {"start": 1185.28, "end": 1187.76, "text": "지금으로부터 10년, 20년 뒤에"}, {"start": 1187.76, "end": 1191.68, "text": "인류의 연산력 한계가 완전히 사라져 버리면 어떨까요?"}, {"start": 1191.68, "end": 1195.1200000000001, "text": "그래서 방금 감탄했던 컬링도, 밉맵도"}, {"start": 1195.1599999999999, "end": 1198.9199999999998, "text": "눈속임도 알 필요 없는 시대가 온다면 말입니다."}, {"start": 1198.9199999999998, "end": 1202.08, "text": "기획에서 최적화라는 단어가 지워진다면"}, {"start": 1202.08, "end": 1206.6799999999998, "text": "그때 게임 개발자들은 이 무한한 파워를 과연 어디에 쓰게 될까요?"}, {"start": 1206.6799999999998, "end": 1211.7199999999998, "text": "현실 세상 원자 단위까지 똑같이 복제하는 완벽한 매트릭스를 만들까요?"}, {"start": 1211.7199999999998, "end": 1215.6799999999998, "text": "아니면 인간 뇌로는 상상도 못할 새로운 공감각을 창조해낼까요?"}, {"start": 1215.6799999999998, "end": 1218.7199999999998, "text": "와, 그거 진짜 기획자로서 가슴 뛰는 질문이네요."}, {"start": 1218.7199999999998, "end": 1221.6, "text": "여러분도 다음에 게임 켜서 아름다운 석양 바라보실 때"}, {"start": 1221.6, "end": 1223.7199999999998, "text": "한번 상상해보시길 바랍니다."}, {"start": 1223.72, "end": 1225.48, "text": "이 아름다운 세상의 사실은"}, {"start": 1225.48, "end": 1230.3600000000001, "text": "수많은 삼각형과 천재적인 수학의 속임수라는 사실과 함께요."}, {"start": 1230.3600000000001, "end": 1232.4, "text": "오늘 딥다이브는 여기까지입니다."}, {"start": 1232.4, "end": 1235.48, "text": "다음 시간에도 더 흥미로운 세계의 해부도로 찾아오겠습니다."}];

let currentSlide = 0;
let isAutoSync = true;
let lastSubIdx = -1;
const audio = document.getElementById('audio');
const playBtn = document.getElementById('play-btn');
const ICON_PLAY  = '<svg width="12" height="14" viewBox="0 0 12 14" fill="none"><path d="M1 1.5L11 7L1 12.5V1.5Z" fill="currentColor"/></svg>';
const ICON_PAUSE = '<svg width="12" height="14" viewBox="0 0 12 14" fill="none"><rect x="1" y="1" width="3.5" height="12" rx="1" fill="currentColor"/><rect x="7.5" y="1" width="3.5" height="12" rx="1" fill="currentColor"/></svg>';
const timeDisplay = document.getElementById('time-display');
const seekBar = document.getElementById('seek-bar');

// 오디오 포함 슬라이드를 시작시간 순으로 정렬한 인덱스 (동기화용)
const audioSlides = SLIDES
    .map((s, i) => ({idx: i, start: s.start, end: s.end, hasAudio: s.hasAudio}))
    .filter(s => s.hasAudio && s.start !== null)
    .sort((a, b) => a.start - b.start);

function init() {
    buildNav();
    buildIndex();
    buildAudioMap();
    showSlide(0);
    audio.addEventListener('timeupdate', onTimeUpdate);
    // 오디오 메타데이터 로드 시 시크바 max 갱신
    audio.addEventListener('loadedmetadata', updateSeekBarMax);
    audio.addEventListener('durationchange', updateSeekBarMax);
    // canplay 이벤트도 대비 (일부 브라우저/포맷에서 loadedmetadata가 늦게 발생)
    audio.addEventListener('canplay', updateSeekBarMax);
    // 슬라이더 드래그 시: 오디오 위치 이동 + 즉시 슬라이드 동기화
    seekBar.addEventListener('input', () => {
        audio.currentTime = seekBar.value;
        isAutoSync = true;
        syncSlideToTime(audio.currentTime);
        updateSubtitle(audio.currentTime);
    });
    // 일시정지 상태에서 seek 완료 시에도 슬라이드 동기화
    audio.addEventListener('seeked', () => {
        syncSlideToTime(audio.currentTime);
        updateTimeDisplay();
        updateSubtitle(audio.currentTime);
    });
}

function updateSeekBarMax() {
    if (audio.duration && isFinite(audio.duration)) {
        seekBar.max = audio.duration;
        updateTimeDisplay();
    }
}

function buildNav() {
    const nav = document.getElementById('slide-nav');
    SLIDES.forEach((slide, i) => {
        const dot = document.createElement('button');
        dot.className = 'nav-dot ' + (slide.hasAudio ? 'has-audio' : 'no-audio');
        dot.textContent = slide.id.replace('P', '');
        dot.title = slide.id + ' — ' + slide.title;
        dot.onclick = () => { isAutoSync = false; showSlide(i); };
        nav.appendChild(dot);
    });
}

function buildIndex() {
    const list = document.getElementById('index-list');
    SLIDES.forEach((slide, i) => {
        const item = document.createElement('div');
        item.className = 'index-item' + (slide.hasAudio ? ' has-audio' : '');
        item.innerHTML = '<span class="idx-id">' + slide.id + '</span><span class="idx-title">' + slide.title + '</span>';
        item.onclick = () => { isAutoSync = false; showSlide(i); };
        list.appendChild(item);
    });
}

function buildAudioMap() {
    const map = document.getElementById('audio-map');
    if (!map) return;
    let prevEnd = 0;
    audioSlides.forEach((s, i) => {
        const slide = SLIDES[s.idx];
        const duration = s.end - s.start;
        // 시간 갭이 있으면 빈 공간 삽입
        if (s.start > prevEnd + 1) {
            const gap = document.createElement('div');
            gap.className = 'map-gap';
            gap.style.flexGrow = (s.start - prevEnd).toFixed(1);
            map.appendChild(gap);
        }
        const seg = document.createElement('div');
        seg.className = 'map-segment';
        seg.dataset.idx = s.idx;
        seg.style.flexGrow = duration.toFixed(1);
        seg.textContent = slide.id.replace('P', '');
        seg.title = slide.id + ' — ' + slide.title;
        seg.onclick = () => {
            audio.currentTime = s.start;
            isAutoSync = true;
            syncSlideToTime(s.start);
        };
        map.appendChild(seg);
        prevEnd = s.end;
    });
}

function updateAudioMap(currentIdx) {
    document.querySelectorAll('.map-segment').forEach(seg => {
        seg.classList.toggle('active', parseInt(seg.dataset.idx) === currentIdx);
    });
}

function showSlide(index) {
    if (index < 0 || index >= SLIDES.length) return;
    currentSlide = index;
    const slide = SLIDES[index];
    document.getElementById('slide-id').textContent = slide.id;
    document.getElementById('slide-title').textContent = slide.title;
    const contentEl = document.getElementById('slide-content');
    contentEl.style.animation = 'none';
    contentEl.offsetHeight; // 리플로우 트리거
    contentEl.style.animation = '';
    contentEl.innerHTML = slide.content;
    const badge = document.getElementById('slide-badge');
    if (slide.hasAudio) {
        badge.textContent = '';
        badge.className = '';
        badge.style.display = 'none';
    } else {
        badge.textContent = '교안 전용';
        badge.className = 'badge-no-audio';
        badge.style.display = '';
    }
    // 네비게이션 도트 활성화
    document.querySelectorAll('.nav-dot').forEach((dot, i) => {
        dot.classList.toggle('active', i === index);
    });
    // 인덱스 패널 활성화
    document.querySelectorAll('.index-item').forEach((item, i) => {
        item.classList.toggle('active', i === index);
        if (i === index) item.scrollIntoView({block: 'nearest', behavior: 'smooth'});
    });
    // 오디오 맵 활성화
    updateAudioMap(index);

    window.scrollTo({top: 0, behavior: 'smooth'});
}

// 시간 기반 슬라이드 동기화 (정렬된 audioSlides 사용)
function syncSlideToTime(t) {
    let targetIdx = -1;
    for (let i = audioSlides.length - 1; i >= 0; i--) {
        if (t >= audioSlides[i].start) {
            targetIdx = audioSlides[i].idx;
            break;
        }
    }
    if (targetIdx >= 0 && targetIdx !== currentSlide) {
        showSlide(targetIdx);
    }
}

function onTimeUpdate() {
    const t = audio.currentTime;
    seekBar.value = t;
    updateTimeDisplay();
    updateSubtitle(t);
    if (!isAutoSync) return;
    syncSlideToTime(t);
}

function updateTimeDisplay() {
    const cur = formatTime(audio.currentTime);
    const dur = formatTime(audio.duration || 0);
    timeDisplay.textContent = cur + ' / ' + dur;
}

function formatTime(sec) {
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return m + ':' + (s < 10 ? '0' : '') + s;
}

function togglePlay() {
    if (audio.paused) {
        audio.play();
        playBtn.innerHTML = ICON_PAUSE;
        isAutoSync = true;
    } else {
        audio.pause();
        playBtn.innerHTML = ICON_PLAY;
    }
}

function changeSpeed(val) {
    audio.playbackRate = parseFloat(val);
}

function skipTime(sec) {
    audio.currentTime = Math.max(0, Math.min(audio.duration || 0, audio.currentTime + sec));
}

const SPEED_STEPS = [0.5, 0.75, 1.0, 1.25, 1.5, 1.75, 2.0];
document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
    if (e.code === 'ArrowLeft') { showSlide(currentSlide - 1); isAutoSync = false; }
    if (e.code === 'ArrowRight') { showSlide(currentSlide + 1); isAutoSync = false; }
    if (e.key === '-' || e.key === '_') {
        const cur = SPEED_STEPS.indexOf(audio.playbackRate);
        const idx = cur > 0 ? cur - 1 : 0;
        audio.playbackRate = SPEED_STEPS[idx];
        document.getElementById('speed-select').value = SPEED_STEPS[idx];
    }
    if (e.key === '=' || e.key === '+') {
        const cur = SPEED_STEPS.indexOf(audio.playbackRate);
        const idx = cur < SPEED_STEPS.length - 1 ? (cur === -1 ? 2 : cur + 1) : SPEED_STEPS.length - 1;
        audio.playbackRate = SPEED_STEPS[idx];
        document.getElementById('speed-select').value = SPEED_STEPS[idx];
    }
});

function updateSubtitle(t) {
    if (typeof TRANSCRIPT === 'undefined' || TRANSCRIPT.length === 0) return;
    const idx = findTranscriptIdx(t);
    if (idx === lastSubIdx) return;
    lastSubIdx = idx;
    const el = document.getElementById('subtitle-text');
    if (el) el.textContent = idx >= 0 ? TRANSCRIPT[idx].text : '';
}

function findTranscriptIdx(t) {
    let lo = 0, hi = TRANSCRIPT.length - 1, result = -1;
    while (lo <= hi) {
        const mid = (lo + hi) >> 1;
        if (TRANSCRIPT[mid].start <= t) { result = mid; lo = mid + 1; }
        else { hi = mid - 1; }
    }
    if (result >= 0 && t <= TRANSCRIPT[result].end) return result;
    return -1;
}

// 모바일 목차 오버레이
function buildOverlayIndex() {
    const list = document.getElementById('index-overlay-list');
    if (!list) return;
    SLIDES.forEach((slide, i) => {
        const item = document.createElement('div');
        item.className = 'index-item' + (slide.hasAudio ? ' has-audio' : '');
        item.innerHTML = '<span class="idx-id">' + slide.id + '</span><span class="idx-title">' + slide.title + '</span>';
        item.onclick = () => { isAutoSync = false; showSlide(i); closeOverlay(); };
        list.appendChild(item);
    });
}

function openOverlay() {
    const ov = document.getElementById('index-overlay');
    ov.classList.add('open');
    // 현재 슬라이드 하이라이트
    const items = document.querySelectorAll('#index-overlay-list .index-item');
    items.forEach((item, i) => {
        item.classList.toggle('active', i === currentSlide);
        if (i === currentSlide) item.scrollIntoView({block: 'center', behavior: 'smooth'});
    });
}

function closeOverlay() {
    document.getElementById('index-overlay').classList.remove('open');
}

// 가로 스크롤 영역: 마우스 휠 → 가로 스크롤 변환
document.querySelectorAll('#audio-map, #slide-nav').forEach(el => {
    el.addEventListener('wheel', (e) => {
        if (el.scrollWidth <= el.clientWidth) return; // 스크롤 불필요
        e.preventDefault();
        el.scrollLeft += e.deltaY;
    }, {passive: false});
});

init();
buildOverlayIndex();
initSubtitleControls();

// ========== 플로팅 자막 드래그 + 컨트롤 ==========
function initSubtitleControls() {
    const box = document.getElementById('subtitle-box');
    if (!box) return;
    const mobileQuery = window.matchMedia('(max-width: 900px)');
    let isMobile = mobileQuery.matches;
    mobileQuery.addEventListener('change', (e) => { isMobile = e.matches; });

    // localStorage에서 설정 복원
    const saved = JSON.parse(localStorage.getItem('sc-sub-settings') || '{}');
    let fontSize = saved.fontSize || 16;
    let posMode = saved.posMode || 'bottom'; // bottom, top, overlay, hidden, free
    let freeX = saved.freeX;
    let freeY = saved.freeY;
    let freeW = saved.freeW;

    const subText = document.getElementById('subtitle-text');
    subText.style.fontSize = fontSize + 'px';

    // 위치 모드 적용
    function applyPos(mode) {
        posMode = mode;
        box.classList.remove('free', 'hidden');
        if (mode === 'hidden') {
            box.classList.add('hidden');
        } else if (mode === 'free') {
            box.classList.add('free');
            box.style.left = (freeX || 100) + 'px';
            box.style.top = (freeY || (window.innerHeight - 100)) + 'px';
            box.style.bottom = 'auto';
            box.style.transform = 'none';
            if (freeW) box.style.width = freeW + 'px';
        } else {
            // bottom (기본)
            box.style.left = '50%'; box.style.top = '';
            box.style.bottom = (window.innerWidth <= 900 ? '56px' : '20px'); box.style.transform = 'translateX(-50%)';
            box.style.width = '';
        }
        saveSettings();
        document.getElementById('sub-hide-btn').classList.toggle('active', mode !== 'hidden');
    }

    function saveSettings() {
        const r = box.getBoundingClientRect();
        localStorage.setItem('sc-sub-settings', JSON.stringify({
            fontSize, posMode, ccMode,
            freeX: posMode === 'free' ? r.left : freeX,
            freeY: posMode === 'free' ? r.top : freeY,
            freeW: posMode === 'free' ? r.width : freeW,
        }));
    }

    // 위치 전환 버튼: bottom↔free
    const posIcon = document.getElementById('sub-pos-icon');
    function updatePosIcon() {
        const svgMove = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M2 12h20M5 5l-3 3 3 3M19 5l3 3-3 3M5 19l-3-3 3-3M19 19l3-3-3-3"/></svg>';
        const svgVert = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M5 5l7-3 7 3M5 19l7 3 7-3"/></svg>';
        const svgDock = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="14" width="18" height="7" rx="2"/><path d="M3 3h18v7H3z" opacity="0.3"/></svg>';
        if (isMobile) { posIcon.innerHTML = posMode === 'free' ? svgVert : svgDock; }
        else { posIcon.innerHTML = posMode === 'free' ? svgDock : svgMove; }
    }
    document.getElementById('sub-pos-btn').onclick = () => {
        if (posMode === 'hidden') { applyPos('bottom'); }
        else { applyPos(posMode === 'bottom' ? 'free' : 'bottom'); }
        updatePosIcon();
    };
    mobileQuery.addEventListener('change', updatePosIcon);

    // 폰트 크기
    document.getElementById('sub-size-up').onclick = () => {
        fontSize = Math.min(28, fontSize + 2);
        subText.style.fontSize = fontSize + 'px';
        saveSettings();
    };
    document.getElementById('sub-size-dn').onclick = () => {
        fontSize = Math.max(10, fontSize - 2);
        subText.style.fontSize = fontSize + 'px';
        saveSettings();
    };

    // CC 모드: default → text-only → hidden
    let ccMode = saved.ccMode || 'default';
    const ccModes = ['default', 'text-only', 'hidden'];

    function applyCcMode(mode) {
        ccMode = mode;
        box.classList.remove('hidden', 'text-only');
        if (mode === 'hidden') {
            box.classList.add('hidden');
        } else if (mode === 'text-only') {
            box.classList.add('text-only');
        }
        const btn = document.getElementById('sub-hide-btn');
        btn.style.opacity = mode === 'hidden' ? '0.4' : mode === 'text-only' ? '0.7' : '1';
        btn.classList.toggle('active', mode === 'default');
        saveSettings();
    }

    document.getElementById('sub-hide-btn').onclick = () => {
        const idx = ccModes.indexOf(ccMode);
        applyCcMode(ccModes[(idx + 1) % ccModes.length]);
    };
    applyCcMode(ccMode);

    // PC 드래그 (free 모드)
    let dragStartX, dragStartY, boxStartX, boxStartY, isDragging = false;

    // 마우스 드래그 (PC: 자유 이동, 모바일 규격: 수직만)
    box.addEventListener('mousedown', (e) => {
        if (posMode !== 'free' || e.target.tagName === 'BUTTON') return;
        isDragging = true;
        box.classList.add('dragging');
        dragStartX = e.clientX; dragStartY = e.clientY;
        const r = box.getBoundingClientRect();
        boxStartX = r.left; boxStartY = r.top;
        e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const dy = e.clientY - dragStartY;
        box.style.top = (boxStartY + dy) + 'px';
        box.style.bottom = 'auto';
        if (!isMobile) {
            const dx = e.clientX - dragStartX;
            box.style.left = (boxStartX + dx) + 'px';
        }
    });

    document.addEventListener('mouseup', () => {
        if (!isDragging) return;
        isDragging = false;
        box.classList.remove('dragging');
        freeX = parseInt(box.style.left);
        freeY = parseInt(box.style.top);
        saveSettings();
    });

    // 모바일 터치 드래그 (free 모드 — 수직 이동만)
    box.addEventListener('touchstart', (e) => {
        if (posMode !== 'free') return;
        isDragging = true;
        box.classList.add('dragging');
        const touch = e.touches[0];
        dragStartY = touch.clientY;
        const r = box.getBoundingClientRect();
        boxStartY = r.top;
    }, {passive: true});

    document.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        const touch = e.touches[0];
        const newY = boxStartY + touch.clientY - dragStartY;
        box.style.top = newY + 'px';
        box.style.bottom = 'auto';
        box.style.left = '50%';
        box.style.transform = 'translateX(-50%)';
    }, {passive: true});

    document.addEventListener('touchend', () => {
        if (!isDragging) return;
        isDragging = false;
        box.classList.remove('dragging');
        freeY = parseInt(box.style.top);
        saveSettings();
    });

    // 초기 적용
    applyPos(posMode);
    updatePosIcon();
}

</script>
