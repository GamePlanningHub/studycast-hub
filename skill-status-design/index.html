        updateSubtitle(audio.currentTime);
        if (_mappingMode) { _scHighlightAudioMapAt(audio.currentTime); return; }
        syncSlideToTime(audio.currentTime);
    });
    // 모바일: 메타데이터 미로드 시 로딩 상태 표시
    if (!audio.duration || !isFinite(audio.duration)) {
        playBtn.classList.add('loading');
        timeDisplay.classList.add('loading');
        timeDisplay.textContent = '로딩 중...';
    }
}

        seekBar.max = audio.duration;

// URL ?q= 파라미터로 전달된 키워드가 포함된 목차 항목 하이라이트
function highlightKeywordMatches() {
    const params = new URLSearchParams(window.location.search);
    const q = params.get('q');
    if (!q) return;
    const kw = q.trim().replace(/\s/g, '').toLowerCase();
    if (!kw) return;
    SLIDES.forEach((slide, i) => {
        // HTML 태그 제거 후 띄어쓰기 제거 + 소문자 변환
        const text = (slide.title + ' ' + slide.content.replace(/<[^>]*>/g, ''))
            .replace(/\s/g, '').toLowerCase();
        if (text.indexOf(kw) !== -1) {
            if (_indexItems[i]) _indexItems[i].classList.add('keyword-match');
            if (_overlayItems[i]) _overlayItems[i].classList.add('keyword-match');
        }
    });
}

// ?q= 검색어를 슬라이드 본문에서 찾아 <mark>로 형광펜.
// 런처 검색/목차 하이라이트와 동일한 정규화(공백 제거 + 소문자)로 매칭하되,
// 인덱스 매핑으로 화면 본문의 원래 띄어쓰기는 보존한다 (search-index.json은 공백 없는 텍스트).
var _wsRe = /\s/;
var _kwHlValue, _kwHlComputed = false;
function _kwHighlight() {
    if (_kwHlComputed) return _kwHlValue;
    _kwHlComputed = true;
    var q = new URLSearchParams(window.location.search).get('q');
    var kw = q ? q.trim().replace(/\s/g, '').toLowerCase() : '';
    _kwHlValue = kw || null;
    return _kwHlValue;
}
// 텍스트 노드 하나에서 공백 무시 매칭 → <mark> 래핑 (원본 공백 보존)
function _highlightTextNode(node, kw) {
    var text = node.nodeValue;
    var compact = '', map = [];  // map[i] = compact i번째 글자의 원본 인덱스
    for (var i = 0; i < text.length; i++) {
        var ch = text[i];
        if (_wsRe.test(ch)) continue;  // 공백은 인덱스에서 제외(런처와 동일)
        compact += ch.toLowerCase();
        map.push(i);
    }
    if (compact.indexOf(kw) === -1) return;
    var ranges = [], p = 0, idx;
    while ((idx = compact.indexOf(kw, p)) !== -1) {
        // compact 매칭 구간을 원본 인덱스로 환산(끝글자 원본위치 +1)
        ranges.push([map[idx], map[idx + kw.length - 1] + 1]);
        p = idx + kw.length;
    }
    var frag = document.createDocumentFragment(), last = 0;
    ranges.forEach(function (r) {
        if (r[0] > last) frag.appendChild(document.createTextNode(text.slice(last, r[0])));
        var mk = document.createElement('mark');
        mk.className = 'hl';
        mk.textContent = text.slice(r[0], r[1]);  // 원본(공백 포함) 그대로 칠함
        frag.appendChild(mk);
        last = r[1];
    });
    if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
    node.parentNode.replaceChild(frag, node);
}
// 슬라이드 본문(container) 전체에 형광펜 적용.
// 편집 모드에서는 contentEditable 본문에 <mark>가 섞여 KV에 저장되는 걸 막기 위해 건너뜀.
function _applySlideHighlight(container) {
    if (_editMode) return;
    var kw = _kwHighlight();
    if (!kw || !container) return;
    var SKIP = { SCRIPT: 1, STYLE: 1, MARK: 1 };
    var walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, {
        acceptNode: function (node) {
            if (!node.nodeValue || !node.nodeValue.trim()) return NodeFilter.FILTER_REJECT;
            if (node.parentNode && SKIP[node.parentNode.nodeName]) return NodeFilter.FILTER_REJECT;
            return NodeFilter.FILTER_ACCEPT;
        }
    });
    // 순회 중 DOM을 바꾸면 walker가 꼬이므로 노드를 먼저 모은 뒤 교체
    var nodes = [], n;
    while ((n = walker.nextNode())) nodes.push(n);
    nodes.forEach(function (node) { _highlightTextNode(node, kw); });
}

function buildAudioMap() {
    const map = document.getElementById('audio-map');
    if (!map) return;
    // 재호출 대응: 기존 DOM·캐시 배열 클리어
    map.innerHTML = '';
    _mapSegments.length = 0;
    _prevMapSeg = null;
    let prevEnd = 0;
    audioSlides.forEach((s, i) => {
        const slide = SLIDES[s.idx];
        const duration = s.end - s.start;
        // 시간 갭이 있으면 빈 공간 삽입
        if (s.start > prevEnd + 1) {
            const gap = document.createElement('div');
            gap.className = 'map-gap';
            gap.style.flexGrow = (s.start - prevEnd).toFixed(1);
            map.appendChild(gap);
        }
        const seg = document.createElement('div');
        seg.className = 'map-segment';
        seg.dataset.idx = s.idx;
        seg.style.flexGrow = duration.toFixed(1);
        seg.textContent = slide.id.replace('P', '');
        seg.title = slide.id + ' — ' + slide.title;
        seg.onclick = () => {
            audio.currentTime = s.start;
            isAutoSync = true;
            syncSlideToTime(s.start);
        };
        map.appendChild(seg);
        _mapSegments.push({el: seg, idx: s.idx});
        prevEnd = s.end;
    });
}

// 매핑 편집 반영: audioSlides 재계산 → audioMap 재빌드 → nav/index 클래스 + 뱃지 갱신.
// showSlide 재호출은 피한다 — 같은 인덱스 재호출 시 _captureCurrentEdit가 안 불려
// 편집 중 미캡처 타이핑이 날아갈 수 있기 때문. 뱃지·매핑바만 직접 갱신한다.
function _scRebuildAudioStructures() {
    _scRecomputeAudioSlides();
    buildAudioMap();
    // nav dot의 has-audio/no-audio 클래스 재설정
    SLIDES.forEach(function(slide, i) {
        var dot = _navDots[i];
        if (!dot) return;
        dot.classList.toggle('has-audio', !!slide.hasAudio);
        dot.classList.toggle('no-audio', !slide.hasAudio);
    });
    // index item의 has-audio 클래스 재설정
    SLIDES.forEach(function(slide, i) {
        var item = _indexItems[i];
        if (item) item.classList.toggle('has-audio', !!slide.hasAudio);
        var ov = _overlayItems[i];
        if (ov) ov.classList.toggle('has-audio', !!slide.hasAudio);
    });
    // 현재 슬라이드의 '교안 전용' 뱃지 수동 갱신 (slide-content 건드리지 않음)
    var cur = SLIDES[currentSlide];
    var badge = document.getElementById('slide-badge');
    if (cur && badge) {
        if (cur.hasAudio) {
            badge.textContent = '';
            badge.className = '';
            badge.style.display = 'none';
        } else {
            badge.textContent = '교안 전용';
            badge.className = 'badge-no-audio';
            badge.style.display = '';
        }
    }
    // 현재 활성 map segment 재하이라이트: 매핑 모드는 재생 위치 기준, 그 외는 현재 슬라이드 기준
    if (_mappingMode && typeof _scHighlightAudioMapAt === 'function') {
        _scHighlightAudioMapAt(audio.currentTime);
    } else if (typeof updateAudioMap === 'function') {
        updateAudioMap(currentSlide);
    }
    // 매핑 편집 모드면 컨트롤 바도 재렌더 (Task 6에서 정의)
    if (typeof _scRenderMappingBar === 'function') _scRenderMappingBar();
}

// 수평 스크롤 컨테이너 내 요소를 가운데로 스크롤 (양끝단은 끄트머리 정렬)
function _scrollDotCenter(container, el) {
    if (!container || !el) return;
    var target = el.offsetLeft - (container.clientWidth - el.offsetWidth) / 2;
    container.scrollTo({ left: target, behavior: 'smooth' });
}

function updateAudioMap(currentIdx) {
    if (_prevMapSeg) _prevMapSeg.classList.remove('active');
    var oldSeg = _prevMapSeg;
    _prevMapSeg = null;
    for (let i = 0; i < _mapSegments.length; i++) {
        if (_mapSegments[i].idx === currentIdx) {
            _mapSegments[i].el.classList.add('active');
            _prevMapSeg = _mapSegments[i].el;
            if (_prevMapSeg !== oldSeg) _scrollDotCenter(document.getElementById('audio-map'), _prevMapSeg);
            break;
        }
    }
}

function showSlide(index) {
    if (index < 0 || index >= SLIDES.length) return;
    // 편집 모드: 이전 슬라이드의 편집 내용을 인메모리 캡처 (자막편집과 동일 방식)
    if (_editMode && currentSlide !== index) {
        _captureCurrentEdit();
    }
    currentSlide = index;
    const slide = SLIDES[index];
    document.getElementById('slide-id').textContent = slide.id;
    document.getElementById('slide-title').textContent = slide.title;
    const contentEl = document.getElementById('slide-content');
    contentEl.style.animation = 'none';
    contentEl.offsetHeight; // 리플로우 트리거
    contentEl.style.animation = '';
    contentEl.innerHTML = slide.content;
    _applySlideHighlight(contentEl);  // ?q= 검색어 본문 형광펜 (편집모드 가드 내장)
    const badge = document.getElementById('slide-badge');
    if (slide.hasAudio) {
        badge.textContent = '';
        badge.className = '';
        badge.style.display = 'none';
    } else {
        badge.textContent = '교안 전용';
        badge.className = 'badge-no-audio';
        badge.style.display = '';
    }
    // 네비게이션 도트 활성화 (캐싱) + 가운데 스크롤
    if (_prevNavDot) _prevNavDot.classList.remove('active');
    if (_navDots[index]) { _navDots[index].classList.add('active'); _prevNavDot = _navDots[index]; }
    _scrollDotCenter(document.getElementById('slide-nav'), _navDots[index]);
    // 인덱스 패널 활성화 (캐싱)
    if (_prevIndexItem) _prevIndexItem.classList.remove('active');
    if (_indexItems[index]) {
        _indexItems[index].classList.add('active');
        _indexItems[index].scrollIntoView({block: 'nearest', behavior: 'smooth'});
        _prevIndexItem = _indexItems[index];
    }
    // 오디오 맵 활성화
    if (_mappingMode) {
        // 매핑 편집 모드: 슬라이드 인덱스가 아니라 재생 위치 기준 하이라이트
        _scHighlightAudioMapAt(audio.currentTime);
    } else {
        updateAudioMap(index);
    }
    // 모바일 FAB: 첫/끝 슬라이드에서 이동 불가 버튼 숨김 (레이아웃 유지)
    var _navPrev = document.getElementById('nav-prev');
    var _navNext = document.getElementById('nav-next');
    if (_navPrev) _navPrev.style.visibility = (index === 0) ? 'hidden' : '';
    if (_navNext) _navNext.style.visibility = (index === SLIDES.length - 1) ? 'hidden' : '';

    // 편집 모드: contenteditable 유지
    if (_editMode) {
        document.getElementById('slide-content').contentEditable = 'true';
        document.getElementById('slide-title').contentEditable = 'true';
    }
    // 메모 패널: 이전 패널 항상 제거 후 조건부 재생성
    var oldMemo = document.querySelector('.memo-panel');
    if (oldMemo) oldMemo.remove();
    if (_scLoaded && (_editMode || (_scData.memos && _scData.memos[slide.id]))) {
        buildMemoPanel();
    }

    window.scrollTo({top: 0, behavior: 'smooth'});
    // 매핑 편집 모드면 컨트롤 바 갱신
    if (typeof _scRenderMappingBar === 'function') _scRenderMappingBar();
}

// 시간 기반 슬라이드 동기화 (바이너리 서치)
// end 필드는 동기화에 미사용 — mapping.json의 overlap/역전/end 오염에 구조적으로 강건.
// "구간 포함(start<=t<end)" 로직으로 바꾸지 말 것. 86개 누적 이슈가 즉시 표면화됨.
// 상세: .files/2026-04-09-mapping-audit.md
function syncSlideToTime(t) {
    let lo = 0, hi = audioSlides.length - 1, result = -1;
    while (lo <= hi) {
        const mid = (lo + hi) >> 1;
        if (audioSlides[mid].start <= t) { result = mid; lo = mid + 1; }
        else { hi = mid - 1; }
    }
    const targetIdx = result >= 0 ? audioSlides[result].idx : -1;
    if (targetIdx >= 0 && targetIdx !== currentSlide) {
        showSlide(targetIdx);
    }
}

// 매핑 편집 모드 전용: 슬라이드 이동 없이 오디오 맵 도트만 하이라이트
function _scHighlightAudioMapAt(t) {
    let lo = 0, hi = audioSlides.length - 1, result = -1;
    while (lo <= hi) {
        const mid = (lo + hi) >> 1;
        if (audioSlides[mid].start <= t) { result = mid; lo = mid + 1; }
        else { hi = mid - 1; }
    }
    const targetIdx = result >= 0 ? audioSlides[result].idx : -1;
    // -1 전달 시에도 updateAudioMap이 _prevMapSeg를 정리하므로 스테일 하이라이트 방지
    updateAudioMap(targetIdx);
}

function onTimeUpdate() {
    const t = audio.currentTime;
    seekBar.value = t;
    updateTimeDisplay();
    updateSubtitle(t);
    if (_subtitleMode) _steSyncHighlight(t);
    if (_mappingMode) { _scHighlightAudioMapAt(t); return; }
    if (!isAutoSync) return;
    syncSlideToTime(t);
}

function updateTimeDisplay() {
    const cur = formatTime(audio.currentTime);
    const dur = formatTime(audio.duration || 0);
    timeDisplay.textContent = cur + ' / ' + dur;
}

function formatTime(sec) {
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return m + ':' + (s < 10 ? '0' : '') + s;
}

function togglePlay() {
    if (audio.paused) {
        var p = audio.play(); if (p && p.catch) p.catch(function(){});
        playBtn.innerHTML = ICON_PAUSE;
        isAutoSync = true;
    } else {
        audio.pause();
        playBtn.innerHTML = ICON_PLAY;
    }
}

function changeSpeed(val) {
    audio.playbackRate = parseFloat(val);
}

function skipTime(sec) {
    audio.currentTime = Math.max(0, Math.min(audio.duration || 0, audio.currentTime + sec));
}

const SPEED_STEPS = [0.5, 0.75, 1.0, 1.25, 1.5, 1.75, 2.0];
document.addEventListener('keydown', (e) => {
    // 자막 편집 모드: Ctrl+S만 인터셉트, 나머지 비활성화
    if (_subtitleMode) {
        if ((e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'S')) {
            e.preventDefault();
            if (typeof _steSave === 'function') _steSave();
        }
        return;
    }
    // 매핑 편집 모드: Ctrl+S만 인터셉트, 나머지(Space/Arrow/+/-)는 기본 경로 fall-through
    if (_mappingMode && (e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'S')) {
        e.preventDefault();
        if (typeof saveEdit === 'function') saveEdit();
        return;
    }
    // 교안 편집 모드: Shift/Ctrl 조합만 플레이어·네비·저장으로 인터셉트, 일반 키는 편집 기본 동작(커서 이동·공백 입력) 유지
    if (_editMode) {
        // Ctrl/Cmd+S → 저장 (브라우저 기본 저장 다이얼로그 차단)
        if ((e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'S')) {
            e.preventDefault();
            if (typeof saveEdit === 'function') saveEdit();
            return;
        }
        // Shift+Space → 오디오 재생/정지 토글
        if (e.shiftKey && e.code === 'Space') {
            e.preventDefault();
            togglePlay();
            return;
        }
        // Shift+←/→ → 이전/다음 슬라이드 (인메모리 편집분은 기존 _captureCurrentEdit 경로로 자동 보존)
        if (e.shiftKey && e.code === 'ArrowLeft') {
            e.preventDefault();
            showSlide(currentSlide - 1);
            isAutoSync = false;
            return;
        }
        if (e.shiftKey && e.code === 'ArrowRight') {
            e.preventDefault();
            showSlide(currentSlide + 1);
            isAutoSync = false;
            return;
        }
        return;
    }
    if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
    if (e.code === 'ArrowLeft') { showSlide(currentSlide - 1); isAutoSync = false; }
    if (e.code === 'ArrowRight') { showSlide(currentSlide + 1); isAutoSync = false; }
    if (e.key === '-' || e.key === '_') {
        const cur = SPEED_STEPS.indexOf(audio.playbackRate);
        const idx = cur > 0 ? cur - 1 : 0;
        audio.playbackRate = SPEED_STEPS[idx];
        document.getElementById('speed-select').value = SPEED_STEPS[idx];
    }
    if (e.key === '=' || e.key === '+') {
        const cur = SPEED_STEPS.indexOf(audio.playbackRate);
        const idx = cur < SPEED_STEPS.length - 1 ? (cur === -1 ? 2 : cur + 1) : SPEED_STEPS.length - 1;
        audio.playbackRate = SPEED_STEPS[idx];
        document.getElementById('speed-select').value = SPEED_STEPS[idx];
    }
});

function updateSubtitle(t) {
    if (typeof TRANSCRIPT === 'undefined' || TRANSCRIPT.length === 0) return;
    const idx = findTranscriptIdx(t);
    if (idx === lastSubIdx) return;
    lastSubIdx = idx;
    const el = document.getElementById('subtitle-text');
    if (el) el.textContent = idx >= 0 ? TRANSCRIPT[idx].text : '';
}

function findTranscriptIdx(t) {
    let lo = 0, hi = TRANSCRIPT.length - 1, result = -1;
    while (lo <= hi) {
        const mid = (lo + hi) >> 1;
        if (TRANSCRIPT[mid].start <= t) { result = mid; lo = mid + 1; }
        else { hi = mid - 1; }
    }
    if (result >= 0 && t <= TRANSCRIPT[result].end) return result;
    return -1;
}

// 모바일 목차 오버레이
function buildOverlayIndex() {
    const list = document.getElementById('index-overlay-list');
    if (!list) return;
    SLIDES.forEach((slide, i) => {
        const item = _buildIndexItem(slide, list);
        item.onclick = () => { isAutoSync = false; showSlide(i); closeOverlay(); };
        _overlayItems.push(item);
    });
}

function openOverlay() {
    const ov = document.getElementById('index-overlay');
    ov.classList.add('open');
    // 현재 슬라이드 하이라이트 (캐싱된 참조)
    _overlayItems.forEach((item, i) => {
        item.classList.toggle('active', i === currentSlide);
        if (i === currentSlide) item.scrollIntoView({block: 'center', behavior: 'smooth'});
    });
}

function closeOverlay() {
    document.getElementById('index-overlay').classList.remove('open');
}

// 가로 스크롤 영역: 마우스 휠 → 가로 스크롤 변환
document.querySelectorAll('#audio-map, #slide-nav').forEach(el => {
    el.addEventListener('wheel', (e) => {
        if (el.scrollWidth <= el.clientWidth) return; // 스크롤 불필요
        e.preventDefault();
        el.scrollLeft += e.deltaY;
    }, {passive: false});
});

var _steSegments = [];
var _steOriginals = [];
var _steCurrentIdx = -1;

const STE_LS_KEY = 'subtitle_backup_' + SC_REPO;

// 전역 keydown에서 자막 저장을 호출하기 위한 브릿지
window._steSave = _steSave;
// loadOverlayData(전역)에서 IIFE 내부 자막 편집 상태를 갱신하기 위한 브릿지
window._steApplyOverlay = function(transcriptEdits) {
    for (var segId in transcriptEdits) {
        var idx = parseInt(segId);
        if (idx < _steSegments.length) {
            _steSegments[idx].text = transcriptEdits[segId];
            _steOriginals[idx] = transcriptEdits[segId];
        }
    }
    _steRender();
    _steLsRestore();
};

function initSubtitleEdit() {
    if (!_subtitleMode) return;
    _editMode = false;

    _steSegments = TRANSCRIPT.map((t, i) => ({ id: i, start: t.start, end: t.end, text: t.text }));
    _steOriginals = TRANSCRIPT.map(t => t.text);

    var subBox = document.getElementById('subtitle-box');
    if (subBox) subBox.style.display = 'none';
    var subCtrl = document.getElementById('sub-controls');
    if (subCtrl) subCtrl.style.display = 'none';

    document.getElementById('subtitle-edit-area').style.display = 'block';
    document.getElementById('slide-area').style.display = 'none';

    // 목차 패널 + 모바일 FAB 숨김
    var idxPanel = document.getElementById('index-panel');
    if (idxPanel) idxPanel.style.display = 'none';
    var idxFab = document.getElementById('index-fab');
    if (idxFab) idxFab.style.display = 'none';
    var mobileFab = document.getElementById('mobile-fab-group');
    if (mobileFab) mobileFab.style.display = 'none';

    // 버튼 이벤트 바인딩 (IIFE 내부 함수 접근을 위해 addEventListener 사용)
    document.getElementById('ste-save-btn').addEventListener('click', function() { _steSave(); });

    var steSearchTimer;
    document.getElementById('ste-search').addEventListener('input', function() {
        clearTimeout(steSearchTimer);
        steSearchTimer = setTimeout(function() { _steRender(); }, 150);
    });

    _steRender();
}

function _steGetVisibleSegments() {
    return _steSegments;
}

function _steRender() {
    var panel = document.getElementById('ste-panel');
    panel.innerHTML = '';
    var query = (document.getElementById('ste-search').value || '').trim().toLowerCase();
    var segs = _steGetVisibleSegments();
    var shown = 0;

    segs.forEach(function(seg) {
        if (query && !seg.text.toLowerCase().includes(query)) return;
        shown++;

        var row = document.createElement('div');
        row.className = 'ste-row';
        row.dataset.id = seg.id;
        if (seg.text !== _steOriginals[seg.id]) row.classList.add('modified');

        var ts = document.createElement('span');
        ts.className = 'ste-ts';
        ts.textContent = _steFmtTime(seg.start);
        ts.title = _steFmtTime(seg.start) + ' ~ ' + _steFmtTime(seg.end);
        ts.onclick = function() { audio.currentTime = seg.start; };

        var ta = document.createElement('textarea');
        ta.className = 'ste-text';
        ta.value = seg.text;
        ta.rows = 1;
        ta.addEventListener('input', function() {
            _steAutoResize(ta);
            seg.text = ta.value;
            TRANSCRIPT[seg.id].text = ta.value;
            var modified = ta.value !== _steOriginals[seg.id];
            row.classList.toggle('modified', modified);
            _steUpdateBadge();
            _steLsBackup();
        });
        ta.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                var next = panel.querySelector('.ste-row[data-id="' + (seg.id + 1) + '"] .ste-text');
                if (next) { next.focus(); next.select(); }
            }
        });

        row.appendChild(ts);
        row.appendChild(ta);
        panel.appendChild(row);
    });

    if (shown === 0) {
        var empty = document.createElement('div');
        empty.style.cssText = 'text-align:center;padding:40px 0;color:var(--text-muted);font-size:14px;';
        empty.textContent = query ? '검색 결과 없음' : '자막이 없습니다.';
        panel.appendChild(empty);
    }

    // DOM append 후 전체 textarea 높이 조정
    requestAnimationFrame(function() {
        panel.querySelectorAll('.ste-text').forEach(_steAutoResize);
    });
}

function _steAutoResize(ta) {
    ta.style.height = '0';
    ta.style.height = ta.scrollHeight + 'px';
}

function _steUpdateBadge() {
    var n = _steSegments.filter(function(s) { return s.text !== _steOriginals[s.id]; }).length;
    var badge = document.getElementById('ste-change-badge');
    badge.style.display = n > 0 ? 'inline-block' : 'none';
    badge.textContent = n + '개 수정됨';
    document.getElementById('ste-save-btn').disabled = (n === 0);
}

function _steFmtTime(s) {
    if (!s || !isFinite(s)) return '0:00';
    var m = Math.floor(s / 60);
    var sec = Math.floor(s % 60);
    return m + ':' + String(sec).padStart(2, '0');
}

function _steSyncHighlight(t) {
    if (!_subtitleMode) return;
    var idx = findTranscriptIdx(t);
    if (idx === _steCurrentIdx) return;
    _steCurrentIdx = idx;
    var panel = document.getElementById('ste-panel');
    var prev = panel.querySelector('.ste-row.active');
    if (prev) prev.classList.remove('active');
    if (idx >= 0) {
        var row = panel.querySelector('.ste-row[data-id="' + idx + '"]');
        if (row) {
            row.classList.add('active');
            if (document.activeElement && document.activeElement.className !== 'ste-text') {
                row.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }
    }
}

function _steLsBackup() {
    try {
        var changed = {};
        _steSegments.forEach(function(s) {
            if (s.text !== _steOriginals[s.id]) changed[s.id] = s.text;
        });
        if (Object.keys(changed).length > 0) {
            localStorage.setItem(STE_LS_KEY, JSON.stringify({ ts: Date.now(), changes: changed }));
        } else {
            localStorage.removeItem(STE_LS_KEY);
        }
    } catch(e) {}
}

function _steLsRestore() {
    try {
        var raw = localStorage.getItem(STE_LS_KEY);
        if (!raw) return;
        var data = JSON.parse(raw);
        var ago = Math.round((Date.now() - data.ts) / 60000);
        var count = Object.keys(data.changes).length;
        if (count === 0) return;
        if (!confirm(count + '개의 미저장 자막 수정분이 있습니다 (' + ago + '분 전).\n복원할까요?')) {
            localStorage.removeItem(STE_LS_KEY);
            return;
        }
        for (var idStr in data.changes) {
            var id = parseInt(idStr);
            if (id < _steSegments.length) {
                _steSegments[id].text = data.changes[idStr];
                TRANSCRIPT[id].text = data.changes[idStr];
            }
        }
        _steRender();
        _steUpdateBadge();
    } catch(e) {}
}

function _steLsClear() {
    try { localStorage.removeItem(STE_LS_KEY); } catch(e) {}
}

async function _steSave() {
    var btn = document.getElementById('ste-save-btn');
    btn.disabled = true;
    btn.textContent = '저장 중…';
    try {
        var changed = _steSegments.filter(function(s) { return s.text !== _steOriginals[s.id]; });
        var res = await fetch(
            SC_API + '/api/transcript/' + encodeURIComponent(SC_REPO),
            {
                method: 'PUT',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ segments: changed.map(function(s) { return { id: s.id, text: s.text }; }) })
            }
        );
        if (!res.ok) throw new Error('저장 실패');
        _steSegments.forEach(function(s) { _steOriginals[s.id] = s.text; });
        document.querySelectorAll('.ste-row.modified').forEach(function(r) { r.classList.remove('modified'); });
        _steUpdateBadge();
        btn.textContent = '저장';
        _steLsClear();
        var stat = document.getElementById('ste-save-status');
        stat.style.opacity = '1';
        setTimeout(function() { stat.style.opacity = '0'; }, 2500);
    } catch (e) {
        alert('자막 저장 실패: ' + e.message);
        btn.disabled = false;
        btn.textContent = '저장';
    }
}

function initSubtitleControls() {
    const box = document.getElementById('subtitle-box');
    if (!box) return;
    const mobileQuery = window.matchMedia('(max-width: 900px)');
    let isMobile = mobileQuery.matches;
    mobileQuery.addEventListener('change', (e) => { isMobile = e.matches; });

    // localStorage에서 설정 복원
    let saved = {};
    try { saved = JSON.parse(localStorage.getItem('sc-sub-settings') || '{}'); } catch(e) {}
    let fontSize = saved.fontSize || 16;
    let posMode = saved.posMode || 'bottom'; // bottom, top, overlay, hidden, free
    let freeX = saved.freeX;
    let freeY = saved.freeY;
    let freeW = saved.freeW;

    const subText = document.getElementById('subtitle-text');
    subText.style.fontSize = fontSize + 'px';

    // 위치 모드 적용
    function applyPos(mode) {
        posMode = mode;
        box.classList.remove('free', 'hidden');
        if (mode === 'hidden') {
            box.classList.add('hidden');
        } else if (mode === 'free') {
            box.classList.add('free');
            box.style.left = (freeX || 100) + 'px';
            box.style.top = (freeY || (window.innerHeight - 100)) + 'px';
            box.style.bottom = 'auto';
            box.style.transform = 'none';
            if (freeW) box.style.width = freeW + 'px';
        } else {
            // bottom (기본)
            box.style.left = '50%'; box.style.top = '';
            box.style.bottom = (window.innerWidth <= 900 ? '56px' : '20px'); box.style.transform = 'translateX(-50%)';
            box.style.width = '';
        }
        saveSettings();
        document.getElementById('sub-hide-btn').classList.toggle('active', mode !== 'hidden');
    }

    function saveSettings() {
        try {
            const r = box.getBoundingClientRect();
            localStorage.setItem('sc-sub-settings', JSON.stringify({
                fontSize, posMode, ccMode,
                freeX: posMode === 'free' ? r.left : freeX,
                freeY: posMode === 'free' ? r.top : freeY,
                freeW: posMode === 'free' ? r.width : freeW,
            }));
        } catch(e) {}
    }

    // 위치 전환 버튼: bottom↔free
    const posIcon = document.getElementById('sub-pos-icon');
    function updatePosIcon() {
        const svgMove = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M2 12h20M9 5l3-3 3 3M9 19l3 3 3-3M5 9l-3 3 3 3M19 9l3 3-3 3"/></svg>';
        const svgVert = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M5 5l7-3 7 3M5 19l7 3 7-3"/></svg>';
        const svgDock = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="14" width="18" height="7" rx="2"/><path d="M3 3h18v7H3z" opacity="0.3"/></svg>';
        if (isMobile) { posIcon.innerHTML = posMode === 'free' ? svgVert : svgDock; }
        else { posIcon.innerHTML = posMode === 'free' ? svgDock : svgMove; }
    }
    document.getElementById('sub-pos-btn').onclick = () => {
        if (posMode === 'hidden') { applyPos('bottom'); }
        else { applyPos(posMode === 'bottom' ? 'free' : 'bottom'); }
        updatePosIcon();
    };
    mobileQuery.addEventListener('change', updatePosIcon);

    // 폰트 크기
    document.getElementById('sub-size-up').onclick = () => {
        fontSize = Math.min(28, fontSize + 2);
        subText.style.fontSize = fontSize + 'px';
        saveSettings();
    };
    document.getElementById('sub-size-dn').onclick = () => {
        fontSize = Math.max(10, fontSize - 2);
        subText.style.fontSize = fontSize + 'px';
        saveSettings();
    };

    // CC 모드: default → text-only → hidden
    let ccMode = saved.ccMode || 'default';
    const ccModes = ['default', 'text-only', 'hidden'];

    function applyCcMode(mode) {
        ccMode = mode;
        box.classList.remove('hidden', 'text-only');
        if (mode === 'hidden') {
            box.classList.add('hidden');
        } else if (mode === 'text-only') {
            box.classList.add('text-only');
        }
        const btn = document.getElementById('sub-hide-btn');
        btn.style.opacity = mode === 'hidden' ? '0.4' : mode === 'text-only' ? '0.7' : '1';
        btn.classList.toggle('active', mode === 'default');
        saveSettings();
    }

    document.getElementById('sub-hide-btn').onclick = () => {
        const idx = ccModes.indexOf(ccMode);
        applyCcMode(ccModes[(idx + 1) % ccModes.length]);
    };
    applyCcMode(ccMode);

    // PC 드래그 (free 모드)
    let dragStartX, dragStartY, boxStartX, boxStartY, isDragging = false;

    // 마우스 드래그 (PC: 자유 이동, 모바일 규격: 수직만)
    box.addEventListener('mousedown', (e) => {
        if (posMode !== 'free' || e.target.tagName === 'BUTTON') return;
        isDragging = true;
        box.classList.add('dragging');
        dragStartX = e.clientX; dragStartY = e.clientY;
        const r = box.getBoundingClientRect();
        boxStartX = r.left; boxStartY = r.top;
        e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const dy = e.clientY - dragStartY;
        box.style.top = (boxStartY + dy) + 'px';
        box.style.bottom = 'auto';
        if (!isMobile) {
            const dx = e.clientX - dragStartX;
            box.style.left = (boxStartX + dx) + 'px';
        }
    });

    document.addEventListener('mouseup', () => {
        if (!isDragging) return;
        isDragging = false;
        box.classList.remove('dragging');
        freeX = parseInt(box.style.left);
        freeY = parseInt(box.style.top);
        saveSettings();
    });

    // 모바일 터치 드래그 (free 모드 — 수직 이동만)
    box.addEventListener('touchstart', (e) => {
        if (posMode !== 'free') return;
        isDragging = true;
        box.classList.add('dragging');
        const touch = e.touches[0];
        dragStartY = touch.clientY;
        const r = box.getBoundingClientRect();
        boxStartY = r.top;
    }, {passive: true});

    document.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        const touch = e.touches[0];
        const newY = boxStartY + touch.clientY - dragStartY;
        box.style.top = newY + 'px';
        box.style.bottom = 'auto';
        box.style.left = '50%';
        box.style.transform = 'translateX(-50%)';
    }, {passive: true});

    document.addEventListener('touchend', () => {
        if (!isDragging) return;
        isDragging = false;
        box.classList.remove('dragging');
        freeY = parseInt(box.style.top);
        saveSettings();
    });

    // 초기 적용
    applyPos(posMode);
    updatePosIcon();
}
// showSlide/currentSlide를 모바일 FAB에서 접근 가능하도록 전역 노출
// 전역 loadOverlayData에서 호출하는 목차 갱신 브릿지
window._refreshTocTitles = function() {
    SLIDES.forEach((s, i) => {
        if (_indexItems[i]) _indexItems[i].querySelector('.idx-title').textContent = s.title;
        if (_overlayItems[i]) _overlayItems[i].querySelector('.idx-title').textContent = s.title;
    });
};
// loadOverlayData가 SLIDES를 KV 편집본으로 교체한 뒤 키워드 하이라이트 재계산
window._rehighlightKeywordMatches = function() {
    _indexItems.forEach(it => it && it.classList.remove('keyword-match'));
    _overlayItems.forEach(it => it && it.classList.remove('keyword-match'));
    highlightKeywordMatches();
};
// 현재 슬라이드의 매핑 컨트롤 바 렌더 (교안 편집 모드 전용)
function _scRenderMappingBar() {
    var bar = document.getElementById('mapping-bar');
    if (!bar) return;
    if (!_mappingMode) {
        bar.classList.remove('active');
        bar.style.display = 'none';
        return;
    }
    var slide = SLIDES[currentSlide];
    if (!slide) return;

    document.getElementById('mb-section-id').textContent = slide.id;
    var rangeEl = document.getElementById('mb-range');
    if (slide.hasAudio && slide.start !== null && slide.end !== null) {
        var dur = (slide.end - slide.start).toFixed(1);
        rangeEl.textContent = '매핑: ' + slide.start.toFixed(1) + 's ~ ' + slide.end.toFixed(1) + 's  (duration ' + dur + 's)';
        rangeEl.classList.remove('empty');
    } else {
        rangeEl.textContent = '매핑 없음 (교안 전용)';
        rangeEl.classList.add('empty');
    }

    // 버튼 활성화 조건: audio.duration이 유효한 finite 값
    var durOk = isFinite(audio.duration) && audio.duration > 0;
    document.getElementById('mb-set-start').disabled = !durOk;
    document.getElementById('mb-set-end').disabled = !durOk;

    bar.classList.add('active');
    bar.style.display = 'flex';
}

window._scRenderMappingBar = _scRenderMappingBar;

// 매핑 편집 핵심 로직
// field: 'start' | 'end'
function _scApplyMappingEdit(sectionIdx, field) {
    var slide = SLIDES[sectionIdx];
    if (!slide) return;


    // 'start' or 'end': 현재 오디오 시점 T 사용
    var T = audio.currentTime;
    if (!isFinite(T) || T < 0) return;

    // 검증: 반대쪽 끝과의 정합성
    if (field === 'start' && slide.end !== null && T > slide.end) {
        _scToast('시작이 끝보다 이후일 수 없습니다');
        return;
    }
    if (field === 'end' && slide.start !== null && T < slide.start) {
        _scToast('끝이 시작보다 이전일 수 없습니다');
        return;
    }

    // No-op 감지: 새 값이 현재 값과 동일하면 아무 것도 하지 않음 (경계 클릭 방지)
    if (field === 'start' && slide.hasAudio && slide.start === T) return;
    if (field === 'end' && slide.hasAudio && slide.end === T) return;

    // P 자기 퇴화 체크: 새 start/end가 0-duration 또는 역전이면 거부
    var newStart = field === 'start' ? T : slide.start;
    var newEnd = field === 'end' ? T : slide.end;
    if (newStart !== null && newEnd !== null && newStart >= newEnd) {
        _scToast('매핑 구간이 0이거나 역전되어 설정할 수 없습니다');
        return;
    }

    // 베이스라인 기록 (취소 시 복원용) — 최초 1회만, 모든 guard 통과 후
    if (!_scMappingBaselines[slide.id]) {
        _scMappingBaselines[slide.id] = {
            start: slide.start,
            end: slide.end,
            hasAudio: slide.hasAudio,
        };
    }

    // 덮어쓰기 규칙: T를 포함하는 다른 페이지 Q의 반대쪽 끝을 T로 자르기
    // 경계값(q.start === T 또는 q.end === T)은 제외 — 엄격 부등식
    for (var i = 0; i < SLIDES.length; i++) {
        if (i === sectionIdx) continue;
        var q = SLIDES[i];
        if (!q.hasAudio || q.start === null || q.end === null) continue;
        if (q.start < T && T < q.end) {
            // 베이스라인 기록 — Q를 mutation하기 전, 세션 시작(KV 오버레이 머지 후) 상태 캡처
            if (!_scMappingBaselines[q.id]) {
                _scMappingBaselines[q.id] = { start: q.start, end: q.end, hasAudio: q.hasAudio };
            }
            if (field === 'start') {
                q.end = T;
            } else {
                q.start = T;
            }
            // Q가 퇴화되면(start >= end) 교안 전용으로 강등
            if (q.start >= q.end) {
                q.hasAudio = false;
                q.start = null;
                q.end = null;
                _scMappingDeletions[q.id] = true;
                delete _scDirtyMappings[q.id];
            } else {
                _scDirtyMappings[q.id] = true;
                delete _scMappingDeletions[q.id];
            }
            break; // 겹침은 항상 0 또는 1개 (불변조건)
        }
    }

    // P 자신의 엔드포인트 설정
    if (field === 'start') {
        slide.start = T;
        if (slide.end === null) slide.end = T + 1;  // 임시 placeholder (사용자가 끝도 설정해야 함)
    } else {
        slide.end = T;
        if (slide.start === null) slide.start = Math.max(0, T - 1);
    }
    slide.hasAudio = true;

    // 완전 삼킴 검사: P가 다른 Q를 완전히 삼켰다면 Q 강등
    for (var j = 0; j < SLIDES.length; j++) {
        if (j === sectionIdx) continue;
        var qq = SLIDES[j];
        if (!qq.hasAudio || qq.start === null || qq.end === null) continue;
        if (slide.start <= qq.start && qq.end <= slide.end) {
            // 베이스라인 기록 — qq를 nullify하기 전, 세션 시작 상태 캡처
            if (!_scMappingBaselines[qq.id]) {
                _scMappingBaselines[qq.id] = { start: qq.start, end: qq.end, hasAudio: qq.hasAudio };
            }
            qq.hasAudio = false;
            qq.start = null;
            qq.end = null;
            _scMappingDeletions[qq.id] = true;
            delete _scDirtyMappings[qq.id];
            _scToast(qq.id + ' 매핑이 ' + slide.id + ' 범위에 흡수되어 교안 전용으로 전환됨');
        }
    }

    _scDirtyMappings[slide.id] = true;
    delete _scMappingDeletions[slide.id];
    _scRebuildAudioStructures();
    _updateEditBadge();
}

// 단순 토스트 (기존 _scToast 있으면 재활용, 없으면 간단 alert 대체)
function _scToast(msg) {
    var t = document.getElementById('sc-toast');
    if (!t) {
        t = document.createElement('div');
        t.id = 'sc-toast';
        t.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(40,40,40,0.92);color:#fff;padding:14px 24px;border-radius:8px;font-size:14px;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,0.3);z-index:9999;opacity:0;transition:opacity 0.2s;pointer-events:none;';
        document.body.appendChild(t);
    }
    t.textContent = msg;
    t.style.opacity = '1';
    clearTimeout(t._timer);
    t._timer = setTimeout(function() { t.style.opacity = '0'; }, 3000);
}

window._scApplyMappingEdit = _scApplyMappingEdit;
// 전역(loadOverlayData, saveEdit, cancelEdit)에서 IIFE 내부 재빌드를 호출하기 위한 브릿지
window._scRebuildAudioStructures = _scRebuildAudioStructures;
// 매핑 편집 버튼 핸들러가 audio.currentTime을 읽기 위한 브릿지
window._scGetAudioTime = function() { return audio.currentTime; };
window._scGetAudioDuration = function() { return audio.duration; };
// 매핑 편집 버튼 핸들러가 현재 슬라이드 인덱스를 읽기 위한 브릿지
window._scCurrentSlideIdx = function() { return currentSlide; };
window.showSlide = showSlide;
window.openOverlay = openOverlay;
window.closeOverlay = closeOverlay;
window.togglePlay = togglePlay;
window.changeSpeed = changeSpeed;
window.skipTime = skipTime;
Object.defineProperty(window, 'currentSlide', { get: () => currentSlide });
Object.defineProperty(window, 'isAutoSync', { get: () => isAutoSync, set: v => { isAutoSync = v; } });
})(); // IIFE 끝

</script>
