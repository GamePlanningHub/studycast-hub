// ========== 자막 편집 모드 ==========
var _steSegments = [];
var _steOriginals = [];
var _steCurrentIdx = -1;

const STE_LS_KEY = 'subtitle_backup_' + SC_REPO;

// loadOverlayData(전역)에서 IIFE 내부 자막 편집 상태를 갱신하기 위한 브릿지
window._steApplyOverlay = function(transcriptEdits) {
    for (var segId in transcriptEdits) {
        var idx = parseInt(segId);
        if (idx < _steSegments.length) {
            _steSegments[idx].text = transcriptEdits[segId];
            _steOriginals[idx] = transcriptEdits[segId];
        }
    }
    _steRender();
    _steLsRestore();
};

function initSubtitleEdit() {
    if (!_subtitleMode) return;
    _editMode = false;

    _steSegments = TRANSCRIPT.map((t, i) => ({ id: i, start: t.start, end: t.end, text: t.text }));
    _steOriginals = TRANSCRIPT.map(t => t.text);

    var subBox = document.getElementById('subtitle-box');
    if (subBox) subBox.style.display = 'none';
    var subCtrl = document.getElementById('sub-controls');
    if (subCtrl) subCtrl.style.display = 'none';

    document.getElementById('subtitle-edit-area').style.display = 'block';
    document.getElementById('slide-area').style.display = 'none';

    // 목차 패널 + 모바일 FAB 숨김
    var idxPanel = document.getElementById('index-panel');
    if (idxPanel) idxPanel.style.display = 'none';
    var idxFab = document.getElementById('index-fab');
    if (idxFab) idxFab.style.display = 'none';
    var mobileFab = document.getElementById('mobile-fab-group');
    if (mobileFab) mobileFab.style.display = 'none';

    // 버튼 이벤트 바인딩 (IIFE 내부 함수 접근을 위해 addEventListener 사용)
    document.getElementById('ste-save-btn').addEventListener('click', function() { _steSave(); });

    var steSearchTimer;
    document.getElementById('ste-search').addEventListener('input', function() {
        clearTimeout(steSearchTimer);
        steSearchTimer = setTimeout(function() { _steRender(); }, 150);
    });

    _steRender();
}

function _steGetVisibleSegments() {
    return _steSegments;
}

function _steRender() {
    var panel = document.getElementById('ste-panel');
    panel.innerHTML = '';
    var query = (document.getElementById('ste-search').value || '').trim().toLowerCase();
    var segs = _steGetVisibleSegments();
    var shown = 0;

    segs.forEach(function(seg) {
        if (query && !seg.text.toLowerCase().includes(query)) return;
        shown++;

        var row = document.createElement('div');
        row.className = 'ste-row';
        row.dataset.id = seg.id;
        if (seg.text !== _steOriginals[seg.id]) row.classList.add('modified');

        var ts = document.createElement('span');
        ts.className = 'ste-ts';
        ts.textContent = _steFmtTime(seg.start);
        ts.title = _steFmtTime(seg.start) + ' ~ ' + _steFmtTime(seg.end);
        ts.onclick = function() { audio.currentTime = seg.start; };

        var ta = document.createElement('textarea');
        ta.className = 'ste-text';
        ta.value = seg.text;
        ta.rows = 1;
        ta.addEventListener('input', function() {
            _steAutoResize(ta);
            seg.text = ta.value;
            TRANSCRIPT[seg.id].text = ta.value;
            var modified = ta.value !== _steOriginals[seg.id];
            row.classList.toggle('modified', modified);
            _steUpdateBadge();
            _steLsBackup();
        });
        ta.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                var next = panel.querySelector('.ste-row[data-id="' + (seg.id + 1) + '"] .ste-text');
                if (next) { next.focus(); next.select(); }
            }
        });

        row.appendChild(ts);
        row.appendChild(ta);
        panel.appendChild(row);
    });

    if (shown === 0) {
        var empty = document.createElement('div');
        empty.style.cssText = 'text-align:center;padding:40px 0;color:var(--text-muted);font-size:14px;';
        empty.textContent = query ? '검색 결과 없음' : '자막이 없습니다.';
        panel.appendChild(empty);
    }

    // DOM append 후 전체 textarea 높이 조정
    requestAnimationFrame(function() {
        panel.querySelectorAll('.ste-text').forEach(_steAutoResize);
    });
}

function _steAutoResize(ta) {
    ta.style.height = '0';
    ta.style.height = ta.scrollHeight + 'px';
}

function _steUpdateBadge() {
    var n = _steSegments.filter(function(s) { return s.text !== _steOriginals[s.id]; }).length;
    var badge = document.getElementById('ste-change-badge');
    badge.style.display = n > 0 ? 'inline-block' : 'none';
    badge.textContent = n + '개 수정됨';
    document.getElementById('ste-save-btn').disabled = (n === 0);
}

function _steFmtTime(s) {
    if (!s || !isFinite(s)) return '0:00';
    var m = Math.floor(s / 60);
    var sec = Math.floor(s % 60);
    return m + ':' + String(sec).padStart(2, '0');
}

function _steSyncHighlight(t) {
    if (!_subtitleMode) return;
    var idx = findTranscriptIdx(t);
    if (idx === _steCurrentIdx) return;
    _steCurrentIdx = idx;
    var panel = document.getElementById('ste-panel');
    var prev = panel.querySelector('.ste-row.active');
    if (prev) prev.classList.remove('active');
    if (idx >= 0) {
        var row = panel.querySelector('.ste-row[data-id="' + idx + '"]');
        if (row) {
            row.classList.add('active');
            if (document.activeElement && document.activeElement.className !== 'ste-text') {
                row.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }
    }
}

function _steLsBackup() {
    try {
        var changed = {};
        _steSegments.forEach(function(s) {
            if (s.text !== _steOriginals[s.id]) changed[s.id] = s.text;
        });
        if (Object.keys(changed).length > 0) {
            localStorage.setItem(STE_LS_KEY, JSON.stringify({ ts: Date.now(), changes: changed }));
        } else {
            localStorage.removeItem(STE_LS_KEY);
        }
    } catch(e) {}
}

function _steLsRestore() {
    try {
        var raw = localStorage.getItem(STE_LS_KEY);
        if (!raw) return;
        var data = JSON.parse(raw);
        var ago = Math.round((Date.now() - data.ts) / 60000);
        var count = Object.keys(data.changes).length;
        if (count === 0) return;
        if (!confirm(count + '개의 미저장 자막 수정분이 있습니다 (' + ago + '분 전).\\n복원할까요?')) {
            localStorage.removeItem(STE_LS_KEY);
            return;
        }
        for (var idStr in data.changes) {
            var id = parseInt(idStr);
            if (id < _steSegments.length) {
                _steSegments[id].text = data.changes[idStr];
                TRANSCRIPT[id].text = data.changes[idStr];
            }
        }
        _steRender();
        _steUpdateBadge();
    } catch(e) {}
}

function _steLsClear() {
    try { localStorage.removeItem(STE_LS_KEY); } catch(e) {}
}

async function _steSave() {
    var btn = document.getElementById('ste-save-btn');
    btn.disabled = true;
    btn.textContent = '저장 중…';
    try {
        var changed = _steSegments.filter(function(s) { return s.text !== _steOriginals[s.id]; });
        var res = await fetch(
            SC_API + '/api/transcript/' + encodeURIComponent(SC_REPO),
            {
                method: 'PUT',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ segments: changed.map(function(s) { return { id: s.id, text: s.text }; }) })
            }
        );
        if (!res.ok) throw new Error('저장 실패');
        _steSegments.forEach(function(s) { _steOriginals[s.id] = s.text; });
        document.querySelectorAll('.ste-row.modified').forEach(function(r) { r.classList.remove('modified'); });
        _steUpdateBadge();
        btn.textContent = '저장';
        _steLsClear();
        var stat = document.getElementById('ste-save-status');
        stat.style.opacity = '1';
        setTimeout(function() { stat.style.opacity = '0'; }, 2500);
    } catch (e) {
        alert('자막 저장 실패: ' + e.message);
        btn.disabled = false;
        btn.textContent = '저장';
    }
}

initSubtitleEdit();
initEditMode();
initMappingMode();
loadOverlayData();
initSubtitleControls();

// ========== 플로팅 자막 드래그 + 컨트롤 ==========
function initSubtitleControls() {
    const box = document.getElementById('subtitle-box');
    if (!box) return;
    const mobileQuery = window.matchMedia('(max-width: 900px)');
    let isMobile = mobileQuery.matches;
    mobileQuery.addEventListener('change', (e) => { isMobile = e.matches; });

    // localStorage에서 설정 복원
    let saved = {};
    try { saved = JSON.parse(localStorage.getItem('sc-sub-settings') || '{}'); } catch(e) {}
    let fontSize = saved.fontSize || 16;
    let posMode = saved.posMode || 'bottom'; // bottom, top, overlay, hidden, free
    let freeX = saved.freeX;
    let freeY = saved.freeY;
    let freeW = saved.freeW;

    const subText = document.getElementById('subtitle-text');
    subText.style.fontSize = fontSize + 'px';

    // 위치 모드 적용
    function applyPos(mode) {
        posMode = mode;
        box.classList.remove('free', 'hidden');
        if (mode === 'hidden') {
            box.classList.add('hidden');
        } else if (mode === 'free') {
            box.classList.add('free');
            box.style.left = (freeX || 100) + 'px';
            box.style.top = (freeY || (window.innerHeight - 100)) + 'px';
            box.style.bottom = 'auto';
            box.style.transform = 'none';
            if (freeW) box.style.width = freeW + 'px';
        } else {
            // bottom (기본)
            box.style.left = '50%'; box.style.top = '';
            box.style.bottom = (window.innerWidth <= 900 ? '56px' : '20px'); box.style.transform = 'translateX(-50%)';
            box.style.width = '';
        }
        saveSettings();
        document.getElementById('sub-hide-btn').classList.toggle('active', mode !== 'hidden');
    }

    function saveSettings() {
        try {
            const r = box.getBoundingClientRect();
            localStorage.setItem('sc-sub-settings', JSON.stringify({
                fontSize, posMode, ccMode,
                freeX: posMode === 'free' ? r.left : freeX,
                freeY: posMode === 'free' ? r.top : freeY,
                freeW: posMode === 'free' ? r.width : freeW,
            }));
        } catch(e) {}
    }

    // 위치 전환 버튼: bottom↔free
    const posIcon = document.getElementById('sub-pos-icon');
    function updatePosIcon() {
        const svgMove = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M2 12h20M9 5l3-3 3 3M9 19l3 3 3-3M5 9l-3 3 3 3M19 9l3 3-3 3"/></svg>';
        const svgVert = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M5 5l7-3 7 3M5 19l7 3 7-3"/></svg>';
        const svgDock = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="14" width="18" height="7" rx="2"/><path d="M3 3h18v7H3z" opacity="0.3"/></svg>';
        if (isMobile) { posIcon.innerHTML = posMode === 'free' ? svgVert : svgDock; }
        else { posIcon.innerHTML = posMode === 'free' ? svgDock : svgMove; }
    }
    document.getElementById('sub-pos-btn').onclick = () => {
        if (posMode === 'hidden') { applyPos('bottom'); }
        else { applyPos(posMode === 'bottom' ? 'free' : 'bottom'); }
        updatePosIcon();
    };
    mobileQuery.addEventListener('change', updatePosIcon);

    // 폰트 크기
    document.getElementById('sub-size-up').onclick = () => {
        fontSize = Math.min(28, fontSize + 2);
        subText.style.fontSize = fontSize + 'px';
        saveSettings();
    };
    document.getElementById('sub-size-dn').onclick = () => {
        fontSize = Math.max(10, fontSize - 2);
        subText.style.fontSize = fontSize + 'px';
        saveSettings();
    };

    // CC 모드: default → text-only → hidden
    let ccMode = saved.ccMode || 'default';
    const ccModes = ['default', 'text-only', 'hidden'];

    function applyCcMode(mode) {
        ccMode = mode;
        box.classList.remove('hidden', 'text-only');
        if (mode === 'hidden') {
            box.classList.add('hidden');
        } else if (mode === 'text-only') {
            box.classList.add('text-only');
        }
        const btn = document.getElementById('sub-hide-btn');
        btn.style.opacity = mode === 'hidden' ? '0.4' : mode === 'text-only' ? '0.7' : '1';
        btn.classList.toggle('active', mode === 'default');
        saveSettings();
    }

    document.getElementById('sub-hide-btn').onclick = () => {
        const idx = ccModes.indexOf(ccMode);
        applyCcMode(ccModes[(idx + 1) % ccModes.length]);
    };
    applyCcMode(ccMode);

    // PC 드래그 (free 모드)
    let dragStartX, dragStartY, boxStartX, boxStartY, isDragging = false;

    // 마우스 드래그 (PC: 자유 이동, 모바일 규격: 수직만)
    box.addEventListener('mousedown', (e) => {
        if (posMode !== 'free' || e.target.tagName === 'BUTTON') return;
        isDragging = true;
        box.classList.add('dragging');
        dragStartX = e.clientX; dragStartY = e.clientY;
        const r = box.getBoundingClientRect();
        boxStartX = r.left; boxStartY = r.top;
        e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const dy = e.clientY - dragStartY;
        box.style.top = (boxStartY + dy) + 'px';
        box.style.bottom = 'auto';
        if (!isMobile) {
            const dx = e.clientX - dragStartX;
            box.style.left = (boxStartX + dx) + 'px';
        }
    });

    document.addEventListener('mouseup', () => {
        if (!isDragging) return;
        isDragging = false;
        box.classList.remove('dragging');
        freeX = parseInt(box.style.left);
        freeY = parseInt(box.style.top);
        saveSettings();
    });

    // 모바일 터치 드래그 (free 모드 — 수직 이동만)
    box.addEventListener('touchstart', (e) => {
        if (posMode !== 'free') return;
        isDragging = true;
        box.classList.add('dragging');
        const touch = e.touches[0];
        dragStartY = touch.clientY;
        const r = box.getBoundingClientRect();
        boxStartY = r.top;
    }, {passive: true});

    document.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        const touch = e.touches[0];
        const newY = boxStartY + touch.clientY - dragStartY;
        box.style.top = newY + 'px';
        box.style.bottom = 'auto';
        box.style.left = '50%';
        box.style.transform = 'translateX(-50%)';
    }, {passive: true});

    document.addEventListener('touchend', () => {
        if (!isDragging) return;
        isDragging = false;
        box.classList.remove('dragging');
        freeY = parseInt(box.style.top);
        saveSettings();
    });

    // 초기 적용
    applyPos(posMode);
    updatePosIcon();
}
// showSlide/currentSlide를 모바일 FAB에서 접근 가능하도록 전역 노출
// 전역 loadOverlayData에서 호출하는 목차 갱신 브릿지
window._refreshTocTitles = function() {
    SLIDES.forEach((s, i) => {
        if (_indexItems[i]) _indexItems[i].querySelector('.idx-title').textContent = s.title;
        if (_overlayItems[i]) _overlayItems[i].querySelector('.idx-title').textContent = s.title;
    });
};
// loadOverlayData가 SLIDES를 KV 편집본으로 교체한 뒤 키워드 하이라이트 재계산
window._rehighlightKeywordMatches = function() {
    _indexItems.forEach(it => it && it.classList.remove('keyword-match'));
    _overlayItems.forEach(it => it && it.classList.remove('keyword-match'));
    highlightKeywordMatches();
};
// 현재 슬라이드의 매핑 컨트롤 바 렌더 (교안 편집 모드 전용)
function _scRenderMappingBar() {
    var bar = document.getElementById('mapping-bar');
    if (!bar) return;
    if (!_mappingMode) {
        bar.classList.remove('active');
        bar.style.display = 'none';
        return;
    }
    var slide = SLIDES[currentSlide];
    if (!slide) return;

    document.getElementById('mb-section-id').textContent = slide.id;
    var rangeEl = document.getElementById('mb-range');
    if (slide.hasAudio && slide.start !== null && slide.end !== null) {
        var dur = (slide.end - slide.start).toFixed(1);
        rangeEl.textContent = '매핑: ' + slide.start.toFixed(1) + 's ~ ' + slide.end.toFixed(1) + 's  (duration ' + dur + 's)';
        rangeEl.classList.remove('empty');
    } else {
        rangeEl.textContent = '매핑 없음 (교안 전용)';
        rangeEl.classList.add('empty');
    }

    // 버튼 활성화 조건: audio.duration이 유효한 finite 값
    var durOk = isFinite(audio.duration) && audio.duration > 0;
    document.getElementById('mb-set-start').disabled = !durOk;
    document.getElementById('mb-set-end').disabled = !durOk;

    bar.classList.add('active');
    bar.style.display = 'flex';
}

window._scRenderMappingBar = _scRenderMappingBar;

// 매핑 편집 핵심 로직
// field: 'start' | 'end'
function _scApplyMappingEdit(sectionIdx, field) {
    var slide = SLIDES[sectionIdx];
    if (!slide) return;


    // 'start' or 'end': 현재 오디오 시점 T 사용
    var T = audio.currentTime;
    if (!isFinite(T) || T < 0) return;

    // 검증: 반대쪽 끝과의 정합성
    if (field === 'start' && slide.end !== null && T > slide.end) {
        _scToast('시작이 끝보다 이후일 수 없습니다');
        return;
    }
    if (field === 'end' && slide.start !== null && T < slide.start) {
        _scToast('끝이 시작보다 이전일 수 없습니다');
        return;
    }

    // No-op 감지: 새 값이 현재 값과 동일하면 아무 것도 하지 않음 (경계 클릭 방지)
    if (field === 'start' && slide.hasAudio && slide.start === T) return;
    if (field === 'end' && slide.hasAudio && slide.end === T) return;

    // P 자기 퇴화 체크: 새 start/end가 0-duration 또는 역전이면 거부
    var newStart = field === 'start' ? T : slide.start;
    var newEnd = field === 'end' ? T : slide.end;
    if (newStart !== null && newEnd !== null && newStart >= newEnd) {
        _scToast('매핑 구간이 0이거나 역전되어 설정할 수 없습니다');
        return;
    }

    // 베이스라인 기록 (취소 시 복원용) — 최초 1회만, 모든 guard 통과 후
    if (!_scMappingBaselines[slide.id]) {
        _scMappingBaselines[slide.id] = {
            start: slide.start,
            end: slide.end,
            hasAudio: slide.hasAudio,
        };
    }

    // 덮어쓰기 규칙: T를 포함하는 다른 페이지 Q의 반대쪽 끝을 T로 자르기
    // 경계값(q.start === T 또는 q.end === T)은 제외 — 엄격 부등식
    for (var i = 0; i < SLIDES.length; i++) {
        if (i === sectionIdx) continue;
        var q = SLIDES[i];
        if (!q.hasAudio || q.start === null || q.end === null) continue;
        if (q.start < T && T < q.end) {
            // 베이스라인 기록 — Q를 mutation하기 전, 세션 시작(KV 오버레이 머지 후) 상태 캡처
            if (!_scMappingBaselines[q.id]) {
                _scMappingBaselines[q.id] = { start: q.start, end: q.end, hasAudio: q.hasAudio };
            }
            if (field === 'start') {
                q.end = T;
            } else {
                q.start = T;
            }
            // Q가 퇴화되면(start >= end) 교안 전용으로 강등
            if (q.start >= q.end) {
                q.hasAudio = false;
                q.start = null;
                q.end = null;
                _scMappingDeletions[q.id] = true;
                delete _scDirtyMappings[q.id];
            } else {
                _scDirtyMappings[q.id] = true;
                delete _scMappingDeletions[q.id];
            }
            break; // 겹침은 항상 0 또는 1개 (불변조건)
        }
    }

    // P 자신의 엔드포인트 설정
    if (field === 'start') {
        slide.start = T;
        if (slide.end === null) slide.end = T + 1;  // 임시 placeholder (사용자가 끝도 설정해야 함)
    } else {
        slide.end = T;
        if (slide.start === null) slide.start = Math.max(0, T - 1);
    }
    slide.hasAudio = true;

    // 완전 삼킴 검사: P가 다른 Q를 완전히 삼켰다면 Q 강등
    for (var j = 0; j < SLIDES.length; j++) {
        if (j === sectionIdx) continue;
        var qq = SLIDES[j];
        if (!qq.hasAudio || qq.start === null || qq.end === null) continue;
        if (slide.start <= qq.start && qq.end <= slide.end) {
            // 베이스라인 기록 — qq를 nullify하기 전, 세션 시작 상태 캡처
            if (!_scMappingBaselines[qq.id]) {
                _scMappingBaselines[qq.id] = { start: qq.start, end: qq.end, hasAudio: qq.hasAudio };
            }
            qq.hasAudio = false;
            qq.start = null;
            qq.end = null;
            _scMappingDeletions[qq.id] = true;
            delete _scDirtyMappings[qq.id];
            _scToast(qq.id + ' 매핑이 ' + slide.id + ' 범위에 흡수되어 교안 전용으로 전환됨');
        }
    }

    _scDirtyMappings[slide.id] = true;
    delete _scMappingDeletions[slide.id];
    _scRebuildAudioStructures();
    _updateEditBadge();
}

// 단순 토스트 (기존 _scToast 있으면 재활용, 없으면 간단 alert 대체)
function _scToast(msg) {
    var t = document.getElementById('sc-toast');
    if (!t) {
        t = document.createElement('div');
        t.id = 'sc-toast';
        t.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(40,40,40,0.92);color:#fff;padding:14px 24px;border-radius:8px;font-size:14px;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,0.3);z-index:9999;opacity:0;transition:opacity 0.2s;pointer-events:none;';
        document.body.appendChild(t);
    }
    t.textContent = msg;
    t.style.opacity = '1';
    clearTimeout(t._timer);
    t._timer = setTimeout(function() { t.style.opacity = '0'; }, 3000);
}

window._scApplyMappingEdit = _scApplyMappingEdit;
// 전역(loadOverlayData, saveEdit, cancelEdit)에서 IIFE 내부 재빌드를 호출하기 위한 브릿지
window._scRebuildAudioStructures = _scRebuildAudioStructures;
// 매핑 편집 버튼 핸들러가 audio.currentTime을 읽기 위한 브릿지
window._scGetAudioTime = function() { return audio.currentTime; };
window._scGetAudioDuration = function() { return audio.duration; };
// 매핑 편집 버튼 핸들러가 현재 슬라이드 인덱스를 읽기 위한 브릿지
window._scCurrentSlideIdx = function() { return currentSlide; };
window.showSlide = showSlide;
window.openOverlay = openOverlay;
window.closeOverlay = closeOverlay;
window.togglePlay = togglePlay;
window.changeSpeed = changeSpeed;
window.skipTime = skipTime;
Object.defineProperty(window, 'currentSlide', { get: () => currentSlide });
Object.defineProperty(window, 'isAutoSync', { get: () => isAutoSync, set: v => { isAutoSync = v; } });
})(); // IIFE 끝

</script>
